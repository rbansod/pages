    related:["seq2seq","attention-mechanism","bleu","back-translation"], tags:["task","historical"] },

  { id:"back-translation", name:"Back-Translation", cat:"translation", difficulty:"intermediate",
    desc:"Translating text to another language and back to generate paraphrases — used for both data augmentation and translation quality improvement.",
    details:"Back-translation serves two purposes: (1) Data augmentation: translate target-language monolingual data to source language to create pseudo-parallel training pairs. Key technique in NMT. (2) Paraphrase generation: translate English → French → English to get a paraphrased version. Quality depends on the intermediate translation model. Used extensively in FAIR's translation work.",
    keyPoints:["Translate forward then back for paraphrases","Creates pseudo-parallel training data","Key technique for NMT data augmentation","Quality depends on intermediate model"],
    related:["machine-translation","data-augmentation-nlp","paraphrase"], tags:["technique","augmentation"] },

  { id:"multilingual-models", name:"Multilingual Models", cat:"translation", difficulty:"intermediate",
    desc:"Single models supporting many languages — including mBERT, XLM-R, NLLB-200, and multilingual LLMs — enabling cross-lingual transfer learning.",
    details:"Multilingual models learn shared representations across languages. Key models: mBERT (104 languages), XLM-R (100 languages), NLLB-200 (200 languages for translation), BLOOM (46 languages), and multilingual versions of GPT-4 and Claude. Enable zero-shot cross-lingual transfer: train on English data, apply to other languages. The 'curse of multilinguality' limits per-language capacity.",
    keyPoints:["Single model for many languages","Cross-lingual transfer learning","mBERT, XLM-R, NLLB, BLOOM","Curse of multilinguality (capacity dilution)"],
    related:["cross-lingual-embeddings","mbert","xlm-r","zero-shot-transfer"], tags:["models","multilingual"] },

  // ═══ SUMMARIZATION ═══
  { id:"summarization", name:"Text Summarization", cat:"summarization", difficulty:"beginner",
    desc:"Condensing longer text into shorter versions while preserving key information — either by extracting important sentences (extractive) or generating new text (abstractive).",
    details:"Extractive summarization selects and concatenates important sentences. Abstractive summarization generates new text that paraphrases the content. Modern LLMs excel at abstractive summarization. Challenges: faithfulness (not adding information), coverage, length control, and multi-document summarization. Evaluation: ROUGE, BERTScore, and human assessment of faithfulness.",
    keyPoints:["Extractive (select sentences) vs. abstractive (generate new)","LLMs excel at abstractive summarization","Faithfulness is a key challenge","ROUGE and BERTScore evaluation"],
    related:["extractive-summarization","abstractive-summarization","rouge","faithfulness"], tags:["task","core"] },

  { id:"extractive-summarization", name:"Extractive Summarization", cat:"summarization", difficulty:"intermediate",
    desc:"Selecting the most important sentences from a document to form a summary — ranking sentences by importance and selecting top ones while maintaining coherence.",
    details:"Methods: TextRank (graph-based, similar to PageRank), LexRank, BERT-based sentence scoring (BERTExtSum), and LLM-based selection. TextRank builds a graph of sentence similarities and ranks by centrality. Neural methods score each sentence's importance using contextual representations. Advantage: no risk of hallucination. Disadvantage: less fluent, redundancy.",
    keyPoints:["Sentence selection by importance","TextRank (graph-based)","BERT-based sentence scoring","No hallucination risk"],
    related:["summarization","textrank","sentence-embeddings","rouge"], tags:["technique","safe"] },

  { id:"abstractive-summarization", name:"Abstractive Summarization", cat:"summarization", difficulty:"intermediate",
    desc:"Generating new text that captures the essential meaning of the source — paraphrasing, compressing, and restructuring rather than extracting verbatim.",
    details:"Abstractive summarization uses encoder-decoder models (BART, T5, Pegasus) or decoder-only LLMs. Pegasus was specifically designed for summarization (pre-trained with gap-sentence generation). Modern LLMs produce high-quality summaries but may hallucinate. Controllable aspects: length, style, focus area, and audience. Chain-of-density prompting produces increasingly detailed summaries.",
    keyPoints:["Generate new summary text","BART, T5, Pegasus models","Risk of hallucination","Chain-of-density prompting"],
    related:["summarization","bart","t5","pegasus","faithfulness"], tags:["technique","generation"] },

  // ═══ QUESTION ANSWERING ═══
  { id:"question-answering", name:"Question Answering", aka:"QA", cat:"qa", difficulty:"beginner",
    desc:"Automatically answering questions posed in natural language — spanning extractive (find answer in text), abstractive (generate answer), and open-domain approaches.",
    details:"QA types: extractive (identify answer span in context — SQuAD), abstractive (generate answer from context), open-domain (retrieve then answer — no given context), knowledge-base QA (query structured KB), and multi-hop (reasoning across documents). LLMs have transformed QA by combining retrieval with generation (RAG). Evaluation: EM (exact match) and F1.",
    keyPoints:["Extractive, abstractive, open-domain types","SQuAD benchmark (extractive)","Multi-hop reasoning across documents","RAG for open-domain QA"],
    related:["rag-overview","reading-comprehension","multi-hop-qa","squad"], tags:["task","core"] },

  { id:"reading-comprehension", name:"Reading Comprehension", cat:"qa", difficulty:"beginner",
    desc:"Answering questions about a given passage of text — testing the model's ability to understand and reason about specific content.",
    details:"Reading comprehension is QA with provided context. Key benchmarks: SQuAD (span extraction), SQuAD 2.0 (includes unanswerable questions), NarrativeQA (stories), QuALITY (long documents). Models: fine-tuned BERT (extract answer spans), LLMs (generate answers from context). Critical for RAG — the generation model must accurately comprehend and reason about retrieved passages.",
    keyPoints:["QA with provided context passage","SQuAD, SQuAD 2.0 benchmarks","Span extraction or generation","Critical capability for RAG"],
    related:["question-answering","squad","bert","rag-overview"], tags:["task","benchmark"] },

  { id:"multi-hop-qa", name:"Multi-hop Question Answering", cat:"qa", difficulty:"advanced",
    desc:"Answering questions that require reasoning across multiple documents or evidence pieces — chaining facts to reach the answer.",
    details:"Multi-hop QA requires combining information from multiple sources. Example: 'Where was the director of Inception born?' requires finding the director (Christopher Nolan) then his birthplace (London). Datasets: HotpotQA, MuSiQue, 2WikiMultihopQA. Approaches: iterative retrieval, graph-based reasoning, and chain-of-thought prompting. Current LLMs handle simpler multi-hop but struggle with 3+ hops.",
    keyPoints:["Reasoning across multiple evidence pieces","HotpotQA, MuSiQue benchmarks","Iterative retrieval approaches","LLMs struggle with 3+ hops"],
    related:["question-answering","chain-of-thought","rag-overview","reasoning-models"], tags:["task","challenging"] },

  // ═══ DIALOGUE & CONVERSATIONAL AI ═══
  { id:"dialogue-systems", name:"Dialogue Systems", cat:"dialogue", difficulty:"beginner",
    desc:"Systems that engage in multi-turn conversations — spanning task-oriented (complete specific tasks) and open-domain (general conversation) approaches.",
    details:"Task-oriented: flight booking, customer service, banking transactions. Components: NLU → dialogue state tracking → policy → NLG. Open-domain: chitchat, companionship, information seeking. Modern approach: LLM-based end-to-end systems replacing pipeline components. Key challenges: context tracking, personality consistency, grounding in knowledge, and safe behavior.",
    keyPoints:["Task-oriented vs. open-domain","NLU → state tracking → policy → NLG pipeline","LLMs replacing pipeline components","Context tracking across turns"],
    related:["dialogue-management","nlu-pipeline","slot-filling","intent-classification"], tags:["system","conversational"] },

  { id:"dialogue-management", name:"Dialogue Management", cat:"dialogue", difficulty:"intermediate",
    desc:"The component that tracks conversation state, decides what action to take, and manages the flow of multi-turn dialogue — the 'brain' of a dialogue system.",
    details:"Dialogue management maintains the belief state (what the system believes about user goals), decides system actions (ask question, provide info, execute action), and manages conversation flow. Methods: rule-based (state machines), statistical (POMDP), and neural (end-to-end). Dialogue State Tracking (DST) updates slot values from conversation context. Modern LLMs handle this implicitly.",
    keyPoints:["Belief state tracking","Action selection (policy)","Rule-based, statistical, neural approaches","LLMs handle implicitly"],
    related:["dialogue-systems","slot-filling","dialogue-state-tracking","intent-classification"], tags:["component","dialogue"] },

  { id:"slot-filling", name:"Slot Filling", cat:"dialogue", difficulty:"beginner",
    desc:"Extracting specific parameter values from user utterances to fill required slots in a task template — e.g., departure city, date, and time for a flight booking.",
    details:"Slot filling extracts values for predefined slots: 'Book a flight from Boston to NYC on Friday' → {from: Boston, to: NYC, date: Friday}. Typically combined with intent classification (joint intent-slot models). Methods: sequence labeling (BIO tags), pointer networks, and LLM-based extraction with JSON output. Datasets: ATIS, SNIPS. Joint models outperform separate intent/slot models.",
    keyPoints:["Extract parameter values for task slots","Combined with intent classification","BIO tagging or LLM extraction","ATIS and SNIPS datasets"],
    related:["intent-classification","ner","dialogue-management","nlu-pipeline"], tags:["task","dialogue"] },

  { id:"grounded-dialogue", name:"Grounded Dialogue", cat:"dialogue", difficulty:"intermediate",
    desc:"Dialogue systems that ground their responses in external knowledge sources (documents, APIs, databases) rather than relying solely on parametric knowledge.",
    details:"Grounded dialogue connects conversation to verified information sources. RAG-based dialogue retrieves relevant documents for each turn. API-grounded dialogue calls external services. Database-grounded dialogue queries structured data. Reduces hallucination and enables factual, verifiable responses. Key in enterprise chatbots where accuracy is critical.",
    keyPoints:["Responses grounded in external sources","RAG-based, API-based, DB-based","Reduces hallucination","Critical for enterprise applications"],
    related:["rag-overview","dialogue-systems","tool-use","faithfulness"], tags:["pattern","enterprise"] },

  // ═══ SPEECH & AUDIO NLP ═══
  { id:"asr", name:"Automatic Speech Recognition", aka:"ASR, Speech-to-Text", cat:"speech", difficulty:"intermediate",
    desc:"Converting spoken language into written text — the input pipeline for voice-based NLP systems.",
    details:"ASR has evolved from HMM-GMM to deep learning (CTC, attention-based) to end-to-end models (Whisper, wav2vec 2.0). OpenAI's Whisper provides robust multilingual ASR with zero-shot capabilities. Key challenges: noisy environments, accents, domain-specific vocabulary, and real-time processing. Word Error Rate (WER) is the standard metric.",
    keyPoints:["Speech waveform to text transcription","Whisper (OpenAI) — multilingual, robust","Word Error Rate (WER) metric","CTC, attention-based, and end-to-end approaches"],
    related:["whisper","tts","speech-nlp","wav2vec"], tags:["task","speech"] },

  { id:"tts", name:"Text-to-Speech Synthesis", aka:"TTS", cat:"speech", difficulty:"intermediate",
    desc:"Generating natural-sounding speech from text — including neural vocoders, prosody modeling, and voice cloning capabilities.",
    details:"Modern TTS: text → acoustic model (mel spectrogram) → vocoder (waveform). Key models: Tacotron 2, VITS, VALL-E (voice cloning from 3 seconds), Bark, and ElevenLabs. Neural vocoders: WaveNet, WaveRNN, HiFi-GAN. Current systems achieve near-human naturalness. Challenges: emotion, emphasis, long-form coherence, and ethical concerns around voice cloning.",
    keyPoints:["Text → spectrogram → waveform pipeline","Near-human naturalness achieved","Voice cloning from seconds of audio","VALL-E, Bark, ElevenLabs"],
    related:["asr","prosody","phonology","speech-nlp"], tags:["task","generation"] },

  { id:"whisper", name:"Whisper", cat:"speech", difficulty:"beginner",
    desc:"OpenAI's multilingual speech recognition model trained on 680K hours of web audio — providing robust ASR, translation, and language detection in a single model.",
    details:"Whisper (Radford et al., 2022) is an encoder-decoder Transformer trained on diverse web audio data. Supports 97 languages, transcription, translation (to English), language detection, and timestamp generation. Robust to noise, accents, and technical language. Available in multiple sizes (tiny to large). Fine-tuneable for domain-specific vocabulary.",
    keyPoints:["680K hours of training data","97 language support","Transcription + translation in one model","Multiple sizes (tiny → large)"],
    related:["asr","transformer","multilingual-models","encoder-decoder"], tags:["model","openai"] },

  // ═══ MULTIMODAL AI ═══
  { id:"vision-language", name:"Vision-Language Models", cat:"multimodal", difficulty:"intermediate",
    desc:"Models that jointly understand images and text — enabling visual question answering, image captioning, visual reasoning, and image-grounded dialogue.",
    details:"Architectures: vision encoder + LLM fusion (LLaVA, InternVL), contrastive pre-training (CLIP), generative (Stable Diffusion with text conditioning). CLIP (Contrastive Language-Image Pre-training) learns aligned image-text representations. LLaVA (Visual Instruction Tuning) connects a vision encoder to an LLM. Enable: OCR, chart understanding, document analysis, visual QA.",
    keyPoints:["Vision encoder + LLM architectures","CLIP for contrastive image-text alignment","LLaVA for visual instruction tuning","Enable OCR, chart, document understanding"],
    related:["clip","llava","multimodal-llm","image-captioning"], tags:["architecture","multimodal"] },

  { id:"clip", name:"CLIP", aka:"Contrastive Language-Image Pre-training", cat:"multimodal", difficulty:"intermediate",
    desc:"OpenAI's model that learns aligned image and text representations through contrastive learning on 400M image-text pairs — enabling zero-shot image classification.",
    details:"CLIP (Radford et al., 2021) trains image and text encoders jointly: matching image-text pairs should have similar embeddings, non-matching should differ. Enables: zero-shot image classification (compare image embedding to text label embeddings), image search, and text-to-image retrieval. No task-specific training needed. Foundation for DALL-E, Stable Diffusion, and many multimodal systems.",
    keyPoints:["Contrastive learning on image-text pairs","Zero-shot image classification","Foundation for text-to-image models","Aligned image-text embedding space"],
    related:["contrastive-learning","vision-language","zero-shot-learning","multimodal-llm"], tags:["model","openai"] },

  { id:"image-captioning", name:"Image Captioning", cat:"multimodal", difficulty:"intermediate",
    desc:"Generating natural language descriptions of images — combining visual understanding with language generation.",
    details:"Approaches: CNN/ViT encoder + RNN/Transformer decoder, CLIP-based (ClipCap), and LLM-based (GPT-4V, LLaVA). Modern multimodal LLMs generate detailed, accurate captions. Dense captioning describes specific regions. Datasets: COCO Captions, Visual Genome, Flickr30k. Applications: accessibility (alt text), content indexing, and visual understanding evaluation.",
    keyPoints:["Vision encoder + language decoder","COCO Captions benchmark","Dense captioning for regions","Applications in accessibility"],
    related:["vision-language","multimodal-llm","clip","visual-qa"], tags:["task","generation"] },

  { id:"visual-qa", name:"Visual Question Answering", aka:"VQA", cat:"multimodal", difficulty:"intermediate",
    desc:"Answering natural language questions about images — requiring both visual perception and language understanding.",
    details:"VQA takes an image + question and produces an answer. Types: open-ended (free text), multiple choice, yes/no. Requires: object recognition, spatial reasoning, counting, reading text in images, and common sense. Datasets: VQA v2, GQA, TextVQA, ChartQA. Modern multimodal LLMs (GPT-4V, Gemini, Claude) perform well on diverse VQA tasks.",
    keyPoints:["Image + question → answer","Requires visual perception + reasoning","VQA v2, TextVQA, ChartQA benchmarks","Multimodal LLMs excel"],
    related:["vision-language","multimodal-llm","reading-comprehension","ocr"], tags:["task","multimodal"] },

  { id:"document-ai", name:"Document AI", cat:"multimodal", difficulty:"intermediate",
    desc:"AI systems for understanding document layouts, extracting information from forms, invoices, contracts, and other structured/semi-structured documents.",
    details:"Document AI combines OCR, layout analysis, and NLU. Models: LayoutLM (Microsoft), Donut (OCR-free), and multimodal LLMs with document understanding. Tasks: form extraction, table detection, key-value extraction, document classification, and signature detection. Critical for enterprise automation: invoice processing, contract analysis, compliance checking.",
    keyPoints:["Layout-aware document understanding","LayoutLM, Donut models","Form, table, key-value extraction","Enterprise automation applications"],
    related:["ocr","vision-language","ie","multimodal-llm"], tags:["application","enterprise"] },

  // ═══ REASONING & PLANNING ═══
  { id:"logical-reasoning", name:"Logical Reasoning", cat:"reasoning", difficulty:"intermediate",
    desc:"The ability to draw valid conclusions from premises using formal or informal logic — a core capability being developed and evaluated in LLMs.",
    details:"Types: deductive (syllogisms, modus ponens), inductive (pattern-based generalization), abductive (best explanation), analogical, and causal. LLMs show strong but inconsistent logical reasoning. Benchmarks: LogiQA, ReClor, FOLIO. Techniques to improve: chain-of-thought, self-consistency, symbolic-neural integration. Formal verification of LLM reasoning remains an open problem.",
    keyPoints:["Deductive, inductive, abductive reasoning","LLMs show inconsistent logical ability","CoT and self-consistency improve results","Formal verification is an open problem"],
    related:["chain-of-thought","reasoning-models","self-consistency","math-reasoning"], tags:["capability","evaluation"] },

  { id:"math-reasoning", name:"Mathematical Reasoning", cat:"reasoning", difficulty:"intermediate",
    desc:"LLMs solving mathematical problems — from arithmetic to calculus — a key benchmark for reasoning capability.",
    details:"Math benchmarks: GSM8K (grade school), MATH (competition-level), AIME, and Olympiad problems. LLMs solve math through: chain-of-thought, code generation (Python as calculator), tool use (WolframAlpha), and specialized training. Reasoning models (o1, DeepSeek-R1) significantly outperform standard LLMs. Remaining challenges: multi-step proofs, spatial reasoning, and verification.",
    keyPoints:["GSM8K and MATH benchmarks","CoT and code generation approaches","Reasoning models dramatically improve results","Verification remains challenging"],
    related:["chain-of-thought","reasoning-models","code-generation","tool-use"], tags:["capability","benchmark"] },

  { id:"commonsense-reasoning", name:"Commonsense Reasoning", cat:"reasoning", difficulty:"intermediate",
    desc:"The ability to reason about everyday situations using implicit world knowledge — understanding physical, social, and temporal common sense.",
    details:"Commonsense reasoning requires knowledge not explicitly stated in text: physical (ice melts in heat), social (giving gifts makes people happy), temporal (breakfast before lunch), and causal (dropping glass breaks it). Benchmarks: CommonsenseQA, WinoGrande, PIQA, HellaSwag. LLMs encode significant commonsense knowledge but still fail on adversarial and unusual scenarios.",
    keyPoints:["Implicit world knowledge reasoning","Physical, social, temporal, causal","CommonsenseQA, WinoGrande benchmarks","LLMs strong but not robust"],
    related:["logical-reasoning","knowledge-graphs","winograd-schema","benchmarks"], tags:["capability","challenging"] },

  { id:"planning", name:"AI Planning & Task Decomposition", cat:"reasoning", difficulty:"intermediate",
    desc:"Breaking complex goals into sequences of actionable steps — a core capability for AI agents that need to accomplish multi-step tasks.",
    details:"Planning in AI agents: goal decomposition (break complex goal into sub-goals), plan generation (create action sequences), plan execution (execute and monitor), replanning (adapt when things go wrong). LLMs can generate plans but struggle with: long-horizon planning, constraint satisfaction, and backtracking. Frameworks: ReAct, AutoGPT, BabyAGI. Often combined with tool use.",
    keyPoints:["Goal decomposition into sub-goals","Plan generation and execution","LLMs struggle with long-horizon planning","ReAct, AutoGPT frameworks"],
    related:["ai-agents","tool-use","chain-of-thought","react-pattern"], tags:["capability","agents"] },

  // ═══ CONTEXT & MEMORY ═══
  { id:"context-window", name:"Context Window", cat:"memory", difficulty:"beginner",
    desc:"The maximum number of tokens a model can process in a single forward pass — determining how much text can be considered for any given response.",
    details:"Context window limits how much information a model can use. Evolution: GPT-3 (4K) → GPT-4 (128K) → Claude (200K) → Gemini (1M+). Longer context enables: full document processing, multi-document QA, extensive conversation history. Challenges: 'lost in the middle' effect (models attend less to middle of long contexts), compute cost scales quadratically with length.",
    keyPoints:["Maximum tokens per forward pass","4K → 128K → 200K → 1M+ evolution","Lost-in-the-middle effect","Quadratic compute scaling"],
    related:["positional-encoding","rope","kv-cache","long-context"], tags:["constraint","architecture"] },

  { id:"kv-cache", name:"KV Cache", cat:"memory", difficulty:"intermediate",
    desc:"Caching computed key and value tensors from previous tokens to avoid recomputation during autoregressive generation — essential for inference efficiency.",
    details:"During generation, each new token requires attention over all previous tokens. The KV cache stores precomputed K and V for all previous tokens, reducing each step from O(n) computation to O(1) new computation (plus the attention lookup). KV cache memory grows linearly with sequence length and is often the bottleneck for long-context inference. Compression techniques: GQA, MQA, quantized KV cache.",
    keyPoints:["Cache previous tokens' K and V tensors","Avoids recomputation during generation","Memory grows linearly with context length","GQA, MQA reduce cache size"],
    related:["self-attention","grouped-query-attention","inference-optimization","context-window"], tags:["mechanism","efficiency"] },

  { id:"long-context", name:"Long Context Handling", cat:"memory", difficulty:"intermediate",
    desc:"Techniques for processing very long documents that approach or exceed a model's context window — including chunking, hierarchical processing, and context extension.",
    details:"Approaches: chunking with overlap (split document, process chunks), hierarchical processing (summarize sections then synthesize), context window extension (RoPE scaling, YaRN), efficient attention (sparse, sliding window), and retrieval over chunks. 'Lost in the middle' phenomenon: models attend more to the beginning and end of long contexts. Mitigation: reranking, key info placement.",
    keyPoints:["Chunking and hierarchical processing","RoPE scaling for context extension","Lost-in-the-middle phenomenon","Strategic information placement"],
    related:["context-window","chunking-strategies","rope","efficient-transformers"], tags:["technique","practical"] },

  { id:"conversation-memory", name:"Conversation Memory", cat:"memory", difficulty:"intermediate",
    desc:"Systems for maintaining and utilizing conversation history across multiple turns — including buffer, summary, entity, and vector-based memory approaches.",
    details:"Memory types: buffer (raw history), window (last N turns), summary (LLM-generated summaries), entity (track entities across turns), vector (embed and retrieve relevant history), and hybrid. For long conversations: summarize older turns, keep recent turns verbatim. Entity carry-forward tracks mentioned entities. Redis-based implementations enable fast session management.",
    keyPoints:["Buffer, window, summary, entity, vector types","Summarize older turns, keep recent verbatim","Entity carry-forward across turns","Redis-based session management"],
    related:["dialogue-management","context-window","session-management","entity-tracking"], tags:["system","practical"] },

  { id:"prompt-caching", name:"Prompt Caching", cat:"memory", difficulty:"intermediate",
    desc:"Reusing computed representations of static prompt prefixes across multiple requests — reducing latency and cost for repeated system prompts or few-shot examples.",
    details:"Prompt caching (supported by Anthropic, OpenAI) allows the model to reuse pre-computed representations of the prompt prefix for subsequent requests. Particularly valuable when: system prompts are long, few-shot examples are static, or documents are re-queried. Anthropic's implementation caches KV pairs. Can reduce TTFT (time to first token) by 85% and cost by 90% for cached portions.",
    keyPoints:["Reuse computed prefix representations","Reduces latency by up to 85%","Reduces cost by up to 90% for cached parts","Valuable for long system prompts"],
    related:["kv-cache","context-window","inference-optimization","system-prompt"], tags:["optimization","cost"] },

  // ═══ AI AGENTS & TOOLS ═══
  { id:"ai-agents", name:"AI Agents", cat:"agents", difficulty:"intermediate",
    desc:"LLM-powered systems that can autonomously plan, use tools, take actions, and iterate toward goals — extending beyond single-turn question answering.",
    details:"AI agents combine LLMs with: tool use (APIs, code execution, web browsing), planning (task decomposition), memory (short and long-term), and self-reflection. Frameworks: LangChain agents, AutoGPT, BabyAGI, CrewAI, Claude agents. Architectures: ReAct (reasoning + acting), plan-and-execute, hierarchical agents. Challenges: reliability, error recovery, cost management, and safety.",
    keyPoints:["LLM + tools + planning + memory","ReAct, plan-and-execute architectures","LangChain, AutoGPT, CrewAI frameworks","Reliability and safety challenges"],
    related:["tool-use","react-pattern","planning","function-calling"], tags:["paradigm","emerging"] },

  { id:"tool-use", name:"Tool Use & Function Calling", cat:"agents", difficulty:"intermediate",
    desc:"LLMs invoking external tools (APIs, calculators, databases, code interpreters) to extend their capabilities beyond text generation.",
    details:"Tool use enables LLMs to: execute code, search the web, query databases, call APIs, read files, and interact with external systems. Implementation: function calling (structured tool definitions + model generates call parameters) or text-based (model generates API call strings). Critical for: real-time data access, computation, and action-taking. Models must learn when and how to use tools.",
    keyPoints:["Extend LLM capabilities with external tools","Function calling with structured schemas","Code execution, web search, API calls","Models learn when to use tools"],
    related:["function-calling","ai-agents","mcp","code-generation"], tags:["capability","integration"] },

  { id:"function-calling", name:"Function Calling", cat:"agents", difficulty:"intermediate",
    desc:"A structured mechanism where LLMs receive tool/function definitions and generate structured calls with appropriate arguments — enabling reliable tool integration.",
    details:"Function calling: define tools with name, description, and parameter schema (JSON Schema) → model generates structured tool calls with arguments → system executes function → result is fed back to model. Supported by OpenAI, Anthropic, Google, and open models. Parallel function calling: multiple tools in one turn. Critical for: RAG, data retrieval, action execution, and workflow automation.",
    keyPoints:["Structured tool definitions (JSON Schema)","Model generates call with arguments","Parallel function calling support","Reliable LLM-to-tool integration"],
    related:["tool-use","structured-output","ai-agents","json-schema"], tags:["mechanism","integration"] },

  { id:"react-pattern", name:"ReAct Pattern", aka:"Reasoning + Acting", cat:"agents", difficulty:"intermediate",
    desc:"An agent architecture where the LLM alternates between reasoning (thinking about what to do) and acting (using tools) — Yao et al., 2022.",
    details:"ReAct interleaves: Thought (reasoning about the situation), Action (executing a tool), Observation (receiving tool result). This loop continues until the task is complete. Advantages: reasoning is visible (interpretable), errors can be caught early, and the model can adapt based on tool results. More reliable than pure reasoning or pure tool chains.",
    keyPoints:["Thought → Action → Observation loop","Interpretable reasoning traces","Adapts based on tool results","More reliable than pure approaches"],
    related:["ai-agents","tool-use","chain-of-thought","planning"], tags:["pattern","agent"] },

  { id:"mcp", name:"Model Context Protocol", aka:"MCP", cat:"agents", difficulty:"intermediate",
    desc:"An open protocol standardizing how AI models connect to data sources and tools — providing a universal interface for context and tool integration.",
    details:"MCP (Anthropic, 2024) standardizes the interface between AI models and external systems. Components: MCP servers (expose data/tools), MCP clients (connect models to servers), and a protocol layer. Enables: universal tool integration, standardized resource access, and interoperable AI-tool connections. Analogous to USB for AI — one protocol for many integrations.",
    keyPoints:["Universal AI-tool integration protocol","Servers expose data/tools, clients connect","Standardized resource and tool access","'USB for AI' analogy"],
    related:["tool-use","function-calling","ai-agents","api-integration"], tags:["protocol","standard"] },

  { id:"code-generation", name:"Code Generation", cat:"agents", difficulty:"intermediate",
    desc:"LLMs generating executable code from natural language descriptions — from simple scripts to complex multi-file applications.",
    details:"Code generation spans: single functions, complete programs, debugging, code review, and documentation. Models: Codex, Code Llama, StarCoder, DeepSeek-Coder, GPT-4, Claude. Benchmarks: HumanEval, MBPP, SWE-Bench. Techniques: code-specific pre-training, instruction tuning with code examples, and tool-augmented generation (running code to verify). Code as a reasoning tool (PAL).",
    keyPoints:["NL description → executable code","HumanEval, MBPP, SWE-Bench benchmarks","Code-specific pre-training","Code as reasoning tool (PAL)"],
    related:["tool-use","text-to-sql","nl2code","function-calling"], tags:["capability","practical"] },

  { id:"web-browsing-agents", name:"Web Browsing Agents", cat:"agents", difficulty:"intermediate",
    desc:"AI agents that can navigate, read, and interact with web pages — clicking buttons, filling forms, and extracting information autonomously.",
    details:"Web agents use vision (screenshots) or DOM (HTML structure) to understand web pages, then take actions (click, type, scroll, navigate). Models: WebVoyager, SeeClick, Mind2Web. Challenges: dynamic pages, authentication, safety (avoiding harmful actions), and generalization across websites. Benchmarks: WebArena, Mind2Web. Emerging in Claude, GPT, and Gemini products.",
    keyPoints:["Navigate and interact with websites","Vision-based or DOM-based approaches","WebArena benchmark","Safety and reliability challenges"],
    related:["ai-agents","vision-language","planning","tool-use"], tags:["application","emerging"] },

  // ═══ KNOWLEDGE REPRESENTATION ═══
  { id:"knowledge-graphs", name:"Knowledge Graphs", cat:"knowledge", difficulty:"intermediate",
    desc:"Structured representations of real-world entities and their relationships as (subject, predicate, object) triples — enabling structured querying and reasoning.",
    details:"Knowledge graphs store facts as triples: (Einstein, born_in, Germany). Major KGs: Wikidata, DBpedia, Freebase (deprecated), YAGO, Google Knowledge Graph. Used for: entity linking, question answering, fact verification, and grounding LLM responses. Construction: manual curation, information extraction, and crowd-sourcing. Integration with LLMs is an active research area.",
    keyPoints:["(Subject, predicate, object) triples","Wikidata, DBpedia, Google KG","Enable structured querying and reasoning","Integration with LLMs is active research"],
    related:["entity-linking","relation-extraction","kg-embedding","ontology"], tags:["representation","structured"] },

  { id:"ontology", name:"Ontologies", cat:"knowledge", difficulty:"intermediate",
    desc:"Formal specifications of concepts, properties, and relationships within a domain — providing structured vocabularies and reasoning frameworks.",
    details:"Ontologies define: classes (categories), properties (attributes), relationships, and axioms (logical constraints). Languages: OWL (Web Ontology Language), RDF/RDFS. Major ontologies: WordNet (lexical), SNOMED CT (medical), FIBO (financial). Used for: semantic search, domain modeling, knowledge graph construction, and consistency checking. Bridge between natural language and structured knowledge.",
    keyPoints:["Formal concept and relationship specifications","OWL, RDF/RDFS languages","WordNet, SNOMED CT, FIBO examples","Bridge NL and structured knowledge"],
    related:["knowledge-graphs","wordnet","semantic-web","entity-linking"], tags:["representation","formal"] },

  { id:"wordnet", name:"WordNet", cat:"knowledge", difficulty:"beginner",
    desc:"A large lexical database of English where words are organized by meaning into synsets (sets of synonyms), connected by semantic relations like hypernymy and meronymy.",
    details:"WordNet groups words into synsets representing distinct concepts. Relations: hypernymy (is-a), hyponymy, meronymy (part-of), antonymy, and entailment. Contains ~155K words in ~117K synsets. Used for: word sense disambiguation, semantic similarity, and the Lesk algorithm. Available for many languages through Open Multilingual Wordnet. Accessible via NLTK.",
    keyPoints:["Synsets organized by meaning","Hypernymy, meronymy, antonymy relations","~155K words in ~117K synsets","Foundation for WSD and semantic similarity"],
    related:["wsd","ontology","semantic-similarity","lemmatization"], tags:["resource","lexical"] },

  { id:"kg-embedding", name:"Knowledge Graph Embeddings", cat:"knowledge", difficulty:"advanced",
    desc:"Representing entities and relations in knowledge graphs as dense vectors — enabling link prediction, entity typing, and integration with neural models.",
    details:"KG embedding models learn vector representations where geometric operations encode relationships. Models: TransE (translation-based: head + relation ≈ tail), RotatE (rotation), ComplEx (complex-valued), DistMult. Used for: link prediction (predicting missing facts), entity classification, and knowledge-enhanced NLP. Integration with LLMs for knowledge-grounded generation.",
    keyPoints:["Entities and relations as vectors","TransE: head + relation ≈ tail","Link prediction applications","Integration with LLMs"],
    related:["knowledge-graphs","word-embeddings","link-prediction","entity-linking"], tags:["technique","representation"] },

  // ═══ EVALUATION & METRICS ═══
  { id:"evaluation-metrics", name:"NLP Evaluation Overview", cat:"evaluation", difficulty:"beginner",
    desc:"The landscape of metrics and methods for evaluating NLP systems — spanning automatic metrics, human evaluation, and LLM-as-judge approaches.",
    details:"Evaluation categories: automatic metrics (BLEU, ROUGE, BERTScore, perplexity), task-specific metrics (F1, EM, accuracy), human evaluation (fluency, relevance, faithfulness), and LLM-based evaluation (GPT-4 as judge). Challenges: automatic metrics correlate imperfectly with human judgment, evaluation is task-dependent, and LLM judges have biases. Multi-dimensional evaluation is recommended.",
    keyPoints:["Automatic, human, and LLM-based evaluation","Automatic metrics imperfectly correlate with quality","Task-specific metric selection","Multi-dimensional evaluation recommended"],
    related:["bleu","rouge","bertscore","perplexity"], tags:["overview","evaluation"] },

  { id:"perplexity", name:"Perplexity", cat:"evaluation", difficulty:"intermediate",
    desc:"A measure of how well a language model predicts a text sample — lower perplexity indicates the model assigns higher probability to the actual text.",
    details:"Perplexity = 2^(cross-entropy) = exp(-1/N * Σlog P(w_i|context)). Measures how 'surprised' the model is by the text. Lower is better. Used for: comparing language models, evaluating pre-training quality, and detecting generated text. Not directly useful for evaluating generation quality (a model can have low perplexity but generate boring text). Affected by tokenization and vocabulary.",
    keyPoints:["2^(cross-entropy) measure","Lower = better language modeling","Standard for comparing LMs","Not directly useful for generation quality"],
    related:["language-modeling","cross-entropy","evaluation-metrics","pretraining"], tags:["metric","language-model"] },

  { id:"bleu", name:"BLEU", aka:"Bilingual Evaluation Understudy", cat:"evaluation", difficulty:"intermediate",
    desc:"An n-gram precision-based metric for evaluating machine translation quality by comparing generated text to reference translations — the most widely used MT metric.",
    details:"BLEU (Papineni et al., 2002) computes modified n-gram precision (1-4 grams) with brevity penalty. Ranges 0-1, higher is better. Limitations: focuses on precision not recall, ignores semantic similarity, penalizes valid paraphrases, and correlates moderately with human judgment. Modern alternatives: COMET (learned metric), chrF (character n-gram F-score), BERTScore.",
    keyPoints:["Modified n-gram precision (1-4 grams)","Brevity penalty for short translations","Moderate correlation with human judgment","Being replaced by COMET, BERTScore"],
    related:["rouge","bertscore","machine-translation","evaluation-metrics"], tags:["metric","translation"] },

  { id:"rouge", name:"ROUGE", aka:"Recall-Oriented Understudy for Gisting Evaluation", cat:"evaluation", difficulty:"intermediate",
    desc:"A set of recall-based metrics for evaluating text summarization by measuring overlap between generated and reference summaries.",
    details:"ROUGE variants: ROUGE-N (n-gram recall), ROUGE-L (longest common subsequence), ROUGE-W (weighted LCS), ROUGE-S (skip-bigram). ROUGE-1 (unigram) and ROUGE-L are most common. Like BLEU, focuses on surface overlap and misses semantic similarity. Still widely used as a standard summarization metric despite limitations. BERTScore and human evaluation complement it.",
    keyPoints:["Recall-based n-gram overlap","ROUGE-1, ROUGE-2, ROUGE-L variants","Standard summarization metric","Misses semantic similarity"],
    related:["bleu","bertscore","summarization","evaluation-metrics"], tags:["metric","summarization"] },

  { id:"bertscore", name:"BERTScore", cat:"evaluation", difficulty:"intermediate",
    desc:"A semantic similarity metric using BERT embeddings to compare generated and reference texts — capturing meaning beyond surface n-gram overlap.",
    details:"BERTScore (Zhang et al., 2020) computes token-level cosine similarity between BERT embeddings of candidate and reference, then aggregates using greedy matching. Captures semantic similarity that BLEU/ROUGE miss. Variants use different BERT models and layers. Correlates better with human judgment than n-gram metrics. IDF weighting improves performance.",
    keyPoints:["BERT embedding-based similarity","Greedy token matching","Better correlation with human judgment","Captures semantic similarity"],
    related:["bleu","rouge","bert","semantic-similarity"], tags:["metric","semantic"] },

  { id:"llm-as-judge", name:"LLM-as-Judge", cat:"evaluation", difficulty:"intermediate",
    desc:"Using a powerful LLM (like GPT-4) to evaluate the quality of text generated by other models — replacing or augmenting human evaluation.",
    details:"LLM-as-judge uses a strong model to score outputs on dimensions like helpfulness, relevance, accuracy, and safety. Modes: pointwise scoring, pairwise comparison, and reference-based grading. Known biases: position bias, verbosity bias, self-preference bias. Mitigation: multiple judges, randomized ordering, calibration. Used in: LMSYS Chatbot Arena, MT-Bench, and RAG evaluation.",
    keyPoints:["LLM evaluates other model outputs","Pointwise, pairwise, reference-based modes","Position and verbosity biases","Used in benchmarks and RAG evaluation"],
    related:["evaluation-metrics","rag-evaluation","human-evaluation","chatbot-arena"], tags:["method","practical"] },

  { id:"mteb", name:"MTEB", aka:"Massive Text Embedding Benchmark", cat:"evaluation", difficulty:"intermediate",
    desc:"A comprehensive benchmark for evaluating text embedding models across 8 tasks and 58 datasets — the standard leaderboard for embedding model comparison.",
    details:"MTEB (Muennighoff et al., 2022) evaluates embeddings on: classification, clustering, pair classification, reranking, retrieval, STS, summarization. Covers 58 datasets across multiple domains and languages. The MTEB leaderboard on Hugging Face is the standard for comparing embedding models. Models are evaluated on their ability to produce useful representations across diverse tasks.",
    keyPoints:["8 task types, 58 datasets","Standard embedding model benchmark","Hugging Face leaderboard","Classification, retrieval, STS, clustering"],
    related:["embedding-models","sentence-embeddings","semantic-similarity","benchmarks"], tags:["benchmark","embeddings"] },

  { id:"hallucination-detection", name:"Hallucination Detection", cat:"evaluation", difficulty:"intermediate",
    desc:"Methods for detecting when LLMs generate factually incorrect or unsupported information — critical for trustworthy AI systems.",
    details:"Hallucination types: intrinsic (contradicts source), extrinsic (adds unsupported info), factual (incorrect facts). Detection methods: NLI-based entailment checking, knowledge graph verification, self-consistency checking, retrieval verification, and specialized models (HHEM, TRUE). Metrics: faithfulness (to source), factuality (to world knowledge). Active research area.",
    keyPoints:["Intrinsic, extrinsic, factual hallucination types","NLI-based and retrieval-based detection","Faithfulness and factuality metrics","Critical for enterprise deployment"],
    related:["faithfulness","rag-evaluation","fact-verification","evaluation-metrics"], tags:["challenge","safety"] },

  { id:"faithfulness", name:"Faithfulness", cat:"evaluation", difficulty:"intermediate",
    desc:"Whether a generated response is supported by and consistent with the provided source material — a critical quality dimension for RAG and summarization.",
    details:"Faithfulness measures if generated text is entailed by the source. Distinct from factuality (correctness of real-world facts). Evaluation: NLI-based scoring, atomic fact decomposition + verification, and LLM-as-judge. Key in RAG: ensuring the model uses retrieved context and doesn't fabricate information. RAGAS faithfulness metric decomposes responses into claims and verifies each.",
    keyPoints:["Supported by source material","Distinct from factuality","NLI-based verification","Key metric for RAG systems"],
    related:["hallucination-detection","rag-evaluation","textual-entailment","ragas"], tags:["metric","quality"] },

  // ═══ SCALING & EFFICIENCY ═══
  { id:"quantization", name:"Quantization", cat:"scaling", difficulty:"intermediate",
    desc:"Reducing model precision from FP32/FP16 to INT8/INT4 to decrease memory usage and accelerate inference — with minimal quality loss.",
    details:"Quantization methods: post-training quantization (PTQ — quantize after training), quantization-aware training (QAT — train with quantization in mind), and dynamic quantization (quantize on-the-fly). Formats: INT8, INT4, GPTQ, AWQ, GGUF. INT4 reduces memory 4× with typically <1% quality loss. Enables running large models on consumer hardware. Key for: edge deployment and cost reduction.",
    keyPoints:["FP16 → INT8/INT4 precision reduction","4× memory reduction with INT4","GPTQ, AWQ, GGUF formats","Enables consumer hardware deployment"],
    related:["qlora","inference-optimization","model-compression","gguf"], tags:["technique","efficiency"] },

  { id:"model-compression", name:"Model Compression", cat:"scaling", difficulty:"intermediate",
    desc:"Techniques for reducing model size while maintaining performance — encompassing pruning, quantization, distillation, and architecture modifications.",
    details:"Compression approaches: pruning (remove unimportant weights — structured or unstructured), quantization (reduce precision), distillation (train smaller model from larger), weight sharing, and low-rank factorization. Structured pruning removes entire heads/layers for hardware-friendly speedup. Modern focus: quantization (most practical) and distillation (best quality/size trade-off).",
    keyPoints:["Pruning, quantization, distillation","Structured vs. unstructured pruning","Low-rank factorization","Quantization most practical currently"],
    related:["quantization","knowledge-distillation","pruning","small-language-models"], tags:["family","efficiency"] },

  { id:"inference-optimization", name:"Inference Optimization", cat:"scaling", difficulty:"intermediate",
    desc:"Techniques for making LLM inference faster and cheaper — including KV caching, batching, speculative decoding, and hardware-specific optimizations.",
    details:"Key techniques: KV cache management, continuous batching (vLLM), PagedAttention (virtual memory for KV cache), speculative decoding, FlashAttention (IO-aware attention), model parallelism (tensor, pipeline), quantization, and prefix caching. Frameworks: vLLM, TGI, TensorRT-LLM, llama.cpp, Triton. Metrics: tokens per second, time to first token (TTFT), throughput.",
    keyPoints:["KV caching and continuous batching","PagedAttention (vLLM)","FlashAttention (IO-aware)","Speculative decoding for 2-3× speedup"],
    related:["kv-cache","speculative-decoding","vllm","flash-attention"], tags:["optimization","deployment"] },

  { id:"flash-attention", name:"FlashAttention", cat:"scaling", difficulty:"advanced",
    desc:"An IO-aware attention algorithm that reduces memory reads/writes by tiling attention computation and avoiding materializing the full attention matrix — 2-4× speedup.",
    details:"FlashAttention (Dao et al., 2022) exploits GPU memory hierarchy: instead of materializing the N×N attention matrix in slow HBM, it tiles the computation to stay in fast SRAM. FlashAttention-2 adds better parallelism. FlashAttention-3 targets H100 GPUs. Enables longer context with less memory. Used in virtually all modern LLM training and inference frameworks.",
    keyPoints:["IO-aware tiled attention computation","Avoids materializing full N×N matrix","2-4× speedup, significant memory savings","Used in virtually all modern LLM systems"],
    related:["self-attention","inference-optimization","gpu-architecture","training-efficiency"], tags:["algorithm","critical"] },

  { id:"model-parallelism", name:"Model Parallelism", cat:"scaling", difficulty:"advanced",
    desc:"Distributing a model across multiple GPUs when it's too large for a single device — including tensor, pipeline, and expert parallelism.",
    details:"Types: tensor parallelism (split individual layers across GPUs — Megatron-LM), pipeline parallelism (split consecutive layers across GPUs), data parallelism (duplicate model, split data — DDP, FSDP), and expert parallelism (different MoE experts on different GPUs). ZeRO (DeepSpeed) partitions optimizer states, gradients, and parameters across devices. Critical for training and serving large models.",
    keyPoints:["Tensor, pipeline, data, expert parallelism","Megatron-LM for tensor parallelism","ZeRO for memory-efficient data parallelism","Critical for models >single GPU"],
    related:["training-efficiency","gpu-architecture","deepspeed","distributed-training"], tags:["technique","scale"] },

  { id:"hnsw", name:"HNSW", aka:"Hierarchical Navigable Small World", cat:"search", difficulty:"advanced",

    details:"HNSW (Malkov & Yashunin, 2018) constructs a hierarchical graph where each node connects to nearby neighbors. Higher layers have fewer, longer-range connections (for coarse navigation); lower layers have dense, short-range connections (for precise search). Parameters: M (max connections), efConstruction (build quality), efSearch (search quality). Offers excellent recall/speed trade-off.",

  // ═══ RLHF & ALIGNMENT ═══
  { id:"rlhf", name:"RLHF", aka:"Reinforcement Learning from Human Feedback", cat:"rl", difficulty:"intermediate",
    desc:"Training LLMs to align with human preferences using a reward model trained on human comparisons, then optimizing the LLM policy via RL (typically PPO).",
    details:"RLHF pipeline: (1) Collect human comparisons of model outputs, (2) Train a reward model to predict human preferences, (3) Optimize LLM using PPO against the reward model while constraining deviation from the base model (KL divergence). Used by InstructGPT, ChatGPT, Claude, Gemini. Challenges: reward hacking, reward model accuracy, and distribution shift.",
    keyPoints:["Human comparisons → reward model → RL optimization","PPO with KL divergence constraint","Used by ChatGPT, Claude, Gemini","Challenges: reward hacking, distribution shift"],
    related:["dpo","reward-model","ppo","alignment"], tags:["technique","alignment"] },

  { id:"dpo", name:"DPO", aka:"Direct Preference Optimization", cat:"rl", difficulty:"intermediate",
    desc:"An alternative to RLHF that directly optimizes the LLM policy from preference data without training a separate reward model — simpler and more stable.",
    details:"DPO (Rafailov et al., 2023) reparameterizes the RLHF objective to directly use the LLM itself as the reward model. Given preferred and dispreferred responses, DPO increases the probability of preferred responses while decreasing dispreferred. Advantages: no separate reward model training, no RL instabilities (PPO), simpler implementation. Variants: IPO, KTO, ORPO.",
    keyPoints:["Direct optimization without reward model","Simpler than RLHF (no PPO needed)","Preferred/dispreferred response pairs","Variants: IPO, KTO, ORPO"],

    details:"CAI (Bai et al., 2022): (1) Generate responses, (2) Critique using constitutional principles, (3) Revise based on critique, (4) Train on revised outputs (RLAIF — RL from AI Feedback). The constitution encodes desired behavior: helpfulness, harmlessness, honesty. Reduces the need for human evaluators while maintaining alignment quality. Used for training Claude models.",

    desc:"The challenge of ensuring AI systems behave in accordance with human values and intentions — encompassing helpfulness, harmlessness, and honesty.",
    details:"Alignment ensures AI systems do what humans intend. Key aspects: helpfulness (useful responses), harmlessness (avoiding dangerous outputs), honesty (truthful, calibrated). Techniques: RLHF, DPO, Constitutional AI, safety training, red-teaming, and evaluation. Open problems: scalable oversight, deceptive alignment, goal misgeneralization, and value lock-in. Central to AI safety research.",

  { id:"bias-in-nlp", name:"Bias in NLP Models", cat:"ethics", difficulty:"intermediate",

    details:"Biases manifest in: word embeddings (gender stereotypes in Word2Vec/GloVe), language models (differential performance across demographics), NER (lower accuracy for non-Western names), sentiment analysis (racial bias in toxicity detection), and generation (stereotyped text). Sources: training data, annotation bias, representation gaps. Mitigation: debiasing embeddings, balanced training data, and fairness constraints.",

    related:["fairness","debiasing","toxicity-detection","responsible-ai"], tags:["challenge","ethics"] },

    details:"Toxicity detection models classify text on dimensions: toxicity, severe toxicity, identity attack, insult, profanity, and threat. Key models: Perspective API (Google), HateBERT, ToxiGen. Challenges: context-dependence (reclaiming slurs), cultural variation, sarcasm, and false positives on minority-mentioning text. Used for content moderation, safety filtering, and guardrails.",

    desc:"Safety mechanisms that constrain LLM behavior — input/output filtering, topic restrictions, safety classifiers, and behavioral boundaries.",
    details:"Guardrails implement safety at multiple levels: input filtering (detect harmful prompts), output filtering (detect harmful responses), topic restrictions (refuse certain requests), format validation, PII detection, and hallucination checking. Frameworks: NeMo Guardrails (NVIDIA), Guardrails AI, LlamaGuard (Meta). Can be rule-based, classifier-based, or LLM-based.",

    related:["safety","toxicity-detection","content-moderation","alignment"], tags:["system","safety"] },

  { id:"red-teaming", name:"Red Teaming", cat:"ethics", difficulty:"intermediate",
    desc:"Adversarial testing of AI systems to discover vulnerabilities, harmful behaviors, and failure modes before deployment — using both human and automated approaches.",
    details:"Red teaming probes for: jailbreaks (bypassing safety measures), harmful outputs, bias manifestation, confidentiality leaks, and factual errors. Human red teaming: domain experts systematically probe models. Automated red teaming: use LLMs to generate adversarial inputs. Essential before deployment. Covers: prompt injection, indirect prompt injection, safety bypass, and capability elicitation.",
    keyPoints:["Adversarial testing for vulnerabilities","Human and automated approaches","Jailbreak and prompt injection testing","Essential pre-deployment practice"],
    related:["prompt-injection","jailbreaking","safety","guardrails"], tags:["practice","security"] },

  { id:"prompt-injection", name:"Prompt Injection", cat:"ethics", difficulty:"intermediate",
    desc:"Attacks where malicious instructions are embedded in user input or external content to override the LLM's system prompt and intended behavior.",
    details:"Types: direct injection (user manipulates prompt), indirect injection (malicious content in retrieved documents, emails, or web pages). Examples: 'Ignore previous instructions and...' or embedding instructions in web pages that an LLM agent will read. Defenses: input sanitization, instruction hierarchy, separate system/user message channels, and output validation. A fundamental security challenge.",
    keyPoints:["Direct and indirect injection attacks","Can override system prompt behavior","Defenses: sanitization, hierarchy, validation","Fundamental security challenge for LLMs"],
    related:["red-teaming","guardrails","safety","jailbreaking"], tags:["vulnerability","security"] },

  { id:"data-privacy-nlp", name:"Data Privacy in NLP", cat:"ethics", difficulty:"intermediate",

    details:"Privacy issues: LLMs memorize and can regurgitate training data, including PII. Attacks: membership inference (was this data in training?), extraction attacks (extracting training examples). Defenses: differential privacy, data sanitization, federated learning, and PII detection/redaction. Regulations: GDPR, CCPA affect data handling. Critical for enterprise NLP deployments.",
    keyPoints:["Training data memorization risk","PII exposure and extraction attacks","Differential privacy as defense","GDPR/CCPA compliance requirements"],
    related:["pii-detection","bias-in-nlp","responsible-ai","enterprise-nlp"], tags:["concern","compliance"] },

  { id:"diffusion-models-text", name:"Text Diffusion Models", cat:"diffusion", difficulty:"advanced",
    desc:"Applying diffusion processes to text generation — gradually denoising from random tokens to coherent text as an alternative to autoregressive generation.",
    details:"Text diffusion models (D3PM, Diffusion-LM, MDLM) adapt image diffusion concepts to discrete text. Forward process: gradually corrupt text with noise. Reverse process: learn to denoise step by step. Advantages: non-autoregressive (parallel generation), natural controllability through guidance. Challenges: discrete nature of text, training stability, and quality gap with autoregressive models.",

  // ═══ ADDITIONAL CONCEPTS ═══
  { id:"language-modeling", name:"Language Modeling", cat:"foundations", difficulty:"beginner",
    desc:"The task of predicting the probability of a sequence of words — either the next word (autoregressive) or masked words — the fundamental training objective behind all modern NLP.",
    details:"Language modeling assigns probabilities to word sequences: P(w1, w2, ..., wn). Autoregressive LM factorizes as P(w_t|w_1...w_{t-1}). Masked LM predicts hidden words from context (BERT). N-gram LMs use fixed-size history. Neural LMs use learned representations. Perplexity measures LM quality. The simple objective of predicting the next word, at scale, leads to remarkable emergent capabilities.",
    keyPoints:["Predict probability of word sequences","Autoregressive vs. masked objectives","Perplexity as evaluation metric","Simple objective → emergent capabilities"],
    related:["autoregressive","masked-lm","perplexity","neural-lm"], tags:["task","foundational"] },

  { id:"masked-lm", name:"Masked Language Modeling", aka:"MLM", cat:"architectures", difficulty:"intermediate",
    desc:"Pre-training objective where random tokens are replaced with [MASK] and the model predicts the original tokens — used by BERT and its variants.",
    details:"MLM randomly masks 15% of tokens (80% replaced with [MASK], 10% random token, 10% unchanged) and trains the model to predict the originals. Enables bidirectional context — each position can attend to all other positions. Key difference from autoregressive: not generative by default, produces deep bidirectional representations. Used by: BERT, RoBERTa, ALBERT, DeBERTa.",
    keyPoints:["15% token masking (80/10/10 strategy)","Enables bidirectional context","Not naturally generative","Used by BERT family models"],
    related:["bert","roberta","pretraining","autoregressive"], tags:["objective","training"] },

  { id:"contrastive-learning", name:"Contrastive Learning", cat:"training", difficulty:"intermediate",
    desc:"Learning representations by contrasting positive pairs (similar items) against negative pairs (dissimilar items) — the training paradigm behind modern embedding models.",
    details:"Contrastive learning trains models to produce similar embeddings for semantically similar inputs and dissimilar embeddings for different inputs. Loss functions: InfoNCE, triplet loss, SimCLR-style. Key for: sentence embeddings (SBERT), embedding models (E5, BGE), CLIP, and DPR. Hard negative mining (selecting informative negatives) is critical for quality. In-batch negatives for efficiency.",
    keyPoints:["Positive pairs close, negative pairs far","InfoNCE and triplet loss functions","Hard negative mining is critical","Foundation for embedding model training"],
    related:["embedding-models","clip","sbert","dense-retrieval"], tags:["technique","training"] },

  { id:"transfer-learning", name:"Transfer Learning in NLP", cat:"training", difficulty:"beginner",
    desc:"Using knowledge learned from one task/domain (typically pre-training) to improve performance on a different target task — the paradigm that transformed NLP.",
    details:"Transfer learning in NLP: pre-train on large generic corpus, then fine-tune on specific task. Revolutionized by: word embeddings (Word2Vec → task models), ELMo (contextual embeddings), and BERT (pre-train + fine-tune). Three levels: feature extraction (freeze base, train classifier), fine-tuning (update all params), and prompt-based (in-context learning). The pre-train + fine-tune paradigm dominates modern NLP.",
    keyPoints:["Pre-train on general data, fine-tune on specific","Feature extraction, fine-tuning, prompt-based levels","Revolutionized NLP after BERT","Enables learning from limited task-specific data"],
    related:["pretraining","fine-tuning","bert","in-context-learning"], tags:["paradigm","foundational"] },

  { id:"annotation", name:"Data Annotation", cat:"foundations", difficulty:"beginner",
    desc:"The process of labeling text data for supervised learning — including POS tags, NER spans, sentiment labels, and quality ratings for RLHF.",
    details:"Annotation types: token-level (POS, NER), span-level (entity spans, chunks), sentence-level (sentiment, intent), document-level (topic, quality), and pairwise (preference comparisons for RLHF). Tools: Label Studio, Prodigy, Doccano. Quality: inter-annotator agreement (Cohen's kappa, Fleiss' kappa). Active learning reduces annotation cost by selecting informative examples. Crowd-sourcing (MTurk) for scale.",
    keyPoints:["Token, span, sentence, document levels","Label Studio, Prodigy tools","Inter-annotator agreement metrics","Active learning reduces cost"],
    related:["ner","pos-tagging","rlhf","active-learning"], tags:["practice","data"] },

  { id:"active-learning", name:"Active Learning", cat:"training", difficulty:"intermediate",
    desc:"Iteratively selecting the most informative unlabeled examples for human annotation — maximizing model improvement per annotation dollar.",
    details:"Active learning strategies: uncertainty sampling (annotate examples the model is least confident about), diversity sampling (cover the input space), committee disagreement, and expected model change. Reduces annotation needs by 50-80% compared to random sampling. Particularly valuable for NER, classification, and other supervised NLP tasks where labeling is expensive.",
    keyPoints:["Select most informative examples for labeling","Uncertainty, diversity, committee strategies","50-80% annotation cost reduction","Critical for expensive labeling tasks"],
    related:["annotation","fine-tuning","data-curation","few-shot-learning"], tags:["technique","efficient"] },

  { id:"low-resource-nlp", name:"Low-Resource NLP", cat:"applications", difficulty:"intermediate",

  { id:"cross-encoder", name:"Cross-Encoder", cat:"search", difficulty:"intermediate",

  { id:"test-time-compute", name:"Test-Time Compute Scaling", cat:"reasoning", difficulty:"advanced",
