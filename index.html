<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NLP & GenAI Encyclopedia</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=JetBrains+Mono:wght@400;500&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a26;--surface3:#222233;
--border:#2a2a3d;--border-light:#3a3a55;
--text:#e8e6f0;--text-dim:#9994b8;--text-muted:#6b6588;
--accent:#7c6aef;--accent-light:#9d8df7;--accent-glow:rgba(124,106,239,0.15);
--accent2:#ef6a9a;--accent3:#6aefcf;--accent4:#efcf6a;--accent5:#6ab4ef;
--cat-foundations:#7c6aef;--cat-preprocessing:#ef6a9a;--cat-embeddings:#6aefcf;
--cat-architectures:#efcf6a;--cat-llm:#6ab4ef;--cat-training:#ef8f6a;
--cat-prompting:#b86aef;--cat-rag:#6aefc0;--cat-generation:#ef6ad0;
--cat-nlu:#6aef8f;--cat-extraction:#d0ef6a;--cat-sentiment:#ef6a6a;
--cat-translation:#6ad0ef;--cat-summarization:#c06aef;--cat-qa:#efb06a;
--cat-dialogue:#6aefef;--cat-speech:#ef6ab0;--cat-multimodal:#90ef6a;
--cat-evaluation:#efef6a;--cat-ethics:#ef906a;--cat-infrastructure:#6a90ef;
--cat-search:#6aefb0;--cat-agents:#d06aef;--cat-knowledge:#efcf6a;
--cat-syntax:#8fef6a;--cat-classical:#ef6a8f;--cat-deeplearning:#6acfef;
--cat-reasoning:#cf6aef;--cat-memory:#6aef6a;--cat-diffusion:#ef6acf;
--cat-rl:#cfef6a;--cat-tokenization:#6a6aef;--cat-scaling:#ef9f6a;
--cat-linguistics:#9fef6a;--cat-applications:#6aafef;
--radius:10px;--radius-sm:6px;
--shadow:0 4px 24px rgba(0,0,0,0.4);
}
html{scroll-behavior:smooth}
body{font-family:'Source Sans 3',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;overflow-x:hidden;min-height:100vh}
::selection{background:var(--accent);color:#fff}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:3px}

/* HEADER */
.hero{position:relative;padding:60px 40px 40px;text-align:center;overflow:hidden;border-bottom:1px solid var(--border)}
.hero::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 50% 0%,rgba(124,106,239,0.08) 0%,transparent 60%);pointer-events:none}
.hero h1{font-family:'DM Serif Display',serif;font-size:clamp(2rem,5vw,3.5rem);color:var(--text);letter-spacing:-1px;margin-bottom:8px;position:relative}
.hero h1 span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero .subtitle{color:var(--text-dim);font-size:clamp(0.9rem,2vw,1.1rem);font-weight:300;max-width:700px;margin:0 auto 24px}
.stats-bar{display:flex;gap:32px;justify-content:center;flex-wrap:wrap;margin-bottom:24px}
.stat{text-align:center}
.stat .num{font-family:'JetBrains Mono',monospace;font-size:1.6rem;font-weight:500;color:var(--accent-light)}
.stat .label{font-size:0.75rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.5px}

/* SEARCH */
.search-container{max-width:700px;margin:0 auto;position:relative}
.search-container input{width:100%;padding:14px 20px 14px 48px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:1rem;font-family:'Source Sans 3',sans-serif;outline:none;transition:all 0.3s}
.search-container input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.search-container input::placeholder{color:var(--text-muted)}
.search-container .search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none}
.search-container .clear-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1.2rem;display:none;padding:4px 8px}
.search-container .clear-btn.show{display:block}

/* LAYOUT */
.app{display:flex;min-height:calc(100vh - 200px)}
.sidebar{width:280px;min-width:280px;background:var(--surface);border-right:1px solid var(--border);padding:20px 0;position:sticky;top:0;height:100vh;overflow-y:auto;transition:transform 0.3s}
.main{flex:1;padding:30px 40px;max-width:1200px}

/* SIDEBAR */
.sidebar-title{font-size:0.7rem;text-transform:uppercase;letter-spacing:2px;color:var(--text-muted);padding:0 20px;margin-bottom:12px;font-weight:600}
.cat-list{list-style:none}
.cat-item{padding:9px 20px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:all 0.2s;font-size:0.88rem;color:var(--text-dim);border-left:3px solid transparent}
.cat-item:hover{background:var(--surface2);color:var(--text)}
.cat-item.active{color:var(--text);background:var(--accent-glow);border-left-color:var(--accent)}
.cat-item .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cat-item .count{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:var(--text-muted);background:var(--surface2);padding:2px 6px;border-radius:10px}
.cat-item.active .count{background:var(--accent);color:#fff}

/* MOBILE TOGGLE */
.mobile-toggle{display:none;position:fixed;bottom:24px;right:24px;z-index:100;width:52px;height:52px;border-radius:50%;background:var(--accent);border:none;color:#fff;font-size:1.4rem;cursor:pointer;box-shadow:0 4px 20px rgba(124,106,239,0.4)}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:49}

/* CATEGORY HEADER */
.cat-header{margin-bottom:28px}
.cat-header h2{font-family:'DM Serif Display',serif;font-size:1.8rem;margin-bottom:4px}
.cat-header p{color:var(--text-dim);font-size:0.95rem}
.cat-header .badge{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:0.72rem;padding:3px 10px;border-radius:20px;margin-top:8px}

/* CARD GRID */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;cursor:pointer;transition:all 0.25s;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;opacity:0;transition:opacity 0.3s}
.card:hover{border-color:var(--border-light);transform:translateY(-2px);box-shadow:var(--shadow)}
.card:hover::before{opacity:1}
.card .card-title{font-weight:600;font-size:1.05rem;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.card .card-title .aka{font-size:0.72rem;color:var(--text-muted);font-weight:400;font-family:'JetBrains Mono',monospace}
.card .card-desc{color:var(--text-dim);font-size:0.88rem;line-height:1.55;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card .card-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.card .tag{font-size:0.68rem;padding:2px 8px;border-radius:20px;background:var(--surface2);color:var(--text-muted);font-family:'JetBrains Mono',monospace}
.card .difficulty{position:absolute;top:12px;right:12px;font-size:0.65rem;padding:2px 8px;border-radius:10px;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:0.5px}
.card .difficulty.beginner{background:rgba(106,239,207,0.1);color:var(--accent3)}
.card .difficulty.intermediate{background:rgba(239,207,106,0.1);color:var(--accent4)}
.card .difficulty.advanced{background:rgba(239,106,154,0.1);color:var(--accent2)}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;justify-content:center;align-items:start;padding:40px 20px;overflow-y:auto;backdrop-filter:blur(4px)}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;max-width:780px;width:100%;padding:40px;position:relative;animation:modalIn 0.3s ease}
@keyframes modalIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.modal-close{position:absolute;top:16px;right:16px;background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.modal-close:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.modal .modal-cat{font-size:0.72rem;text-transform:uppercase;letter-spacing:1.5px;font-weight:600;margin-bottom:8px}
.modal h2{font-family:'DM Serif Display',serif;font-size:1.8rem;margin-bottom:4px}
.modal .modal-aka{font-family:'JetBrains Mono',monospace;font-size:0.82rem;color:var(--text-muted);margin-bottom:16px}
.modal .modal-body{color:var(--text-dim);line-height:1.75;font-size:0.95rem;margin-bottom:20px}
.modal .modal-body p{margin-bottom:12px}
.modal .modal-section{margin-bottom:20px}
.modal .modal-section h3{font-size:0.95rem;font-weight:600;color:var(--text);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.modal .key-points{list-style:none;padding:0}
.modal .key-points li{padding:6px 0 6px 20px;position:relative;color:var(--text-dim);font-size:0.9rem}
.modal .key-points li::before{content:'›';position:absolute;left:0;color:var(--accent);font-weight:700;font-size:1.1rem}
.modal .related-tags{display:flex;gap:6px;flex-wrap:wrap}
.modal .related-tag{font-size:0.75rem;padding:4px 12px;border-radius:20px;background:var(--surface2);color:var(--text-dim);cursor:pointer;transition:all 0.2s;border:1px solid var(--border)}
.modal .related-tag:hover{border-color:var(--accent);color:var(--accent)}
.modal .meta-row{display:flex;gap:16px;flex-wrap:wrap;padding-top:16px;border-top:1px solid var(--border)}
.modal .meta-item{font-size:0.78rem;color:var(--text-muted)}
.modal .meta-item span{color:var(--text-dim);font-weight:500}

/* EMPTY STATE */
.empty-state{text-align:center;padding:80px 20px;color:var(--text-muted)}
.empty-state .emoji{font-size:3rem;margin-bottom:16px}
.empty-state p{font-size:1.1rem}
.empty-state .hint{font-size:0.85rem;margin-top:8px}

/* BACK TO TOP */
.back-top{position:fixed;bottom:24px;left:24px;width:44px;height:44px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);cursor:pointer;font-size:1.1rem;display:none;align-items:center;justify-content:center;z-index:90;transition:all 0.2s}
.back-top.show{display:flex}
.back-top:hover{background:var(--accent);color:#fff;border-color:var(--accent)}

/* RESPONSIVE */
@media(max-width:900px){
  .sidebar{position:fixed;left:0;top:0;z-index:50;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block}
  .mobile-toggle{display:flex;align-items:center;justify-content:center}
  .main{padding:20px 16px}
  .card-grid{grid-template-columns:1fr}
  .hero{padding:40px 20px 30px}
  .modal{padding:24px;margin:20px 0}
}
@media(max-width:500px){
  .stats-bar{gap:20px}
  .card-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="hero">
  <h1>NLP & <span>GenAI</span> Encyclopedia</h1>
  <p class="subtitle">A comprehensive interactive reference covering every major concept in Natural Language Processing, Generative AI, and Large Language Models</p>
  <div class="stats-bar">
    <div class="stat"><div class="num" id="totalConcepts">0</div><div class="label">Concepts</div></div>
    <div class="stat"><div class="num" id="totalCategories">0</div><div class="label">Categories</div></div>
    <div class="stat"><div class="num" id="totalVisible">0</div><div class="label">Showing</div></div>
  </div>
  <div class="search-container">
    <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Search concepts, categories, or keywords..." autocomplete="off">
    <button class="clear-btn" id="clearSearch" onclick="clearSearch()">&times;</button>
  </div>
</div>

<div class="app">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
  <main class="main" id="mainContent"></main>
</div>

<button class="mobile-toggle" onclick="toggleSidebar()">☰</button>
<button class="back-top" id="backTop" onclick="window.scrollTo({top:0})">↑</button>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal"></div>
</div>

<script>
// ═══════════════════════════════════════════════
//  EXHAUSTIVE NLP & GENAI CONCEPT DATABASE
// ═══════════════════════════════════════════════

const CATEGORIES = [
  { id:"foundations", name:"Foundations & Linguistics", color:"var(--cat-foundations)", desc:"Core linguistic theories, formal language concepts, and foundational NLP principles" },
  { id:"preprocessing", name:"Text Preprocessing", color:"var(--cat-preprocessing)", desc:"Techniques for cleaning, normalizing, and preparing text data" },
  { id:"tokenization", name:"Tokenization", color:"var(--cat-tokenization)", desc:"Methods for splitting text into sub-units for model consumption" },
  { id:"embeddings", name:"Embeddings & Representations", color:"var(--cat-embeddings)", desc:"Vector representations of words, sentences, and documents" },
  { id:"syntax", name:"Syntax & Parsing", color:"var(--cat-syntax)", desc:"Grammatical structure analysis and tree-based representations" },
  { id:"semantics", name:"Semantic Analysis", color:"var(--cat-linguistics)", desc:"Meaning extraction, word sense, and semantic role analysis" },
  { id:"classical", name:"Classical NLP Methods", color:"var(--cat-classical)", desc:"Traditional statistical and rule-based NLP techniques" },
  { id:"deeplearning", name:"Deep Learning Foundations", color:"var(--cat-deeplearning)", desc:"Neural network architectures and training techniques foundational to NLP" },
  { id:"architectures", name:"Transformer Architectures", color:"var(--cat-architectures)", desc:"Self-attention based architectures and their variants" },
  { id:"llm", name:"Large Language Models", color:"var(--cat-llm)", desc:"Specific LLM families, scaling laws, and model capabilities" },
  { id:"training", name:"Training & Fine-Tuning", color:"var(--cat-training)", desc:"Methods for training, adapting, and aligning language models" },
  { id:"prompting", name:"Prompt Engineering", color:"var(--cat-prompting)", desc:"Techniques for eliciting desired behavior from language models" },
  { id:"rag", name:"RAG & Retrieval", color:"var(--cat-rag)", desc:"Retrieval-Augmented Generation patterns and retrieval systems" },
  { id:"generation", name:"Text Generation", color:"var(--cat-generation)", desc:"Decoding strategies, controlled generation, and sampling methods" },
  { id:"nlu", name:"NLU & Classification", color:"var(--cat-nlu)", desc:"Natural Language Understanding tasks, intent and entity recognition" },
  { id:"extraction", name:"Information Extraction", color:"var(--cat-extraction)", desc:"Named entity recognition, relation extraction, and knowledge mining" },
  { id:"sentiment", name:"Sentiment & Opinion", color:"var(--cat-sentiment)", desc:"Sentiment analysis, opinion mining, and emotion detection" },
  { id:"translation", name:"Machine Translation", color:"var(--cat-translation)", desc:"Neural and statistical approaches to language translation" },
  { id:"summarization", name:"Summarization", color:"var(--cat-summarization)", desc:"Abstractive and extractive text summarization techniques" },
  { id:"qa", name:"Question Answering", color:"var(--cat-qa)", desc:"Reading comprehension, open-domain QA, and answer extraction" },
  { id:"dialogue", name:"Dialogue & Conversational AI", color:"var(--cat-dialogue)", desc:"Chatbots, dialogue management, and conversational systems" },
  { id:"speech", name:"Speech & Audio NLP", color:"var(--cat-speech)", desc:"ASR, TTS, voice processing, and spoken language understanding" },
  { id:"multimodal", name:"Multimodal AI", color:"var(--cat-multimodal)", desc:"Vision-language models, image captioning, and cross-modal understanding" },
  { id:"reasoning", name:"Reasoning & Planning", color:"var(--cat-reasoning)", desc:"Chain-of-thought, logical reasoning, and agentic planning" },
  { id:"memory", name:"Context & Memory", color:"var(--cat-memory)", desc:"Context window management, long-term memory, and state management" },
  { id:"agents", name:"AI Agents & Tools", color:"var(--cat-agents)", desc:"Tool-using AI, agent frameworks, and autonomous systems" },
  { id:"knowledge", name:"Knowledge Representation", color:"var(--cat-knowledge)", desc:"Knowledge graphs, ontologies, and structured world knowledge" },
  { id:"evaluation", name:"Evaluation & Metrics", color:"var(--cat-evaluation)", desc:"Benchmarks, scoring metrics, and quality assessment methods" },
  { id:"scaling", name:"Scaling & Efficiency", color:"var(--cat-scaling)", desc:"Model compression, distillation, quantization, and inference optimization" },
  { id:"search", name:"Vector Search & Indexing", color:"var(--cat-search)", desc:"Vector databases, similarity search, and indexing strategies" },
  { id:"rl", name:"RLHF & Alignment", color:"var(--cat-rl)", desc:"Reinforcement learning from human feedback and safety alignment" },
  { id:"ethics", name:"Ethics, Safety & Bias", color:"var(--cat-ethics)", desc:"Responsible AI, fairness, bias mitigation, and safety measures" },
  { id:"infrastructure", name:"Infrastructure & Deployment", color:"var(--cat-infrastructure)", desc:"Serving, orchestration, MLOps, and production deployment" },
  { id:"applications", name:"Domain Applications", color:"var(--cat-applications)", desc:"Industry-specific NLP applications and specialized use cases" },
  { id:"diffusion", name:"Diffusion & Other Generative", color:"var(--cat-diffusion)", desc:"Non-autoregressive generative models and diffusion techniques" },
];

const CONCEPTS = [
  // ═══ FOUNDATIONS & LINGUISTICS ═══
  { id:"nlp", name:"Natural Language Processing", aka:"NLP", cat:"foundations", difficulty:"beginner",
    desc:"The interdisciplinary field combining linguistics, computer science, and AI to enable computers to understand, interpret, generate, and interact with human language in useful ways.",
    details:"NLP spans the full pipeline from raw text to semantic understanding. It draws on formal linguistics (syntax, semantics, pragmatics), statistical methods, and deep learning. Modern NLP has shifted from rule-based systems to data-driven neural approaches, though linguistic knowledge remains valuable for feature engineering and error analysis.",
    keyPoints:["Bridges human communication and computational processing","Encompasses both understanding (NLU) and generation (NLG)","Evolved from rule-based to statistical to neural approaches","Applications span translation, summarization, QA, and more"],
    related:["computational-linguistics","nlu","nlg","text-mining"], tags:["core","field"] },

  { id:"computational-linguistics", name:"Computational Linguistics", cat:"foundations", difficulty:"beginner",
    desc:"The scientific study of language from a computational perspective, focusing on formal models of linguistic phenomena and their computational implementations.",
    details:"Computational linguistics is the academic discipline underlying NLP. It encompasses formal grammars (CFG, HPSG, LFG), computational morphology, phonological rules, syntactic parsing, semantic formalisms, and discourse modeling. Unlike applied NLP, it focuses on testing linguistic theories through computation.",
    keyPoints:["Formal grammar theories (CFG, HPSG, TAG)","Computational models of phonology, morphology, syntax, semantics","Intersection of theoretical linguistics and CS","Provides theoretical backbone for NLP systems"],
    related:["nlp","formal-grammar","morphology","phonology"], tags:["theory","linguistics"] },

  { id:"corpus-linguistics", name:"Corpus Linguistics", cat:"foundations", difficulty:"beginner",
    desc:"The study of language through large collections of naturally occurring text (corpora), analyzing frequency patterns, collocations, and usage trends.",
    details:"Corpus linguistics provides empirical foundations for NLP. Key concepts include word frequency distributions (Zipf's law), concordance analysis, collocation extraction, n-gram statistics, and corpus annotation. Major corpora include the British National Corpus (BNC), Penn Treebank, Common Crawl, and domain-specific corpora.",
    keyPoints:["Frequency analysis and distributional statistics","Concordance and KWIC (Key Word In Context)","Corpus annotation schemes (POS, NER, parse trees)","Zipf's law and power law distributions"],
    related:["zipfs-law","ngrams","collocation","annotation"], tags:["data","empirical"] },

  { id:"morphology", name:"Morphology", cat:"foundations", difficulty:"intermediate",
    desc:"The study of the internal structure of words, including roots, prefixes, suffixes, infixes, and how morphemes combine to create meaning.",
    details:"Morphological analysis is critical for NLP in morphologically rich languages (Turkish, Finnish, Arabic). Types include inflectional morphology (verb conjugation, noun declension) and derivational morphology (creating new words from existing roots). Computational morphology uses finite-state transducers and neural seq2seq models.",
    keyPoints:["Morphemes: smallest meaningful units","Inflectional vs. derivational morphology","Finite-state transducers for morphological analysis","Critical for agglutinative languages"],
    related:["stemming","lemmatization","subword-tokenization","bpe"], tags:["linguistics","structure"] },

  { id:"phonology", name:"Phonology", cat:"foundations", difficulty:"intermediate",
    desc:"The study of sound systems in language, covering phonemes, allophones, prosody, and the rules governing sound patterns.",
    details:"Relevant to NLP through speech recognition/synthesis, grapheme-to-phoneme conversion, rhyme detection, and text-to-speech. Computational phonology models phonotactic constraints, stress patterns, intonation contours, and cross-linguistic sound correspondences.",
    keyPoints:["Phonemes and allophones","Prosody, stress, and intonation","Grapheme-to-phoneme (G2P) conversion","IPA (International Phonetic Alphabet)"],
    related:["asr","tts","g2p","prosody"], tags:["linguistics","speech"] },

  { id:"pragmatics", name:"Pragmatics", cat:"foundations", difficulty:"intermediate",
    desc:"The study of how context, speaker intent, and social conventions influence language meaning beyond literal semantics.",
    details:"Pragmatics covers speech acts (assertions, requests, promises), implicature (Grice's maxims), presupposition, deixis, and discourse structure. In NLP, pragmatic understanding is essential for chatbots, sarcasm detection, and intent classification. LLMs implicitly learn some pragmatic reasoning but struggle with nuanced cases.",
    keyPoints:["Speech act theory (Austin, Searle)","Grice's cooperative principle and maxims","Implicature and presupposition","Deixis and reference resolution"],
    related:["discourse-analysis","intent-classification","coreference","sarcasm-detection"], tags:["linguistics","context"] },

  { id:"discourse-analysis", name:"Discourse Analysis", cat:"foundations", difficulty:"intermediate",
    desc:"The study of language beyond the sentence level, examining how sentences connect to form coherent texts and conversations.",
    details:"Discourse analysis covers coherence relations (RST - Rhetorical Structure Theory), discourse connectives, topic modeling, information structure (given/new), and conversational analysis. Critical for summarization, dialogue systems, and document-level understanding.",
    keyPoints:["Rhetorical Structure Theory (RST)","Coherence and cohesion devices","Topic continuity and shift","Information structure (theme/rheme)"],
    related:["coreference","topic-modeling","summarization","dialogue-management"], tags:["linguistics","structure"] },

  { id:"formal-grammar", name:"Formal Grammars", cat:"foundations", difficulty:"advanced",
    desc:"Mathematical frameworks for defining the syntactic structure of languages, including context-free, context-sensitive, and other grammar formalisms.",
    details:"The Chomsky hierarchy classifies grammars by generative power: regular (Type 3), context-free (Type 2), context-sensitive (Type 1), and unrestricted (Type 0). CFGs form the basis of most syntactic parsers. Extensions include probabilistic CFGs (PCFGs), tree-adjoining grammars (TAGs), head-driven phrase structure grammars (HPSG), and combinatory categorial grammars (CCG).",
    keyPoints:["Chomsky hierarchy of formal languages","Context-free grammars and PCFGs","Tree-adjoining grammars (TAG)","Categorial and dependency grammars"],
    related:["constituency-parsing","dependency-parsing","pcfg","syntax-analysis"], tags:["theory","formal"] },

  { id:"distributional-hypothesis", name:"Distributional Hypothesis", cat:"foundations", difficulty:"beginner",
    desc:"The linguistic theory that words occurring in similar contexts tend to have similar meanings — 'You shall know a word by the company it keeps' (Firth, 1957).",
    details:"This hypothesis is the theoretical foundation of word embeddings. Co-occurrence statistics capture semantic similarity: words appearing in similar contexts develop similar vector representations. This insight drives Word2Vec, GloVe, and contextual embeddings. It explains why 'cat' and 'dog' end up near each other in embedding space.",
    keyPoints:["Foundation for all embedding methods","Co-occurrence drives semantic similarity","Firth (1957) and Harris (1954)","Explains success of Word2Vec, GloVe, BERT"],
    related:["word2vec","glove","word-embeddings","co-occurrence-matrix"], tags:["theory","core"] },

  { id:"zipfs-law", name:"Zipf's Law", cat:"foundations", difficulty:"beginner",
    desc:"The empirical observation that word frequency is inversely proportional to rank — the most frequent word appears roughly twice as often as the second most frequent, three times as often as the third, and so on.",
    details:"Zipf's law (f ∝ 1/r) governs natural language statistics and has profound implications for NLP: vocabulary coverage follows a long tail, rare words dominate the vocabulary, and frequency-based pruning must account for information loss. Affects tokenizer design, vocabulary sizing, and handling of out-of-vocabulary words.",
    keyPoints:["Frequency inversely proportional to rank","Long tail of rare words","Impacts vocabulary design and OOV handling","Observed across all natural languages"],
    related:["corpus-linguistics","vocabulary","oov","subword-tokenization"], tags:["statistics","law"] },

  { id:"ambiguity", name:"Linguistic Ambiguity", cat:"foundations", difficulty:"beginner",
    desc:"The phenomenon where a word, phrase, or sentence can be interpreted in multiple ways — a central challenge in NLP.",
    details:"Types include lexical ambiguity (bank = river bank vs. financial bank), syntactic ambiguity (\"I saw the man with the telescope\"), semantic ambiguity (scope ambiguity in quantifiers), and pragmatic ambiguity (indirect speech acts). Word sense disambiguation (WSD) and contextual models like BERT help resolve ambiguity.",
    keyPoints:["Lexical ambiguity (polysemy, homonymy)","Syntactic ambiguity (PP attachment, garden paths)","Semantic scope ambiguity","Resolved through context and world knowledge"],
    related:["wsd","polysemy","pos-tagging","contextual-embeddings"], tags:["challenge","core"] },

  { id:"polysemy", name:"Polysemy", cat:"foundations", difficulty:"intermediate",
    desc:"A single word form having multiple related meanings (e.g., 'run' can mean to jog, to manage, to operate, a run in stockings, etc.).",
    details:"Polysemy is distinct from homonymy (unrelated meanings, same form). It's a major challenge for static word embeddings which assign a single vector per word. Contextual embeddings (BERT, GPT) naturally handle polysemy by producing different representations based on context. Word Sense Disambiguation (WSD) explicitly addresses this.",
    keyPoints:["Related but distinct word senses","Distinguished from homonymy","Static embeddings collapse all senses","Contextual models handle it naturally"],
    related:["wsd","ambiguity","contextual-embeddings","bert"], tags:["linguistics","semantics"] },

  { id:"compositionality", name:"Compositionality", cat:"foundations", difficulty:"intermediate",
    desc:"The principle that the meaning of a complex expression is determined by its structure and the meanings of its parts — and how neural models handle (or fail) compositional reasoning.",
    details:"Frege's principle of compositionality states that meaning is built up from parts. In NLP, this raises questions about whether neural networks truly learn compositional representations. Tests like SCAN, COGS, and systematic generalization benchmarks probe this. Compositional generalization remains a challenge for current LLMs.",
    keyPoints:["Frege's principle of compositionality","Compositional generalization in neural models","SCAN and COGS benchmarks","Tension with distributional semantics"],
    related:["formal-grammar","semantic-parsing","systematic-generalization"], tags:["theory","semantics"] },

  // ═══ TEXT PREPROCESSING ═══
  { id:"text-normalization", name:"Text Normalization", cat:"preprocessing", difficulty:"beginner",
    desc:"The process of transforming text into a canonical, consistent form by handling casing, punctuation, special characters, numbers, and encoding issues.",
    details:"Includes lowercasing, Unicode normalization (NFC, NFD, NFKC, NFKD), removing diacritics, handling contractions, expanding abbreviations, number-to-word conversion, and whitespace normalization. Critical first step in any NLP pipeline. Modern transformers are more robust to unnormalized text but preprocessing still improves consistency.",
    keyPoints:["Unicode normalization forms (NFC/NFD/NFKC/NFKD)","Case folding and accent stripping","Contraction expansion","Domain-specific normalization rules"],
    related:["tokenization-overview","cleaning","regex","encoding"], tags:["pipeline","preprocessing"] },

  { id:"stemming", name:"Stemming", cat:"preprocessing", difficulty:"beginner",
    desc:"A heuristic process of reducing words to their root form by stripping suffixes, often producing non-dictionary stems (e.g., 'running' → 'run', 'studies' → 'studi').",
    details:"Major stemmers include Porter Stemmer (English, rule-based suffix stripping), Snowball Stemmer (multilingual), and Lancaster Stemmer (more aggressive). Stemming is faster but less accurate than lemmatization. Used in information retrieval, search engines, and as a feature reduction technique. Not suitable when precise word forms matter.",
    keyPoints:["Porter, Snowball, Lancaster algorithms","Faster but less accurate than lemmatization","Produces non-word stems sometimes","Common in information retrieval"],
    related:["lemmatization","morphology","text-normalization","ir"], tags:["technique","reduction"] },

  { id:"lemmatization", name:"Lemmatization", cat:"preprocessing", difficulty:"beginner",
    desc:"Reducing words to their dictionary form (lemma) using vocabulary and morphological analysis (e.g., 'better' → 'good', 'ran' → 'run').",
    details:"Unlike stemming, lemmatization produces valid dictionary words by using morphological analysis and POS information. Tools include WordNet Lemmatizer, spaCy's lemmatizer, and Stanza. Requires POS tags for accuracy ('meeting' as noun vs. verb). More computationally expensive than stemming but more linguistically accurate.",
    keyPoints:["Produces valid dictionary forms","Requires POS tag context","Uses morphological dictionaries","More accurate than stemming"],
    related:["stemming","pos-tagging","morphology","wordnet"], tags:["technique","reduction"] },

  { id:"stopwords", name:"Stop Word Removal", cat:"preprocessing", difficulty:"beginner",
    desc:"Filtering out high-frequency, low-information words (the, is, at, which) that add noise without contributing to semantic meaning.",
    details:"Stop word lists vary by language and domain. Standard lists exist in NLTK, spaCy, and scikit-learn. However, modern transformers generally should NOT have stop words removed as they contribute to syntactic understanding. Stop word removal remains useful for bag-of-words models, TF-IDF, and topic modeling.",
    keyPoints:["Language-specific stop word lists","Useful for BoW and TF-IDF models","NOT recommended for transformer inputs","Domain-specific stop words may differ"],
    related:["tfidf","bow","text-normalization","feature-engineering"], tags:["technique","filtering"] },

  { id:"regex", name:"Regular Expressions in NLP", cat:"preprocessing", difficulty:"intermediate",
    desc:"Pattern-matching syntax for text extraction, validation, cleaning, and simple tokenization — a fundamental tool in text preprocessing.",
    details:"Regex patterns handle tasks like email/URL extraction, phone number detection, date parsing, whitespace normalization, and markup removal. Key NLP patterns: sentence splitting, token boundary detection, entity pattern matching. Performance matters for large corpora — compiled patterns and non-backtracking engines preferred.",
    keyPoints:["Pattern matching for text cleaning","Entity pattern extraction (emails, URLs, dates)","Sentence boundary detection","Performance optimization for large corpora"],
    related:["text-normalization","rule-based-ner","cleaning","tokenization-overview"], tags:["tool","technique"] },

  { id:"cleaning", name:"Text Cleaning", cat:"preprocessing", difficulty:"beginner",
    desc:"Removing noise from raw text including HTML tags, special characters, extra whitespace, boilerplate, headers/footers, and encoding artifacts.",
    details:"Cleaning strategies vary by source: web scraping needs HTML/JavaScript removal, PDF extraction needs layout artifact cleanup, OCR output needs error correction, and social media needs emoji/hashtag handling. Libraries like BeautifulSoup, ftfy (fixes text for you), and cleantext provide utilities. Over-cleaning can remove useful signals.",
    keyPoints:["HTML/XML tag removal","Encoding fix (ftfy library)","Domain-specific cleaning rules","Balance between noise removal and information preservation"],
    related:["text-normalization","regex","ocr","document-parsing"], tags:["pipeline","preprocessing"] },

  { id:"sentence-segmentation", name:"Sentence Segmentation", aka:"Sentence Boundary Detection", cat:"preprocessing", difficulty:"beginner",
    desc:"Splitting continuous text into individual sentences — complicated by abbreviations (Dr., U.S.A.), decimal numbers, ellipses, and other period-containing constructs.",
    details:"Rule-based approaches (punkt tokenizer in NLTK) use unsupervised abbreviation detection. Neural approaches (spaCy's sentencizer) use trained models. Challenges include: abbreviations with periods, bulleted lists, URLs, code snippets, and multilingual text. Accurate sentence segmentation is critical for downstream tasks.",
    keyPoints:["Punkt tokenizer (unsupervised)","Neural sentence boundary detection","Handles abbreviations and edge cases","Critical for document processing pipelines"],
    related:["tokenization-overview","text-normalization","document-parsing"], tags:["technique","segmentation"] },

  { id:"deduplication", name:"Text Deduplication", cat:"preprocessing", difficulty:"intermediate",
    desc:"Identifying and removing duplicate or near-duplicate documents/passages from corpora to improve training data quality.",
    details:"Exact deduplication uses hashing (MD5, SHA). Near-duplicate detection uses MinHash, SimHash, Locality-Sensitive Hashing (LSH), or suffix arrays. Critical for LLM pretraining data — C4, The Pile, and RedPajama all use deduplication. Reduces training cost, prevents memorization of repeated content, and improves model generalization.",
    keyPoints:["MinHash and SimHash for near-duplicates","Locality-Sensitive Hashing (LSH)","Critical for pretraining data quality","Reduces memorization and improves generalization"],
    related:["data-curation","pretraining","lsh","data-quality"], tags:["data","quality"] },

  { id:"data-augmentation-nlp", name:"Text Data Augmentation", cat:"preprocessing", difficulty:"intermediate",
    desc:"Techniques for artificially expanding training datasets through transformations like synonym replacement, back-translation, paraphrasing, and noise injection.",
    details:"Methods include: synonym replacement (WordNet), random insertion/deletion/swap (EDA), back-translation through another language, paraphrase generation with LLMs, contextual word replacement (using BERT), mixup in embedding space, and label-preserving transformations. Particularly valuable for low-resource settings and class imbalance.",
    keyPoints:["EDA: Easy Data Augmentation","Back-translation augmentation","BERT-based contextual replacement","LLM-generated paraphrases"],
    related:["back-translation","few-shot-learning","low-resource-nlp","synonym"], tags:["technique","training"] },

  // ═══ TOKENIZATION ═══
  { id:"tokenization-overview", name:"Tokenization", cat:"tokenization", difficulty:"beginner",
    desc:"The process of splitting text into discrete units (tokens) that serve as the fundamental input to language models — from simple whitespace splitting to sophisticated subword algorithms.",
    details:"Tokenization determines the vocabulary and granularity of model inputs. Types range from character-level (every character is a token) to word-level (whitespace/punctuation splitting) to subword-level (BPE, WordPiece, Unigram). Modern LLMs universally use subword tokenization for the optimal balance of vocabulary size and coverage.",
    keyPoints:["Determines model input granularity","Character vs. word vs. subword levels","Subword methods dominate modern NLP","Tokenizer must match the model's training"],
    related:["bpe","wordpiece","sentencepiece","unigram-model"], tags:["core","pipeline"] },

  { id:"bpe", name:"Byte Pair Encoding", aka:"BPE", cat:"tokenization", difficulty:"intermediate",
    desc:"A subword tokenization algorithm that iteratively merges the most frequent pair of adjacent tokens, building a vocabulary from characters up to common subwords and full words.",
    details:"Originally a data compression algorithm, BPE was adapted for NLP by Sennrich et al. (2016). Starting from individual characters, it greedily merges the most frequent pair at each step until reaching a target vocabulary size. Used by GPT-2/3/4, RoBERTa, and many others. Byte-level BPE (used by GPT-2+) operates on bytes instead of Unicode characters, guaranteeing coverage of any input.",
    keyPoints:["Iterative greedy merging of frequent pairs","No out-of-vocabulary words","Byte-level BPE handles any Unicode","Used by GPT family, RoBERTa"],
    related:["wordpiece","sentencepiece","tokenization-overview","vocabulary"], tags:["algorithm","core"] },

  { id:"wordpiece", name:"WordPiece", cat:"tokenization", difficulty:"intermediate",
    desc:"Google's subword tokenization algorithm that selects merges based on maximizing the likelihood of the training data, rather than raw frequency.",
    details:"WordPiece differs from BPE by choosing merges that maximize the language model likelihood on training data rather than simply the most frequent pair. Uses '##' prefix to indicate continuation subwords. Employed by BERT, DistilBERT, and ELECTRA. Vocabulary typically 30k-50k tokens.",
    keyPoints:["Likelihood-based merge selection","## prefix for continuation tokens","Used by BERT family","Typically 30k-50k vocabulary size"],
    related:["bpe","bert","sentencepiece","tokenization-overview"], tags:["algorithm","google"] },

  { id:"sentencepiece", name:"SentencePiece", cat:"tokenization", difficulty:"intermediate",
    desc:"A language-independent, unsupervised text tokenizer and detokenizer that treats the input as a raw byte stream, supporting both BPE and Unigram models.",
    details:"SentencePiece (Kudo & Richardson, 2018) treats whitespace as a regular character (using ▁ to mark word boundaries), enabling language-agnostic tokenization. Supports both BPE and unigram language model algorithms. Used by T5, LLaMA, ALBERT, XLNet. Enables direct training on raw text without pre-tokenization.",
    keyPoints:["Language-agnostic (no pre-tokenization needed)","Treats whitespace as a character (▁)","Supports BPE and Unigram algorithms","Used by T5, LLaMA, ALBERT"],
    related:["bpe","unigram-model","wordpiece","tokenization-overview"], tags:["tool","algorithm"] },

  { id:"unigram-model", name:"Unigram Language Model Tokenization", cat:"tokenization", difficulty:"advanced",
    desc:"A subword tokenization method that starts with a large vocabulary and iteratively prunes tokens that least affect the overall likelihood — the opposite direction from BPE.",
    details:"The Unigram model (Kudo, 2018) begins with a large seed vocabulary and removes tokens whose loss has the smallest impact on the training data likelihood. Uses the Viterbi algorithm to find the optimal segmentation. Provides probabilistic segmentation (multiple valid tokenizations with different probabilities), unlike BPE which is deterministic.",
    keyPoints:["Top-down pruning (opposite of BPE)","Probabilistic segmentation","Viterbi algorithm for optimal tokenization","Multiple valid segmentations per input"],
    related:["bpe","sentencepiece","subword-regularization"], tags:["algorithm","probabilistic"] },

  { id:"tiktoken", name:"Tiktoken", cat:"tokenization", difficulty:"beginner",
    desc:"OpenAI's fast BPE tokenizer implementation used for GPT-3.5, GPT-4, and related models — essential for token counting and cost estimation.",
    details:"Tiktoken provides efficient tokenization matching OpenAI's models. Key encodings: cl100k_base (GPT-4, GPT-3.5-turbo, text-embedding-ada-002) and o200k_base (GPT-4o). Critical for: token count estimation, cost calculation, context window management, and prompt length optimization.",
    keyPoints:["Fast BPE implementation by OpenAI","cl100k_base and o200k_base encodings","Essential for token counting and cost estimation","Matches GPT model tokenization exactly"],
    related:["bpe","context-window","token-counting","gpt4"], tags:["tool","openai"] },

  { id:"vocabulary", name:"Vocabulary & OOV Handling", cat:"tokenization", difficulty:"beginner",
    desc:"The fixed set of tokens a model can process, and strategies for handling out-of-vocabulary (OOV) words that weren't seen during training.",
    details:"Vocabulary size affects model capacity, memory, and generalization. Larger vocabularies reduce sequence length but increase embedding table size. OOV strategies: [UNK] token, subword fallback, character-level decomposition, or byte-level encoding. Modern subword tokenizers effectively eliminate OOV by falling back to character/byte level.",
    keyPoints:["Vocabulary size tradeoffs (30k-250k typical)","OOV handled by subword fallback","Special tokens ([CLS], [SEP], [PAD], [MASK])","Vocabulary coverage vs. model size"],
    related:["bpe","wordpiece","special-tokens","embedding-layer"], tags:["design","core"] },

  { id:"subword-regularization", name:"Subword Regularization", cat:"tokenization", difficulty:"advanced",
    desc:"Training technique that samples from multiple valid tokenizations of the same text to improve model robustness and generalization.",
    details:"Since subword tokenization can segment the same word multiple ways (e.g., 'unhappiness' → 'un+happiness' or 'un+happ+iness'), subword regularization randomly samples different segmentations during training. Implemented in SentencePiece's unigram model using the Viterbi n-best algorithm. Improves robustness to tokenization artifacts.",
    keyPoints:["Multiple valid segmentations per word","Random sampling during training","Improves model robustness","Native to Unigram model in SentencePiece"],
    related:["unigram-model","sentencepiece","dropout-training"], tags:["technique","robustness"] },

  // ═══ EMBEDDINGS & REPRESENTATIONS ═══
  { id:"word-embeddings", name:"Word Embeddings", cat:"embeddings", difficulty:"beginner",
    desc:"Dense, low-dimensional vector representations of words where geometric proximity encodes semantic similarity — the foundation of modern NLP.",
    details:"Word embeddings map discrete tokens to continuous vector spaces (typically 50-300 dimensions). Words with similar meanings cluster together. Key properties: semantic similarity (king-queen ≈ man-woman), analogy solving, and transfer learning. Evolved from static (Word2Vec, GloVe) to contextualized (BERT, GPT) representations.",
    keyPoints:["Dense vectors in continuous space","Semantic similarity through geometric proximity","Analogy relationships (king-queen ≈ man-woman)","Foundation for neural NLP"],
    related:["word2vec","glove","fasttext","distributional-hypothesis"], tags:["core","representation"] },

  { id:"word2vec", name:"Word2Vec", cat:"embeddings", difficulty:"intermediate",
    desc:"A neural network-based method for learning word embeddings using either CBOW (predicting a word from context) or Skip-gram (predicting context from a word) — Mikolov et al., 2013.",
    details:"Word2Vec revolutionized NLP by showing that simple neural networks trained on large corpora produce embeddings capturing semantic relationships. Skip-gram with negative sampling (SGNS) is most common. Training uses negative sampling or hierarchical softmax for efficiency. Despite being static (one vector per word), Word2Vec remains influential for understanding embedding properties.",
    keyPoints:["CBOW and Skip-gram architectures","Negative sampling for efficient training","Captures semantic analogies","200-300 dimensional vectors typical"],
    related:["glove","fasttext","word-embeddings","negative-sampling"], tags:["model","seminal"] },

  { id:"glove", name:"GloVe", aka:"Global Vectors", cat:"embeddings", difficulty:"intermediate",
    desc:"Word embedding method that combines global co-occurrence statistics with local context window approaches — Pennington et al., 2014.",
    details:"GloVe factorizes the word-word co-occurrence matrix, combining the benefits of global matrix factorization (LSA) and local context window methods (Word2Vec). The objective function trains word vectors so that their dot product equals the log of the words' probability of co-occurrence. Pre-trained GloVe vectors are widely available (6B, 42B, 840B tokens).",
    keyPoints:["Global co-occurrence matrix factorization","Combines global and local statistics","Pre-trained vectors widely available","Log-bilinear regression objective"],
    related:["word2vec","fasttext","co-occurrence-matrix","word-embeddings"], tags:["model","stanford"] },

  { id:"fasttext", name:"FastText", cat:"embeddings", difficulty:"intermediate",
    desc:"Facebook's extension of Word2Vec that represents each word as a bag of character n-grams, enabling embeddings for unseen words through subword information.",
    details:"FastText (Bojanowski et al., 2017) enriches Word2Vec by including character n-grams (3-6 characters). The word embedding is the sum of its n-gram embeddings. This handles morphological variations and rare/OOV words naturally. Pre-trained vectors available for 157 languages. Also used for fast text classification (FastText classifier).",
    keyPoints:["Character n-gram enriched embeddings","Handles OOV words through subword decomposition","157 language pre-trained models","Also a fast text classification library"],
    related:["word2vec","subword-tokenization","morphology","text-classification"], tags:["model","meta"] },

  { id:"contextual-embeddings", name:"Contextual Embeddings", cat:"embeddings", difficulty:"intermediate",
    desc:"Word representations that vary based on surrounding context, solving the polysemy problem of static embeddings — each word gets a different vector depending on usage.",
    details:"Unlike static embeddings (Word2Vec, GloVe) that assign one vector per word, contextual embeddings generate context-dependent representations. ELMo (2018) pioneered this with bidirectional LSTMs. BERT (2018) and GPT advanced it with transformers. A word like 'bank' gets different embeddings in 'river bank' vs. 'bank account'.",
    keyPoints:["Context-dependent word representations","Solves polysemy problem","ELMo → BERT → GPT evolution","Different vector for same word in different contexts"],
    related:["elmo","bert","gpt","word-embeddings"], tags:["core","representation"] },

  { id:"elmo", name:"ELMo", aka:"Embeddings from Language Models", cat:"embeddings", difficulty:"intermediate",
    desc:"The first major contextual embedding model using a bidirectional LSTM trained on language modeling — Peters et al., 2018.",
    details:"ELMo produces contextual representations by combining multiple layers of a bidirectional LSTM language model. Each layer captures different linguistic properties: lower layers capture syntax, higher layers capture semantics. Representations are a learned weighted combination of all layers. Superseded by transformer-based models but historically significant.",
    keyPoints:["Bidirectional LSTM language model","Layer-wise linguistic representations","Learned weighted layer combination","Bridge from static to contextual embeddings"],
    related:["contextual-embeddings","bert","lstm","language-modeling"], tags:["model","historical"] },

  { id:"sentence-embeddings", name:"Sentence Embeddings", cat:"embeddings", difficulty:"intermediate",
    desc:"Fixed-size vector representations of entire sentences or paragraphs, enabling semantic similarity computation at the sentence level.",
    details:"Methods include: mean pooling of word/token embeddings, [CLS] token from BERT (not ideal without fine-tuning), Sentence-BERT (SBERT) using siamese networks, InferSent, Universal Sentence Encoder, and modern embedding models (E5, BGE, Nomic). Critical for semantic search, RAG, clustering, and deduplication.",
    keyPoints:["Mean pooling vs. [CLS] token","Sentence-BERT (SBERT) with siamese networks","Modern models: E5, BGE, GTE, Nomic","Used for semantic search and RAG"],
    related:["sbert","embedding-models","semantic-similarity","cosine-similarity"], tags:["representation","search"] },

  { id:"sbert", name:"Sentence-BERT", aka:"SBERT", cat:"embeddings", difficulty:"intermediate",
    desc:"A modification of BERT using siamese and triplet networks to produce semantically meaningful sentence embeddings efficient for comparison — Reimers & Gurevych, 2019.",
    details:"Standard BERT requires passing both sentences through the model for comparison (O(n²) for n sentences). SBERT uses siamese architecture to produce independent sentence embeddings, enabling efficient similarity search. Trained with natural language inference (NLI) data. Led to the sentence-transformers library with hundreds of pre-trained models.",
    keyPoints:["Siamese network architecture","Efficient pairwise comparison","sentence-transformers library","NLI-based training"],
    related:["sentence-embeddings","bert","semantic-similarity","embedding-models"], tags:["model","efficiency"] },

  { id:"embedding-models", name:"Modern Embedding Models", cat:"embeddings", difficulty:"intermediate",
    desc:"Latest generation of text embedding models optimized for retrieval and similarity — including E5, BGE, GTE, Nomic Embed, Cohere Embed, and OpenAI embeddings.",
    details:"Modern embedding models are trained with contrastive learning on large-scale paired data. Key models: OpenAI text-embedding-3 (small/large with dimension reduction), Cohere Embed v3 (with compression), BGE (BAAI), E5 (Microsoft), GTE (Alibaba), Nomic Embed, and Jina Embeddings. Evaluated on MTEB benchmark. Support instruction-prefixed encoding for task-specific behavior.",
    keyPoints:["Contrastive learning on paired data","MTEB benchmark evaluation","Instruction-prefixed encoding","Matryoshka dimension reduction"],
    related:["sbert","sentence-embeddings","contrastive-learning","mteb"], tags:["models","current"] },

  { id:"document-embeddings", name:"Document Embeddings", cat:"embeddings", difficulty:"intermediate",
    desc:"Representing entire documents as dense vectors, handling challenges of length, multi-topic content, and hierarchical structure.",
    details:"Approaches include: averaging token/sentence embeddings, Doc2Vec (paragraph vectors), hierarchical attention networks, chunking + aggregation, and late-interaction models (ColBERT). Long documents require chunking strategies as most embedding models have limited context (512-8192 tokens). Multi-vector representations can capture document-level nuance.",
    keyPoints:["Chunking strategies for long documents","Doc2Vec paragraph vectors","Hierarchical attention approaches","Late-interaction models (ColBERT)"],
    related:["sentence-embeddings","chunking","colbert","doc2vec"], tags:["representation","retrieval"] },

  { id:"co-occurrence-matrix", name:"Co-occurrence Matrix", cat:"embeddings", difficulty:"intermediate",
    desc:"A matrix recording how frequently pairs of words appear together within a defined context window, forming the statistical basis for distributional word representations.",
    details:"The word-word co-occurrence matrix counts how often each pair of words appears within a context window (typically 5-10 words). This high-dimensional, sparse matrix can be factorized (SVD/PCA) to produce dense embeddings. GloVe directly operates on this matrix. PMI (Pointwise Mutual Information) weighting improves quality by emphasizing meaningful co-occurrences.",
    keyPoints:["Context window defines co-occurrence","SVD/PCA for dimensionality reduction","PMI weighting for better representations","Foundation for GloVe and LSA"],
    related:["glove","lsa","pmi","svd"], tags:["statistics","method"] },

  { id:"positional-encoding", name:"Positional Encoding", cat:"embeddings", difficulty:"intermediate",
    desc:"Methods for injecting sequence position information into transformer models, since self-attention is inherently position-agnostic.",
    details:"Types: sinusoidal (fixed, original Transformer), learned absolute (BERT, GPT), Rotary Position Embedding (RoPE, LLaMA), ALiBi (attention with linear biases), and relative position encodings (T5). RoPE enables context length extrapolation. Position encoding design significantly impacts long-context capability.",
    keyPoints:["Sinusoidal (fixed) vs. learned","RoPE (Rotary Position Embedding)","ALiBi (attention linear biases)","Critical for context length extrapolation"],
    related:["transformer","rope","alibi","context-window"], tags:["architecture","technique"] },

  { id:"cross-lingual-embeddings", name:"Cross-lingual Embeddings", cat:"embeddings", difficulty:"advanced",
    desc:"Shared embedding spaces where words with similar meanings across different languages are mapped to nearby vectors, enabling zero-shot cross-lingual transfer.",
    details:"Methods include: multilingual training (mBERT, XLM-R), cross-lingual word embedding alignment (MUSE, VecMap), bilingual dictionary induction, and parallel corpus alignment. Enables training a model in English and applying it to other languages. Challenges include: linguistic divergence, script differences, and semantic drift across languages.",
    keyPoints:["Shared multilingual vector space","mBERT and XLM-R approaches","Zero-shot cross-lingual transfer","Bilingual dictionary alignment"],
    related:["xlm","mbert","multilingual-nmt","zero-shot-transfer"], tags:["multilingual","transfer"] },

  // ═══ SYNTAX & PARSING ═══
  { id:"pos-tagging", name:"Part-of-Speech Tagging", aka:"POS Tagging", cat:"syntax", difficulty:"beginner",
    desc:"Assigning grammatical categories (noun, verb, adjective, etc.) to each word in a sentence — a foundational NLP task.",
    details:"POS tagging uses tagsets like Penn Treebank (45 tags) or Universal Dependencies (17 tags). Methods evolved from rule-based (Brill tagger) to statistical (HMM, CRF) to neural (BiLSTM-CRF, transformers). Modern tools (spaCy, Stanza) achieve 97%+ accuracy. POS tags inform lemmatization, parsing, NER, and feature engineering.",
    keyPoints:["Penn Treebank and Universal Dependencies tagsets","HMM → CRF → Neural evolution","97%+ accuracy with modern models","Informs downstream tasks"],
    related:["ner","dependency-parsing","hmm","crf"], tags:["task","foundational"] },

  { id:"dependency-parsing", name:"Dependency Parsing", cat:"syntax", difficulty:"intermediate",
    desc:"Analyzing the grammatical structure of a sentence by establishing directed relationships (dependencies) between words, forming a tree where each word has exactly one head.",
    details:"Dependency parsing produces trees with labeled arcs (nsubj, dobj, amod, etc.) following Universal Dependencies (UD) framework. Approaches: transition-based (shift-reduce, arc-eager/standard), graph-based (MST, Eisner's algorithm), and neural (Dozat & Manning biaffine parser). Used for relation extraction, semantic role labeling, and information extraction.",
    keyPoints:["Universal Dependencies (UD) framework","Transition-based vs. graph-based approaches","Biaffine attention parser (state-of-art)","Labeled dependency relations"],
    related:["constituency-parsing","universal-dependencies","syntactic-analysis","srl"], tags:["task","structure"] },

  { id:"constituency-parsing", name:"Constituency Parsing", aka:"Phrase Structure Parsing", cat:"syntax", difficulty:"intermediate",
    desc:"Analyzing sentence structure by identifying nested phrases (NP, VP, PP) and building a hierarchical tree representation showing how words group into constituents.",
    details:"Constituency parsing produces trees with phrase labels (S, NP, VP, PP, etc.). Methods: CYK algorithm with PCFGs, chart parsing, and neural approaches (Kitaev & Klein, 2018). The Berkeley Neural Parser achieves near-human performance. Less widely used than dependency parsing in modern NLP but valuable for certain extraction tasks.",
    keyPoints:["Phrase structure trees (S, NP, VP, PP)","CYK algorithm with PCFGs","Berkeley Neural Parser","Hierarchical phrase groupings"],
    related:["dependency-parsing","formal-grammar","pcfg","syntax-analysis"], tags:["task","structure"] },

  { id:"chunking", name:"Chunking", aka:"Shallow Parsing", cat:"syntax", difficulty:"beginner",
    desc:"Identifying and grouping contiguous sequences of words into syntactic chunks (noun phrases, verb phrases) without building a full parse tree.",
    details:"Chunking provides a lightweight alternative to full parsing. Common chunk types: NP (noun phrase), VP (verb phrase), PP (prepositional phrase). Uses IOB/BIO tagging scheme (Begin, Inside, Outside). Implemented as a sequence labeling task using CRFs or neural taggers. Useful for named entity recognition and information extraction preprocessing.",
    keyPoints:["IOB/BIO tagging scheme","NP, VP, PP chunk identification","Lighter than full parsing","Preprocessing for NER and IE"],
    related:["ner","pos-tagging","dependency-parsing","bio-tagging"], tags:["task","extraction"] },

  { id:"syntax-analysis", name:"Syntactic Analysis", cat:"syntax", difficulty:"beginner",
    desc:"The broader process of analyzing grammatical structure, encompassing POS tagging, chunking, and full parsing to understand how words relate in sentences.",
    details:"Syntactic analysis forms the backbone of rule-based NLP and remains important for: grammar checking, controlled generation, relation extraction, and linguistic feature engineering. Modern LLMs implicitly learn syntax through pretraining, as demonstrated by probing experiments showing syntactic knowledge in transformer representations.",
    keyPoints:["Grammar structure analysis","Foundation for many NLP tasks","LLMs implicitly learn syntax","Probing reveals syntactic knowledge in transformers"],
    related:["pos-tagging","dependency-parsing","constituency-parsing","probing"], tags:["field","analysis"] },

  // ═══ SEMANTIC ANALYSIS ═══
  { id:"wsd", name:"Word Sense Disambiguation", aka:"WSD", cat:"semantics", difficulty:"intermediate",
    desc:"Determining which meaning of a polysemous word is intended in a given context (e.g., 'bank' as financial institution vs. river edge).",
    details:"Approaches include: knowledge-based (Lesk algorithm using dictionary definitions), supervised (training classifiers per word), unsupervised (clustering word usages), and using contextual embeddings (BERT-based WSD achieves state-of-art). WordNet provides the sense inventory for English. Contextual models implicitly handle WSD.",
    keyPoints:["Lesk algorithm (knowledge-based)","WordNet sense inventory","BERT-based WSD achieves SOTA","Contextual embeddings handle implicitly"],
    related:["polysemy","wordnet","contextual-embeddings","ambiguity"], tags:["task","semantics"] },

  { id:"semantic-similarity", name:"Semantic Similarity", cat:"semantics", difficulty:"beginner",
    desc:"Measuring how similar in meaning two texts are, typically as a continuous score — fundamental to search, deduplication, paraphrase detection, and RAG.",
    details:"Methods: cosine similarity of embeddings, learned similarity (siamese networks), BERTScore, and hybrid lexical-semantic scores. Datasets: STS Benchmark, SICK, MRPC. Cosine similarity of modern sentence embeddings (SBERT, E5) is the most common approach. Semantic similarity underpins vector search, RAG retrieval, and clustering.",
    keyPoints:["Cosine similarity of embeddings","STS Benchmark evaluation","Siamese network training","Foundational for vector search"],
    related:["cosine-similarity","sentence-embeddings","sbert","sts-benchmark"], tags:["task","metric"] },

  { id:"cosine-similarity", name:"Cosine Similarity", cat:"semantics", difficulty:"beginner",
    desc:"A metric measuring the cosine of the angle between two vectors, quantifying their directional similarity regardless of magnitude — the standard similarity metric in NLP.",
    details:"cos(A,B) = (A·B)/(||A||·||B||), ranging from -1 (opposite) to 1 (identical direction). Widely used because it's magnitude-invariant, computationally efficient, and works well in high-dimensional spaces. For normalized vectors, cosine similarity equals the dot product. The standard metric for embedding comparison, semantic search, and nearest-neighbor retrieval.",
    keyPoints:["Range: -1 to 1","Magnitude-invariant","Equivalent to dot product for normalized vectors","Standard metric for embedding comparison"],
    related:["semantic-similarity","vector-search","embedding-models","dot-product"], tags:["metric","math"] },

  { id:"semantic-parsing", name:"Semantic Parsing", cat:"semantics", difficulty:"advanced",
    desc:"Converting natural language into formal meaning representations (SQL, logic forms, lambda calculus) that can be executed by computers.",
    details:"Semantic parsing maps utterances to executable representations: SQL (Text-to-SQL), API calls, logical forms, or knowledge base queries. Methods evolved from grammar-based (CCG parsing) to neural seq2seq (with attention and copy mechanisms) to LLM-based (prompting GPT-4 for SQL). Datasets: Spider (text-to-SQL), ATIS, GeoQuery.",
    keyPoints:["Text-to-SQL (Spider benchmark)","Mapping language to executable code","Grammar-based → neural → LLM evolution","Lambda calculus and logical forms"],
    related:["text-to-sql","nl2code","slot-filling","knowledge-base-qa"], tags:["task","parsing"] },

  { id:"srl", name:"Semantic Role Labeling", aka:"SRL", cat:"semantics", difficulty:"intermediate",
    desc:"Identifying the predicate-argument structure of a sentence — who did what to whom, when, where, and how.",
    details:"SRL assigns semantic roles (Agent, Patient, Theme, Instrument, Location, Time) to phrases relative to a predicate. Uses PropBank and FrameNet role inventories. Modern SRL uses BERT-based models achieving F1 >87%. Valuable for information extraction, question answering, and event detection. Span-based and dependency-based approaches exist.",
    keyPoints:["PropBank and FrameNet role inventories","Predicate-argument structure","BERT-based models achieve strong F1","Useful for IE and QA"],
    related:["dependency-parsing","ie","ner","frame-semantics"], tags:["task","structure"] },

  { id:"textual-entailment", name:"Textual Entailment", aka:"Natural Language Inference", cat:"semantics", difficulty:"intermediate",
    desc:"Determining whether a hypothesis is entailed by, contradicts, or is neutral to a given premise — testing semantic understanding.",
    details:"NLI/RTE classifies sentence pairs as entailment, contradiction, or neutral. Key datasets: SNLI (570K pairs), MultiNLI (433K, multi-genre), XNLI (cross-lingual). Used to train sentence embeddings (SBERT), as a zero-shot classification proxy, and as a general NLU benchmark. Modern LLMs perform well but still struggle with complex logical reasoning.",
    keyPoints:["Entailment / Contradiction / Neutral classification","SNLI and MultiNLI datasets","Used for sentence embedding training","Zero-shot classification via NLI"],
    related:["sbert","zero-shot-classification","snli","logical-reasoning"], tags:["task","benchmark"] },

  { id:"coreference", name:"Coreference Resolution", cat:"semantics", difficulty:"intermediate",
    desc:"Identifying all expressions in a text that refer to the same entity (e.g., 'John', 'he', 'the CEO', 'Smith' all referring to one person).",
    details:"Coreference resolution links mentions (pronouns, names, descriptions) to entity clusters. Approaches: rule-based (Stanford multi-sieve), mention-ranking (neural scoring of antecedent candidates), end-to-end (Lee et al., 2017 using span enumeration), and LLM-based. Critical for document understanding, knowledge extraction, and coherent summarization.",
    keyPoints:["Mention detection and clustering","End-to-end neural approaches","Pronoun resolution and entity linking","Essential for document-level understanding"],
    related:["entity-linking","ner","discourse-analysis","knowledge-graphs"], tags:["task","resolution"] },

  // ═══ CLASSICAL NLP METHODS ═══
  { id:"bow", name:"Bag of Words", aka:"BoW", cat:"classical", difficulty:"beginner",
    desc:"A text representation that treats a document as an unordered collection of words, discarding grammar and word order while retaining frequency counts.",
    details:"BoW creates a vocabulary-sized vector for each document with word frequency counts. Simple but surprisingly effective for classification tasks. Loses word order and context. Variants: binary BoW (presence/absence), TF-IDF weighted, n-gram BoW. Still used as a baseline and in ensemble methods with neural models.",
    keyPoints:["Vocabulary-sized frequency vectors","Loses word order and context","Binary, frequency, or TF-IDF variants","Effective baseline for classification"],
    related:["tfidf","ngrams","text-classification","naive-bayes"], tags:["representation","simple"] },

  { id:"tfidf", name:"TF-IDF", aka:"Term Frequency–Inverse Document Frequency", cat:"classical", difficulty:"beginner",
    desc:"A statistical measure that evaluates word importance by combining how often a word appears in a document (TF) with how rare it is across the corpus (IDF).",
    details:"TF-IDF = TF(t,d) × IDF(t,D) where IDF = log(N/df(t)). Downweights common words and upweights discriminative terms. Variants include sublinear TF (1 + log(tf)), BM25 (probabilistic extension), and various IDF smoothing methods. Still widely used in information retrieval, keyword extraction, and as features for traditional ML classifiers.",
    keyPoints:["TF × IDF weighting formula","Downweights common, upweights rare terms","BM25 as a probabilistic extension","Still used in hybrid search systems"],
    related:["bow","bm25","information-retrieval","keyword-extraction"], tags:["metric","retrieval"] },

  { id:"ngrams", name:"N-grams", cat:"classical", difficulty:"beginner",
    desc:"Contiguous sequences of n items (characters or words) from text — unigrams (n=1), bigrams (n=2), trigrams (n=3) — capturing local word patterns.",
    details:"N-grams model local word dependencies and are used in language modeling (n-gram LMs), feature extraction, text classification, and spell checking. Character n-grams help with OOV handling and language identification. Limitations: exponential growth of vocabulary, data sparsity for large n, and inability to capture long-range dependencies.",
    keyPoints:["Unigrams, bigrams, trigrams, etc.","Capture local word patterns","Character n-grams for language detection","Data sparsity with large n"],
    related:["bow","language-modeling","smoothing","perplexity"], tags:["feature","model"] },

  { id:"naive-bayes", name:"Naive Bayes Classifier", cat:"classical", difficulty:"beginner",
    desc:"A probabilistic classifier based on Bayes' theorem with the 'naive' assumption that features are conditionally independent given the class — fast and effective for text.",
    details:"Variants: Multinomial NB (word counts), Bernoulli NB (binary presence), Gaussian NB. Despite the unrealistic independence assumption, works well for text classification, spam filtering, and sentiment analysis. Very fast training and inference. Often used as a baseline. Laplace/additive smoothing handles zero-frequency terms.",
    keyPoints:["Conditional independence assumption","Multinomial, Bernoulli, Gaussian variants","Fast training and prediction","Strong baseline for text classification"],
    related:["text-classification","bow","tfidf","spam-detection"], tags:["model","simple"] },

  { id:"hmm", name:"Hidden Markov Model", aka:"HMM", cat:"classical", difficulty:"intermediate",
    desc:"A statistical model representing sequential data with hidden states and observable outputs — historically used for POS tagging, NER, and speech recognition.",
    details:"HMMs model sequences with hidden states (POS tags) generating observations (words). Key algorithms: Forward (likelihood), Viterbi (best state sequence), Baum-Welch (parameter learning). Assumptions: first-order Markov property and output independence. Superseded by CRFs and neural models but fundamental for understanding sequence modeling.",
    keyPoints:["Hidden states with observable emissions","Viterbi algorithm for decoding","Forward-backward for training","Foundation for sequence labeling"],
    related:["crf","pos-tagging","viterbi","sequence-labeling"], tags:["model","statistical"] },

  { id:"crf", name:"Conditional Random Field", aka:"CRF", cat:"classical", difficulty:"intermediate",
    desc:"A discriminative sequence model that directly models the conditional probability of label sequences, overcoming HMM limitations — widely used for NER and POS tagging.",
    details:"CRFs model P(Y|X) directly rather than jointly modeling P(X,Y) like HMMs. Linear-chain CRFs capture dependencies between adjacent labels. Can incorporate arbitrary features without independence assumptions. The BiLSTM-CRF architecture was state-of-art for NER before transformers. CRF layers are still sometimes added on top of BERT.",
    keyPoints:["Discriminative model (P(Y|X))","Arbitrary feature functions","BiLSTM-CRF for sequence labeling","Global normalization prevents label bias"],
    related:["hmm","ner","pos-tagging","bilstm-crf"], tags:["model","sequence"] },

  { id:"lda", name:"Latent Dirichlet Allocation", aka:"LDA", cat:"classical", difficulty:"intermediate",
    desc:"A generative probabilistic model for discovering latent topics in document collections — each document is a mixture of topics, each topic a distribution over words.",
    details:"LDA assumes documents are generated by: choosing a topic distribution, then for each word choosing a topic and then a word from that topic's distribution. Inference via variational EM or Gibbs sampling. Hyperparameters α (document-topic density) and β (topic-word density) control sparsity. Used for topic discovery, document clustering, and content recommendation.",
    keyPoints:["Generative probabilistic topic model","Documents as topic mixtures","Gibbs sampling or variational inference","α and β hyperparameters"],
    related:["topic-modeling","bow","document-clustering","gibbs-sampling"], tags:["model","unsupervised"] },

  { id:"topic-modeling", name:"Topic Modeling", cat:"classical", difficulty:"beginner",
    desc:"Unsupervised methods for discovering abstract topics in document collections — including LDA, NMF, and modern neural approaches like BERTopic.",
    details:"Topic modeling discovers latent thematic structure. Classical: LDA, Non-negative Matrix Factorization (NMF), Latent Semantic Analysis (LSA). Modern: BERTopic (clustering + BERT embeddings + c-TF-IDF), Top2Vec, neural topic models. BERTopic has largely replaced LDA for practical applications due to better coherence and interpretability.",
    keyPoints:["LDA, NMF, LSA (classical)","BERTopic, Top2Vec (modern)","Unsupervised theme discovery","Document clustering and organization"],
    related:["lda","bertopic","lsa","document-clustering"], tags:["task","unsupervised"] },

  { id:"lsa", name:"Latent Semantic Analysis", aka:"LSA/LSI", cat:"classical", difficulty:"intermediate",
    desc:"Using SVD to decompose the term-document matrix into lower-dimensional representations, capturing latent semantic relationships between terms and documents.",
    details:"LSA applies truncated SVD to the TF-IDF weighted term-document matrix, reducing dimensionality while capturing semantic structure. Related terms map to similar dimensions. Used for document similarity, search, and topic discovery. Limitations: linear, doesn't handle polysemy, and sensitive to preprocessing. Superseded by neural embeddings.",
    keyPoints:["SVD on term-document matrix","Captures latent semantic structure","Pre-cursor to neural embeddings","Also called Latent Semantic Indexing (LSI)"],
    related:["svd","tfidf","topic-modeling","word-embeddings"], tags:["method","dimensionality"] },

  { id:"information-retrieval", name:"Information Retrieval", aka:"IR", cat:"classical", difficulty:"beginner",
    desc:"The science of searching and retrieving relevant documents from large collections based on user queries — the foundation of search engines and RAG systems.",
    details:"IR encompasses query processing, document indexing, relevance scoring, and result ranking. Classical models: Boolean, vector space, probabilistic (BM25). Modern: neural retrieval with dense embeddings, learned sparse (SPLADE), and hybrid approaches. Evaluation metrics: precision, recall, MAP, MRR, NDCG. Directly underpins RAG pipelines.",
    keyPoints:["Indexing, retrieval, and ranking","BM25 as a strong baseline","Dense vs. sparse retrieval","Precision, recall, MAP, MRR, NDCG"],
    related:["bm25","tfidf","dense-retrieval","rag-overview"], tags:["field","search"] },

  { id:"bm25", name:"BM25", aka:"Okapi BM25", cat:"classical", difficulty:"intermediate",
    desc:"A probabilistic ranking function for information retrieval that extends TF-IDF with document length normalization and term frequency saturation — still a strong baseline.",
    details:"BM25 scores documents based on query term frequencies with saturation (controlled by k1, typically 1.2-2.0) and document length normalization (controlled by b, typically 0.75). Outperforms raw TF-IDF and remains competitive with neural methods for keyword-heavy queries. Used as the sparse component in hybrid search systems combining BM25 + dense retrieval.",
    keyPoints:["Term frequency saturation (k1 parameter)","Document length normalization (b parameter)","Still competitive for keyword-heavy queries","Common in hybrid search (BM25 + dense)"],
    related:["tfidf","information-retrieval","hybrid-search","sparse-retrieval"], tags:["algorithm","retrieval"] },

  // ═══ DEEP LEARNING FOUNDATIONS ═══
  { id:"neural-lm", name:"Neural Language Model", cat:"deeplearning", difficulty:"intermediate",
    desc:"A neural network trained to predict the probability of the next word (or masked word) in a sequence — the foundation of all modern NLP.",
    details:"Neural LMs replaced n-gram models by using continuous representations and parameter sharing. Key architectures: feedforward (Bengio 2003), RNN/LSTM, Transformer. Training objectives: autoregressive (predict next token), masked (predict masked tokens), or denoising. Scaling neural LMs led to emergent capabilities in GPT-3, GPT-4, and other LLMs.",
    keyPoints:["Next-token or masked-token prediction","Feedforward → RNN → Transformer evolution","Parameter sharing across positions","Foundation of all modern LLMs"],
    related:["language-modeling","transformer","autoregressive","masked-lm"], tags:["architecture","foundation"] },

  { id:"rnn", name:"Recurrent Neural Network", aka:"RNN", cat:"deeplearning", difficulty:"intermediate",
    desc:"A neural network architecture that processes sequences by maintaining a hidden state updated at each time step — enabling context-dependent processing.",
    details:"RNNs apply the same function at each time step: h_t = f(h_{t-1}, x_t). This allows variable-length sequence processing and theoretically infinite context. In practice, vanilla RNNs suffer from vanishing/exploding gradients, limiting effective context to ~10-20 tokens. Replaced by LSTMs, GRUs, and ultimately Transformers.",
    keyPoints:["Hidden state carries sequential context","Vanishing/exploding gradient problem","Variable-length sequence processing","Superseded by Transformers"],
    related:["lstm","gru","vanishing-gradient","transformer"], tags:["architecture","historical"] },

  { id:"lstm", name:"Long Short-Term Memory", aka:"LSTM", cat:"deeplearning", difficulty:"intermediate",
    desc:"An RNN variant with gating mechanisms (forget, input, output gates) that enable learning long-range dependencies by controlling information flow through a cell state.",
    details:"LSTMs (Hochreiter & Schmidhuber, 1997) solve the vanishing gradient problem with gates that control what to forget, what new information to store, and what to output. The cell state acts as a highway for gradient flow. Bidirectional LSTMs process sequences in both directions. Dominated NLP from 2015-2018 before Transformers.",
    keyPoints:["Forget, input, output gates","Cell state for long-range memory","Bidirectional LSTMs (BiLSTM)","Dominated NLP 2015-2018"],
    related:["rnn","gru","bilstm-crf","vanishing-gradient"], tags:["architecture","historical"] },

  { id:"gru", name:"Gated Recurrent Unit", aka:"GRU", cat:"deeplearning", difficulty:"intermediate",
    desc:"A simplified LSTM variant with only two gates (reset and update) that achieves comparable performance with fewer parameters.",
    details:"GRUs (Cho et al., 2014) merge the cell state and hidden state, using reset and update gates. Fewer parameters than LSTM (2 gates vs. 3), faster training, and often comparable performance. No separate cell state — the hidden state serves both purposes. Used in the original sequence-to-sequence models for machine translation.",
    keyPoints:["Reset and update gates","Fewer parameters than LSTM","No separate cell state","Comparable performance to LSTM"],
    related:["lstm","rnn","seq2seq"], tags:["architecture","efficient"] },

  { id:"seq2seq", name:"Sequence-to-Sequence", aka:"Seq2Seq", cat:"deeplearning", difficulty:"intermediate",
    desc:"An encoder-decoder architecture that maps an input sequence to an output sequence of potentially different length — the basis for machine translation, summarization, and more.",
