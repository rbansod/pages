    details:"Test-time compute approaches: chain-of-thought (more reasoning tokens), self-consistency (multiple samples + voting), tree-of-thought (branching exploration), iterative refinement, and verify-then-generate. OpenAI's o1/o3 models demonstrate dramatic improvements from extended thinking. Represents a shift: instead of only scaling training compute, also scale inference compute strategically.",
    keyPoints:["More compute at inference → better answers","CoT, self-consistency, ToT approaches","o1/o3 models demonstrate the paradigm","Complementary to pre-training scale"],
    related:["reasoning-models","chain-of-thought","self-consistency","scaling-laws"], tags:["paradigm","emerging"] },

  { id:"embedding-fine-tuning", name:"Embedding Model Fine-Tuning", cat:"embeddings", difficulty:"intermediate",
    desc:"Adapting pre-trained embedding models to specific domains or tasks — improving retrieval quality for domain-specific RAG systems.",
    details:"Fine-tuning embedding models: generate training pairs (query, relevant passage, hard negative), train with contrastive or triplet loss. Methods: full fine-tuning, LoRA adaptation, and Matryoshka training. Hard negative mining critical — use BM25 or embedding model to find challenging negatives. Tools: sentence-transformers, Unstructured. Typical improvement: 5-15% on domain-specific retrieval.",
    keyPoints:["Contrastive learning with hard negatives","5-15% domain-specific improvement","LoRA and full fine-tuning options","sentence-transformers library"],
    related:["embedding-models","contrastive-learning","rag-overview","domain-adaptation"], tags:["technique","practical"] },

  { id:"semantic-chunking", name:"Semantic Chunking", cat:"rag", difficulty:"intermediate",
    desc:"Splitting documents at semantic boundaries (topic shifts) rather than fixed token counts — preserving meaning coherence within each chunk.",
    details:"Semantic chunking detects topic boundaries and splits there. Methods: embedding-based (compute sentence embeddings, split where consecutive similarity drops below threshold), LLM-based (ask model to identify section boundaries), and section-based (split at headers/structure). Better preserves context than fixed-size chunking. Trade-off: variable chunk sizes complicate batch processing.",
    keyPoints:["Split at topic/meaning boundaries","Embedding similarity drop detection","Preserves context within chunks","Variable chunk sizes"],
    related:["chunking-strategies","sentence-embeddings","rag-overview","document-parsing"], tags:["technique","quality"] },

  { id:"token-counting", name:"Token Counting & Cost Management", cat:"memory", difficulty:"beginner",
    desc:"Tracking and optimizing token usage for cost control and context window management — essential for production LLM applications.",
    details:"Token counting is critical for: cost estimation (API pricing per token), context window management (fitting within limits), prompt optimization (reducing unnecessary tokens), and monitoring. Tools: tiktoken (OpenAI), Anthropic's token counter. Strategies: prompt compression, context truncation, summarization of history, and caching. Track input vs. output tokens separately as pricing differs.",
    keyPoints:["API pricing per token (input vs. output)","tiktoken for counting","Prompt compression strategies","Context window budget management"],
    related:["tiktoken","context-window","prompt-caching","cost-optimization"], tags:["practice","production"] },

  { id:"pii-detection", name:"PII Detection & Redaction", cat:"ethics", difficulty:"intermediate",
    desc:"Identifying and masking personally identifiable information (names, SSNs, emails, addresses) in text — critical for privacy compliance and data protection.",
    details:"PII types: names, addresses, phone numbers, emails, SSNs, credit card numbers, dates of birth, medical record numbers. Methods: regex patterns (structured PII), NER models (names, locations), specialized PII detectors (Microsoft Presidio, spaCy's entity ruler). Redaction strategies: masking ([REDACTED]), pseudonymization (replace with fake but realistic values), and anonymization. Critical for: HIPAA, GDPR compliance.",
    keyPoints:["Detect names, SSNs, emails, addresses","Microsoft Presidio, spaCy tools","Masking vs. pseudonymization strategies","HIPAA and GDPR compliance"],
    related:["ner","data-privacy-nlp","responsible-ai","cleaning"], tags:["task","compliance"] },

  { id:"document-parsing", name:"Document Parsing & Layout Analysis", cat:"preprocessing", difficulty:"intermediate",
    desc:"Extracting structured content from documents (PDFs, Word, HTML) while preserving layout, tables, headers, and reading order — critical for RAG pipelines.",
    details:"Document parsing extracts text while understanding structure. Challenges: PDFs (no semantic structure), scanned documents (need OCR), tables, multi-column layouts, and headers/footers. Tools: PyMuPDF, pdfplumber, Docling, Unstructured, LlamaParse, and multimodal models for complex layouts. Table extraction is particularly challenging. Layout analysis models: LayoutLM, DiT, Donut.",
    keyPoints:["PDF, Word, HTML content extraction","Table and multi-column layout handling","PyMuPDF, Unstructured, LlamaParse tools","Critical for RAG data ingestion"],
    related:["chunking-strategies","rag-overview","document-ai","ocr"], tags:["task","pipeline"] },

  { id:"ocr", name:"Optical Character Recognition", aka:"OCR", cat:"multimodal", difficulty:"intermediate",
    desc:"Converting images of text (scanned documents, photos) into machine-readable text — enabling NLP processing of physical documents.",
    details:"OCR engines: Tesseract (open-source), Google Cloud Vision, Azure Computer Vision, AWS Textract, and PaddleOCR. Modern OCR uses CNNs + sequence models. Beyond basic text: handwriting recognition, scene text detection (text in photos), and multilingual OCR. Post-processing: spell checking, layout reconstruction, and confidence thresholding. Often combined with layout analysis for document understanding.",
    keyPoints:["Tesseract, Cloud Vision, Textract","CNN + sequence model architectures","Handwriting and scene text support","Post-processing for quality improvement"],
    related:["document-parsing","document-ai","cleaning","preprocessing"], tags:["task","conversion"] },

  { id:"text-mining", name:"Text Mining", cat:"applications", difficulty:"beginner",
    desc:"The process of deriving high-quality information and insights from large text collections — combining NLP with data mining techniques.",
    details:"Text mining encompasses: topic discovery, trend analysis, entity and relationship extraction, sentiment tracking, event detection, and pattern mining. Distinct from NLP (which focuses on language understanding) — text mining focuses on knowledge discovery at scale. Applications: competitive intelligence, literature review, social media analysis, and market research.",
    keyPoints:["Knowledge discovery from text at scale","Combines NLP + data mining","Topic, trend, and pattern discovery","Business intelligence applications"],
    related:["topic-modeling","ner","sentiment-analysis","information-retrieval"], tags:["field","applied"] },

  { id:"data-quality", name:"Data Quality for NLP", cat:"training", difficulty:"intermediate",
    desc:"Ensuring training and evaluation data is accurate, consistent, representative, and well-formatted — often the most impactful factor in NLP system performance.",
    details:"Data quality dimensions: accuracy (correct labels), completeness (no missing data), consistency (uniform formatting), relevance (appropriate for task), timeliness (up-to-date), and representativeness (covers target distribution). Common issues: label noise, class imbalance, annotation inconsistency, domain mismatch, and data drift. Quality > quantity for fine-tuning. Automated quality scoring and filtering tools.",
    keyPoints:["Quality > quantity for fine-tuning","Label noise and inconsistency issues","Class imbalance handling","Automated quality scoring"],
    related:["data-curation","annotation","preprocessing","fine-tuning"], tags:["practice","critical"] },

  { id:"collocation", name:"Collocation Detection", cat:"foundations", difficulty:"intermediate",
    desc:"Identifying word combinations that occur together more often than chance — like 'strong tea' (not 'powerful tea') or 'make a decision' (not 'do a decision').",
    details:"Collocations are multi-word expressions where words co-occur more than expected by chance. Detection methods: frequency-based (count threshold), statistical tests (chi-square, t-test), and information-theoretic (PMI - Pointwise Mutual Information). Types: compound nouns ('bus stop'), phrasal verbs ('pick up'), and fixed expressions ('by and large'). Important for: MT, text generation, and language learning.",
    keyPoints:["Words co-occurring more than by chance","PMI, chi-square, t-test detection","Compound nouns, phrasal verbs, idioms","Important for natural generation"],
    related:["ngrams","pmi","corpus-linguistics","mwe"], tags:["analysis","lexical"] },

  { id:"transformer-xl", name:"Transformer-XL & Segment Recurrence", cat:"architectures", difficulty:"advanced",
    desc:"An extension of the Transformer that enables learning dependencies beyond a fixed context length through segment-level recurrence and relative position encoding.",
    details:"Transformer-XL (Dai et al., 2019) addresses fixed context window limitation by caching hidden states from previous segments and using them as extended context for the current segment. Combined with relative position encoding. Enables dependency learning up to 80% longer than vanilla Transformers. Influenced: XLNet, Compressive Transformer. Concept of segment recurrence adopted in various forms.",
    keyPoints:["Segment-level hidden state recurrence","Dependencies beyond fixed context","Relative position encoding","Influenced XLNet and later models"],
    related:["transformer","long-context","positional-encoding","xlnet"], tags:["architecture","extension"] },

  { id:"sparse-retrieval", name:"Sparse Retrieval", aka:"Learned Sparse", cat:"search", difficulty:"intermediate",
    desc:"Modern learned sparse representations (SPLADE, SPARTA) that produce sparse vectors for efficient retrieval — combining the benefits of BM25 with learned representations.",
    details:"Learned sparse models like SPLADE produce sparse vectors using vocabulary-sized outputs with most entries zero. Advantages: efficient inverted index storage, term-level interpretability, and strong keyword matching. SPLADE uses MLM-based term expansion to add relevant terms not in the original text. Competitive with or better than dense retrieval for keyword-heavy queries.",
    keyPoints:["Learned sparse vectors (SPLADE)","Efficient inverted index compatible","Term expansion through MLM","Strong keyword matching ability"],
    related:["bm25","dense-retrieval","hybrid-search","information-retrieval"], tags:["technique","retrieval"] },

  { id:"text-to-speech-alignment", name:"Forced Alignment", cat:"speech", difficulty:"advanced",
    desc:"Automatically aligning transcribed text with audio to determine precisely when each word or phoneme is spoken — used for subtitling, corpus creation, and TTS training.",
    details:"Forced alignment takes audio + transcript and produces word-level or phoneme-level time stamps. Methods: HMM-based (Montreal Forced Aligner), CTC-based, and Whisper-based alignment. Applications: subtitle generation, pronunciation assessment, speech corpus creation, TTS training data preparation, and language learning tools. Essential for building high-quality speech datasets.",
    keyPoints:["Align text transcripts with audio timing","Word and phoneme level timestamps","Montreal Forced Aligner, Whisper-based","Essential for TTS training data"],
    related:["asr","tts","whisper","speech-nlp"], tags:["technique","alignment"] },

  { id:"model-merging", name:"Model Merging", cat:"training", difficulty:"advanced",
    desc:"Combining multiple fine-tuned models into a single model by averaging or interpolating their weights — creating models with combined capabilities without additional training.",
    details:"Model merging combines models in weight space. Methods: linear interpolation (LERP), spherical interpolation (SLERP), TIES (trim, elect, merge), DARE (random drop + rescale), and task arithmetic (adding/subtracting task vectors). Enables: combining a coding model with a chat model, creating multilingual models from mono-lingual fine-tunes. No additional training required. Quality varies — sometimes surprisingly good.",
    keyPoints:["Combine models by weight interpolation","SLERP, TIES, DARE methods","No additional training needed","Combine capabilities from different fine-tunes"],
    related:["fine-tuning","lora","open-source-llm","model-hub"], tags:["technique","creative"] },

  { id:"mixture-of-agents", name:"Mixture of Agents", cat:"agents", difficulty:"advanced",
    desc:"Routing different queries to different specialized LLMs or combining outputs from multiple LLMs — leveraging the strengths of various models.",
    details:"Mixture of agents approaches: routing (classify query → select best model), ensemble (generate from multiple models, combine), cascading (try cheap model first, escalate to expensive), and debate (models discuss to reach consensus). Enables: cost optimization, quality improvement, and specialization. Tools: OpenRouter, Martian, and custom routing systems.",
    keyPoints:["Route queries to best-suited model","Ensemble, cascading, debate approaches","Cost vs. quality optimization","OpenRouter, Martian tools"],
    related:["moe","ai-agents","serving-infrastructure","prompt-chaining"], tags:["pattern","optimization"] },

  { id:"conversation-design", name:"Conversation Design", cat:"dialogue", difficulty:"beginner",
    desc:"The practice of designing how AI assistants communicate — covering tone, persona, error handling, escalation, and user experience in conversational interfaces.",
    details:"Conversation design encompasses: persona definition (voice, tone, personality), dialogue flow design (happy paths, error recovery), prompt template design, fallback handling, escalation to humans, proactive suggestions, multi-modal response design, and accessibility. Drawing from UX design, linguistics, and psychology. Increasingly important as conversational AI becomes mainstream.",
    keyPoints:["Persona, tone, and personality design","Error recovery and fallback handling","Human escalation strategies","UX design for conversational interfaces"],
    related:["dialogue-systems","system-prompt","guardrails","ux-writing"], tags:["practice","design"] },

  { id:"self-supervised-learning", name:"Self-Supervised Learning in NLP", cat:"training", difficulty:"intermediate",
    desc:"Training on data without explicit human labels by creating supervisory signals from the data itself — the paradigm behind all modern language model pre-training.",
    details:"Self-supervised learning derives training labels from the data: next-token prediction (GPT), masked token prediction (BERT), denoising (BART), contrastive objectives (SimCSE). No human annotation needed — the structure of language provides the training signal. This is what makes pre-training on massive unlabeled corpora possible. The single most impactful paradigm shift in NLP.",
    keyPoints:["Labels derived from data structure","Next-token and masked-token objectives","Enables massive-scale pre-training","Most impactful NLP paradigm shift"],
    related:["pretraining","masked-lm","autoregressive","contrastive-learning"], tags:["paradigm","foundational"] },

  { id:"knowledge-grounding", name:"Knowledge Grounding", cat:"knowledge", difficulty:"intermediate",
    desc:"Anchoring LLM responses in verified external knowledge sources — ensuring factual accuracy through retrieval, knowledge graphs, or structured databases.",
    details:"Knowledge grounding strategies: RAG (retrieve relevant text), knowledge graph integration (query structured facts), tool use (web search, calculators, APIs), and citation generation (providing sources). Addresses: hallucination, knowledge cutoff, and verifiability. Design patterns: retrieve-then-generate, verify-then-respond, and generate-then-check. Critical for enterprise and high-stakes applications.",
    keyPoints:["Anchor responses in verified sources","RAG, KG, tool use approaches","Addresses hallucination and cutoff","Critical for enterprise applications"],
    related:["rag-overview","knowledge-graphs","hallucination-detection","faithfulness"], tags:["pattern","reliability"] },
];

// ═══════════════════════════════════════════════
//  APPLICATION LOGIC
// ═══════════════════════════════════════════════

let activeCategory = 'all';
let searchQuery = '';

function init() {
  document.getElementById('totalConcepts').textContent = CONCEPTS.length;
  document.getElementById('totalCategories').textContent = CATEGORIES.length;
  renderSidebar();
  renderContent();
  setupSearch();
  setupScrollListener();
}

function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  const counts = {};
  CONCEPTS.forEach(c => { counts[c.cat] = (counts[c.cat]||0) + 1; });

  let html = `<div class="sidebar-title">Categories</div><ul class="cat-list">`;
  html += `<li class="cat-item ${activeCategory==='all'?'active':''}" onclick="selectCategory('all')">
    <span class="dot" style="background:var(--accent)"></span>All Concepts
    <span class="count">${CONCEPTS.length}</span></li>`;

  CATEGORIES.forEach(cat => {
    html += `<li class="cat-item ${activeCategory===cat.id?'active':''}" onclick="selectCategory('${cat.id}')">
      <span class="dot" style="background:${cat.color}"></span>${cat.name}
      <span class="count">${counts[cat.id]||0}</span></li>`;
  });
  html += `</ul>`;
  sidebar.innerHTML = html;
}

function renderContent() {
  const main = document.getElementById('mainContent');
  let filtered = CONCEPTS;

  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    filtered = CONCEPTS.filter(c =>
      c.name.toLowerCase().includes(q) ||
      (c.aka && c.aka.toLowerCase().includes(q)) ||
      c.desc.toLowerCase().includes(q) ||
      c.cat.toLowerCase().includes(q) ||
      (c.tags && c.tags.some(t => t.toLowerCase().includes(q))) ||
      (c.keyPoints && c.keyPoints.some(p => p.toLowerCase().includes(q)))
    );
  }

  if (activeCategory !== 'all') {
    filtered = filtered.filter(c => c.cat === activeCategory);
  }

  document.getElementById('totalVisible').textContent = filtered.length;

  if (filtered.length === 0) {
    main.innerHTML = `<div class="empty-state"><div class="emoji">🔍</div><p>No concepts found</p><p class="hint">Try a different search term or category</p></div>`;
    return;
  }

  if (activeCategory === 'all' && !searchQuery) {
    // Group by category
    let html = '';
    CATEGORIES.forEach(cat => {
      const catConcepts = filtered.filter(c => c.cat === cat.id);
      if (catConcepts.length === 0) return;
      html += `<div class="cat-header" id="cat-${cat.id}"><h2 style="color:${cat.color}">${cat.name}</h2>
        <p>${cat.desc}</p><span class="badge" style="background:${cat.color}20;color:${cat.color}">${catConcepts.length} concepts</span></div>`;
      html += `<div class="card-grid">`;
      catConcepts.forEach(c => { html += renderCard(c, cat); });
      html += `</div><div style="height:40px"></div>`;
    });
    main.innerHTML = html;
  } else {
    const cat = CATEGORIES.find(c => c.id === activeCategory);
    let html = '';
    if (cat && !searchQuery) {
      html += `<div class="cat-header"><h2 style="color:${cat.color}">${cat.name}</h2>
        <p>${cat.desc}</p><span class="badge" style="background:${cat.color}20;color:${cat.color}">${filtered.length} concepts</span></div>`;
    } else if (searchQuery) {
      html += `<div class="cat-header"><h2>Search Results</h2>
        <p>Found ${filtered.length} concepts matching "${searchQuery}"</p></div>`;
    }
    html += `<div class="card-grid">`;
    filtered.forEach(c => {
      const cCat = CATEGORIES.find(ct => ct.id === c.cat);
      html += renderCard(c, cCat);
    });
    html += `</div>`;
    main.innerHTML = html;
  }
}

function renderCard(concept, cat) {
  const color = cat ? cat.color : 'var(--accent)';
  return `<div class="card" onclick="openModal('${concept.id}')" style="--card-color:${color}">
    <div class="card-title">${concept.name}${concept.aka?`<span class="aka">${concept.aka}</span>`:''}</div>
    <span class="difficulty ${concept.difficulty}">${concept.difficulty}</span>
    <div class="card-desc">${concept.desc}</div>
    <div class="card-tags">${(concept.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
    <style>.card[style*="--card-color:${color}"]::before{background:${color}}</style>
  </div>`;
}

function openModal(id) {
  const c = CONCEPTS.find(x => x.id === id);
  if (!c) return;
  const cat = CATEGORIES.find(x => x.id === c.cat);
  const color = cat ? cat.color : 'var(--accent)';

  let html = `<button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-cat" style="color:${color}">${cat?cat.name:c.cat}</div>
    <h2>${c.name}</h2>
    ${c.aka?`<div class="modal-aka">${c.aka}</div>`:''}
    <div class="modal-body"><p>${c.desc}</p><p>${c.details||''}</p></div>`;

  if (c.keyPoints && c.keyPoints.length) {
    html += `<div class="modal-section"><h3>⟩ Key Points</h3><ul class="key-points">`;
    c.keyPoints.forEach(p => { html += `<li>${p}</li>`; });
    html += `</ul></div>`;
  }

  if (c.related && c.related.length) {
    html += `<div class="modal-section"><h3>⟩ Related Concepts</h3><div class="related-tags">`;
    c.related.forEach(r => {
      const rc = CONCEPTS.find(x => x.id === r);
      html += `<span class="related-tag" onclick="navigateRelated('${r}')">${rc?rc.name:r}</span>`;
    });
    html += `</div></div>`;
  }

  html += `<div class="meta-row">
    <div class="meta-item">Difficulty: <span>${c.difficulty}</span></div>
    <div class="meta-item">Category: <span>${cat?cat.name:c.cat}</span></div>
    <div class="meta-item">Tags: <span>${(c.tags||[]).join(', ')}</span></div>
  </div>`;

  document.getElementById('modal').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
  document.body.style.overflow = '';
}

function navigateRelated(id) {
  closeModal();
  setTimeout(() => openModal(id), 200);
}

function selectCategory(catId) {
  activeCategory = catId;
  renderSidebar();
  renderContent();
  closeSidebar();
  window.scrollTo({ top: document.querySelector('.app').offsetTop - 20 });
}

function setupSearch() {
  const input = document.getElementById('searchInput');
  const clear = document.getElementById('clearSearch');
  let timeout;
  input.addEventListener('input', () => {
    clearTimeout(timeout);
    timeout = setTimeout(() => {
      searchQuery = input.value.trim();
      clear.classList.toggle('show', searchQuery.length > 0);
      if (searchQuery) activeCategory = 'all';
      renderSidebar();
      renderContent();
    }, 200);
  });
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('clearSearch').classList.remove('show');
  searchQuery = '';
  renderContent();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}

function setupScrollListener() {
  window.addEventListener('scroll', () => {
    document.getElementById('backTop').classList.toggle('show', window.scrollY > 500);
  });
}

document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

init();
</script>
</body>
</html>
