    details:"Seq2Seq (Sutskever et al., 2014) uses an encoder to compress input into a fixed-size context vector, then a decoder generates the output autoregressively. Originally used LSTMs. Limitations of fixed context vector led to the attention mechanism. Transformer-based seq2seq (T5, BART) is the modern standard.",
    keyPoints:["Encoder-decoder architecture","Fixed context vector bottleneck","Led to attention mechanism","Foundation for translation and summarization"],
    related:["attention-mechanism","encoder-decoder","machine-translation","teacher-forcing"], tags:["architecture","seminal"] },

  { id:"attention-mechanism", name:"Attention Mechanism", cat:"deeplearning", difficulty:"intermediate",
    desc:"A mechanism allowing models to dynamically focus on relevant parts of the input when producing each output element — the key innovation leading to Transformers.",
    details:"Attention (Bahdanau et al., 2014) computes a weighted sum of encoder states, where weights indicate relevance to the current decoder step. Types: additive (Bahdanau), dot-product (Luong), scaled dot-product (Transformer), multi-head, cross-attention, and self-attention. Transformed NLP by removing the fixed context vector bottleneck.",
    keyPoints:["Dynamic focus on relevant input parts","Additive → dot-product → multi-head evolution","Removes fixed context bottleneck","Foundation of Transformer architecture"],
    related:["transformer","self-attention","multi-head-attention","cross-attention"], tags:["mechanism","seminal"] },

  { id:"cnn-for-nlp", name:"CNNs for Text", cat:"deeplearning", difficulty:"intermediate",
    desc:"Applying convolutional neural networks to text by treating word embeddings as 1D feature maps — effective for text classification and n-gram feature detection.",
    details:"Text CNNs (Kim, 2014) apply 1D convolutions over word embedding sequences with varying kernel sizes to capture n-gram features. Max-over-time pooling produces fixed-size representations. Advantages: parallelizable (unlike RNNs), captures local patterns effectively. Used for sentiment analysis, text classification, and as components in larger systems.",
    keyPoints:["1D convolutions over word embeddings","Multiple kernel sizes for different n-grams","Max-over-time pooling","Fast and parallelizable"],
    related:["text-classification","word-embeddings","pooling"], tags:["architecture","classification"] },

  { id:"vanishing-gradient", name:"Vanishing & Exploding Gradients", cat:"deeplearning", difficulty:"intermediate",
    desc:"The problem of gradients becoming extremely small (vanishing) or large (exploding) during backpropagation through deep networks or long sequences, hindering training.",
    details:"In deep networks, gradients are multiplied through layers. If multipliers are <1, gradients vanish; if >1, they explode. Particularly severe in vanilla RNNs. Solutions: LSTM/GRU gating, residual connections, layer normalization, gradient clipping, careful initialization (Xavier, He), and skip connections in Transformers.",
    keyPoints:["Gradient multiplication through layers","Severe in vanilla RNNs","Solutions: gating, residuals, normalization","Gradient clipping for exploding gradients"],
    related:["rnn","lstm","residual-connections","layer-normalization"], tags:["problem","training"] },

  { id:"teacher-forcing", name:"Teacher Forcing", cat:"deeplearning", difficulty:"intermediate",
    desc:"A training technique where the model receives the ground-truth previous token as input during training, rather than its own predictions — speeding convergence but causing exposure bias.",
    details:"During training, the decoder receives actual target tokens (not its own predictions) at each step. This stabilizes training but creates a train-test mismatch (exposure bias): at inference, the model must use its own potentially erroneous predictions. Mitigation: scheduled sampling, reinforcement learning fine-tuning, or curriculum learning.",
    keyPoints:["Ground-truth tokens during training","Speeds up convergence","Causes exposure bias at inference","Scheduled sampling as mitigation"],
    related:["seq2seq","exposure-bias","autoregressive","scheduled-sampling"], tags:["technique","training"] },

  { id:"residual-connections", name:"Residual Connections", aka:"Skip Connections", cat:"deeplearning", difficulty:"intermediate",
    desc:"Adding the input of a layer directly to its output (x + F(x)), enabling gradient flow through very deep networks — essential for training Transformers.",
    details:"Residual connections (He et al., 2016) enable training of very deep networks by providing shortcut paths for gradient flow. In Transformers, every attention and FFN sublayer has a residual connection. This ensures that even very deep models (100+ layers) can be trained effectively. Pre-norm (LayerNorm before sublayer) vs. post-norm (after) affects training dynamics.",
    keyPoints:["Output = x + F(x)","Enable very deep network training","Every Transformer sublayer uses them","Pre-norm vs. post-norm variants"],
    related:["transformer","layer-normalization","vanishing-gradient","deep-networks"], tags:["technique","architecture"] },

  { id:"layer-normalization", name:"Layer Normalization", cat:"deeplearning", difficulty:"intermediate",
    desc:"Normalizing activations across features within a single training example, stabilizing training and enabling faster convergence — used throughout Transformers.",
    details:"LayerNorm normalizes across the feature dimension for each example independently, unlike BatchNorm which normalizes across the batch dimension. Applied in Transformers before (pre-norm) or after (post-norm) each sublayer. RMSNorm (Root Mean Square normalization, used in LLaMA) is a simplified variant that only normalizes by the RMS, omitting mean centering.",
    keyPoints:["Normalizes across features per example","Pre-norm vs. post-norm placement","RMSNorm simplified variant (LLaMA)","Stabilizes training dynamics"],
    related:["residual-connections","transformer","rmsnorm","training-stability"], tags:["technique","normalization"] },

  { id:"dropout-training", name:"Dropout", cat:"deeplearning", difficulty:"beginner",
    desc:"A regularization technique that randomly sets a fraction of neuron activations to zero during training, preventing overfitting and encouraging redundant representations.",
    details:"Dropout (Srivastava et al., 2014) randomly zeroes activations with probability p (typically 0.1-0.5) during training. At inference, all neurons are active but scaled by (1-p). In Transformers, dropout is applied to attention weights and feedforward layers. Attention dropout specifically drops attention connections, encouraging the model to use multiple attention patterns.",
    keyPoints:["Random activation zeroing during training","Prevents overfitting","Applied to attention and FFN in Transformers","Typical rates: 0.1-0.3 for Transformers"],
    related:["regularization","transformer","overfitting","training-stability"], tags:["technique","regularization"] },

  // ═══ TRANSFORMER ARCHITECTURES ═══
  { id:"transformer", name:"Transformer", cat:"architectures", difficulty:"intermediate",
    desc:"The neural architecture based entirely on self-attention mechanisms that replaced RNNs — 'Attention Is All You Need' (Vaswani et al., 2017) — foundation of all modern LLMs.",
    details:"The Transformer uses multi-head self-attention and feedforward layers with residual connections and layer normalization. Key innovations: parallel processing of all positions (unlike sequential RNNs), scaled dot-product attention, multi-head attention for capturing different relationship types, and positional encoding for sequence order. Three variants: encoder-only (BERT), decoder-only (GPT), encoder-decoder (T5).",
    keyPoints:["Self-attention replaces recurrence","Parallel processing of all positions","Multi-head attention for different relationship types","Encoder-only, decoder-only, encoder-decoder variants"],
    related:["self-attention","multi-head-attention","bert","gpt","t5"], tags:["architecture","seminal"] },

  { id:"self-attention", name:"Self-Attention", cat:"architectures", difficulty:"intermediate",
    desc:"An attention mechanism where each position in a sequence attends to all other positions in the same sequence, computing Query, Key, and Value transformations.",
    details:"Self-attention computes: Attention(Q,K,V) = softmax(QK^T/√d_k)V, where Q, K, V are linear projections of input. Each token's representation is a weighted sum of all tokens' values, where weights are determined by query-key compatibility. Enables capturing long-range dependencies in O(1) computational steps (vs. O(n) for RNNs). Quadratic memory/compute in sequence length.",
    keyPoints:["Query, Key, Value projections","Scaled dot-product: softmax(QK^T/√d)V","O(n²) complexity in sequence length","Captures long-range dependencies"],
    related:["transformer","multi-head-attention","attention-mechanism","kv-cache"], tags:["mechanism","core"] },

  { id:"multi-head-attention", name:"Multi-Head Attention", cat:"architectures", difficulty:"intermediate",
    desc:"Running multiple self-attention operations in parallel with different learned projections, allowing the model to attend to information from different representation subspaces.",
    details:"Instead of one attention function, multi-head attention projects Q, K, V into h different subspaces (heads), applies attention independently in each, then concatenates and projects the results. Typical: 8-128 heads. Different heads learn different patterns: syntactic relations, semantic similarity, positional patterns, etc. Analysis of head specialization reveals interpretable patterns.",
    keyPoints:["h parallel attention heads","Each head captures different patterns","Concat + linear projection output","Typical: 8-128 heads in modern LLMs"],
    related:["self-attention","transformer","attention-heads","grouped-query-attention"], tags:["mechanism","architecture"] },

  { id:"grouped-query-attention", name:"Grouped-Query Attention", aka:"GQA", cat:"architectures", difficulty:"advanced",
    desc:"An efficiency optimization where multiple query heads share a single key-value head, reducing KV cache memory while maintaining quality — used in LLaMA 2, Mistral.",
    details:"Standard multi-head attention (MHA) has separate K,V per head. Multi-query attention (MQA) shares one K,V across all heads (aggressive). GQA is the middle ground: groups of query heads share K,V. Reduces KV cache size by the grouping factor (e.g., 8 query heads sharing 1 KV = 8× reduction). Used in LLaMA 2 70B, Mistral, Gemma.",
    keyPoints:["Query heads grouped to share K,V","Reduces KV cache memory","Between MHA and MQA","LLaMA 2, Mistral, Gemma use GQA"],
    related:["multi-head-attention","kv-cache","multi-query-attention","inference-optimization"], tags:["efficiency","architecture"] },

  { id:"encoder-decoder", name:"Encoder-Decoder Architecture", cat:"architectures", difficulty:"intermediate",
    desc:"A Transformer configuration with separate encoder (bidirectional attention over input) and decoder (causal attention for generation) — used by T5, BART, mBART.",
    details:"The encoder processes the full input with bidirectional self-attention. The decoder generates output autoregressively with causal masking, using cross-attention to attend to encoder representations. Excels at tasks with clear input/output separation: translation, summarization, question answering. T5 frames all NLP tasks in this format.",
    keyPoints:["Bidirectional encoder + causal decoder","Cross-attention between encoder and decoder","T5, BART, mBART examples","Best for input→output transformation tasks"],
    related:["transformer","t5","bart","cross-attention"], tags:["architecture","variant"] },

  { id:"bert", name:"BERT", aka:"Bidirectional Encoder Representations from Transformers", cat:"architectures", difficulty:"intermediate",
    desc:"Google's bidirectional encoder model pre-trained with masked language modeling (MLM) and next sentence prediction (NSP) — revolutionized NLP benchmarks in 2018.",
    details:"BERT (Devlin et al., 2018) pre-trains a Transformer encoder bidirectionally by masking 15% of tokens and predicting them. Base: 12 layers, 768 hidden, 110M params. Large: 24 layers, 1024 hidden, 340M params. Fine-tuning BERT on downstream tasks became the standard paradigm. Variants: RoBERTa (better training), ALBERT (parameter sharing), DistilBERT (distilled), DeBERTa (disentangled attention).",
    keyPoints:["Bidirectional masked language model","MLM + NSP pre-training objectives","Base (110M) and Large (340M) sizes","Established fine-tuning paradigm"],
    related:["masked-lm","roberta","distilbert","deberta"], tags:["model","seminal"] },

  { id:"gpt", name:"GPT Series", aka:"Generative Pre-trained Transformer", cat:"architectures", difficulty:"intermediate",

  { id:"roberta", name:"RoBERTa", cat:"architectures", difficulty:"intermediate",

    details:"RoBERTa (Liu et al., 2019) keeps BERT's architecture but: trains longer with larger batches, removes Next Sentence Prediction, uses dynamic masking, trains on more data (160GB vs. 16GB). These changes alone gave significant gains across all benchmarks. Demonstrated the importance of training methodology independent of architecture innovation.",

  { id:"bart", name:"BART", cat:"architectures", difficulty:"intermediate",
    desc:"A denoising autoencoder using an encoder-decoder Transformer — pre-trained by corrupting text and learning to reconstruct the original.",
    details:"BART (Lewis et al., 2019) combines BERT's bidirectional encoder with GPT's autoregressive decoder. Pre-trained by corrupting text (masking, deletion, permutation, rotation) and reconstructing. Particularly effective for generation tasks: summarization, translation, and question answering. Used as the base for many fine-tuned generation models.",

  { id:"moe", name:"Mixture of Experts", aka:"MoE", cat:"architectures", difficulty:"advanced",
    desc:"An architecture where only a subset of model parameters (experts) are activated for each input, enabling larger total capacity without proportional compute cost.",
    details:"MoE replaces dense FFN layers with multiple expert FFN layers and a gating/router network that selects which experts process each token (typically top-2). Allows scaling model capacity while keeping inference cost constant. Used in Mixtral, Switch Transformer, GLaM, and reportedly GPT-4. Challenges: load balancing, expert collapse, and training instability.",
    keyPoints:["Sparse activation — not all params used per token","Router/gating network selects experts","Scales capacity without proportional compute","Load balancing is a key challenge"],
    related:["mistral","switch-transformer","sparse-models","routing"], tags:["architecture","efficiency"] },

  { id:"efficient-transformers", name:"Efficient Transformers", cat:"architectures", difficulty:"advanced",
    desc:"Architectural modifications to reduce the O(n²) complexity of standard self-attention — enabling longer context and more efficient processing.",
    details:"Approaches: sparse attention (Longformer, BigBird — local + global), linear attention (Performer, Linear Transformers), low-rank approximation (Linformer), kernelized attention, state-space models (Mamba, S4), and hybrid architectures. Each trades off some modeling capability for efficiency. Mamba and other SSMs represent a potentially transformer-competitive approach.",
    keyPoints:["Sparse attention (Longformer, BigBird)","Linear attention approximations","State-space models (Mamba, S4)","Hybrid architectures"],
    related:["self-attention","mamba","longformer","sliding-window-attention"], tags:["architecture","efficiency"] },

  { id:"mamba", name:"Mamba & State Space Models", cat:"architectures", difficulty:"advanced",
    desc:"Selective state space models (SSMs) that achieve Transformer-like performance with linear time complexity, avoiding the quadratic attention bottleneck.",
    details:"Mamba (Gu & Dao, 2023) introduces selective state spaces where the model parameters depend on the input. Unlike Transformers' O(n²) attention, SSMs process sequences in O(n) time. Mamba achieves competitive performance with Transformers on language modeling. Hybrid architectures (Jamba = Mamba + Transformer layers) combine strengths of both approaches.",
    keyPoints:["Linear time complexity O(n)","Selective input-dependent parameters","Competitive with Transformers","Jamba hybrid: Mamba + Transformer"],
    related:["efficient-transformers","transformer","linear-attention","sequence-modeling"], tags:["architecture","emerging"] },

  // ═══ LARGE LANGUAGE MODELS ═══
  { id:"llm-overview", name:"Large Language Models", aka:"LLMs", cat:"llm", difficulty:"beginner",
    desc:"Neural language models with billions of parameters trained on massive text corpora that exhibit emergent capabilities like reasoning, in-context learning, and instruction following.",
    details:"LLMs are characterized by scale (billions of parameters), broad pretraining data (trillions of tokens), and emergent capabilities that arise at sufficient scale. Key capabilities: in-context learning, instruction following, reasoning, code generation, and world knowledge. The term typically refers to models >1B parameters, though smaller models can also be powerful.",
    keyPoints:["Billions of parameters","Trained on trillions of tokens","Emergent capabilities at scale","In-context learning and reasoning"],
    related:["scaling-laws","emergent-capabilities","pretraining","gpt"], tags:["concept","core"] },

  { id:"scaling-laws", name:"Scaling Laws", cat:"llm", difficulty:"intermediate",
    desc:"Empirical relationships between model performance and compute, parameters, and data size — guiding decisions about how to allocate training resources.",
    details:"Kaplan et al. (2020, OpenAI) showed performance scales as power laws in model size, data size, and compute. Hoffmann et al. (2022, Chinchilla) showed that Chinchilla-optimal scaling requires matching parameter and data scaling (equal investment). This led to training smaller models on more data (Chinchilla 70B > Gopher 280B). Modern understanding emphasizes compute-optimal training.",
    keyPoints:["Power law relationships","Chinchilla optimal: balance params and data","Compute-optimal training decisions","Kaplan (2020) and Hoffmann (2022) findings"],
    related:["pretraining","chinchilla","compute-optimal","llm-overview"], tags:["theory","empirical"] },

  { id:"emergent-capabilities", name:"Emergent Capabilities", cat:"llm", difficulty:"intermediate",
    desc:"Abilities that appear in language models only above certain scale thresholds — not present in smaller models and not directly trained for.",
    details:"Examples: chain-of-thought reasoning, in-context learning, arithmetic, code generation, multilingual translation, theory of mind tasks. These emerge unpredictably as models scale. Debate exists about whether emergence is real or an artifact of evaluation metrics (Schaeffer et al., 2023). Some 'emergent' abilities may be predictable with finer-grained metrics.",
    keyPoints:["Appear only above certain scale thresholds","Not explicitly trained for","Examples: CoT, in-context learning, arithmetic","Debate about metric artifacts"],
    related:["scaling-laws","in-context-learning","chain-of-thought","llm-overview"], tags:["phenomenon","debate"] },

  { id:"pretraining", name:"Pre-training", cat:"llm", difficulty:"beginner",
    desc:"The initial, expensive phase of training a language model on massive unlabeled text corpora to learn general language patterns, knowledge, and reasoning capabilities.",
    details:"Pre-training consumes the vast majority of compute. Data sources: Common Crawl, Wikipedia, books, code (GitHub), scientific papers, web text. Data quality, filtering, and deduplication are critical. Training uses next-token prediction (decoder-only) or masked language modeling (encoder). Typical modern pre-training: 1-15 trillion tokens, thousands of GPUs, weeks-months.",
    keyPoints:["Self-supervised on massive corpora","Most compute-intensive phase","Data quality crucial (filtering, dedup)","Typically trillions of tokens"],
    related:["masked-lm","autoregressive","data-curation","scaling-laws"], tags:["phase","training"] },

  { id:"in-context-learning", name:"In-Context Learning", aka:"ICL", cat:"llm", difficulty:"intermediate",
    desc:"The ability of LLMs to learn new tasks at inference time from examples provided in the prompt, without any parameter updates.",
    details:"Discovered in GPT-3 (Brown et al., 2020), ICL enables task adaptation through few-shot examples in the prompt. The model implicitly learns the input-output mapping from demonstrations. Sensitive to: example selection, ordering, format, and label distribution. Mechanism not fully understood — theories include implicit Bayesian inference and gradient descent in attention.",
    keyPoints:["Learning from prompt examples without training","Sensitive to example selection and order","Emerged at GPT-3 scale","Mechanism still debated"],
    related:["few-shot-learning","gpt","prompt-engineering","zero-shot-learning"], tags:["capability","emergent"] },

  { id:"reasoning-models", name:"Reasoning Models", aka:"o1, o3, DeepSeek-R1", cat:"llm", difficulty:"intermediate",
    desc:"LLMs specifically trained to perform extended chain-of-thought reasoning before answering, trading inference compute for improved accuracy on complex tasks.",
    details:"OpenAI's o1/o3 models and DeepSeek-R1 use 'thinking tokens' — extended internal reasoning chains before producing an answer. Trained with RL to develop reasoning strategies. Excel at math, science, coding, and logic puzzles. Represent a shift toward test-time compute scaling: spending more compute at inference improves results.",

  { id:"small-language-models", name:"Small Language Models", aka:"SLMs", cat:"llm", difficulty:"beginner",

  // ═══ TRAINING & FINE-TUNING ═══
  { id:"fine-tuning", name:"Fine-Tuning", cat:"training", difficulty:"beginner",
    desc:"Adapting a pre-trained model to a specific task or domain by continuing training on a smaller, task-specific dataset — updating all or some model parameters.",
    details:"Full fine-tuning updates all model parameters. More compute-efficient variants: LoRA (low-rank adaptation), QLoRA (quantized LoRA), prefix tuning, adapter layers. Fine-tuning data quality matters more than quantity. Common workflows: instruction tuning (general), domain adaptation (industry-specific), task-specific (classification, NER). Overfitting risk requires careful validation.",
    keyPoints:["Adapt pre-trained model to specific tasks","Full fine-tuning vs. parameter-efficient methods","Data quality matters more than quantity","Risk of catastrophic forgetting"],
    related:["lora","qlora","instruction-tuning","peft"], tags:["technique","adaptation"] },

  { id:"instruction-tuning", name:"Instruction Tuning", cat:"training", difficulty:"intermediate",
    desc:"Fine-tuning a model on (instruction, response) pairs to improve its ability to follow diverse natural language instructions — bridging pre-training and usability.",
    details:"Instruction tuning transforms a raw LM into a helpful assistant. Key datasets: FLAN (1836 tasks), InstructGPT data, Alpaca (self-instruct), ShareGPT, OpenAssistant. Methods: supervised fine-tuning (SFT) on instruction-response pairs. Results in dramatic improvements in helpfulness, instruction following, and format adherence. Often followed by RLHF/DPO for further alignment.",
    keyPoints:["(Instruction, response) pair training","Transforms raw LM into assistant","FLAN, Alpaca, ShareGPT datasets","Usually followed by RLHF/DPO"],
    related:["sft","rlhf","dpo","flan"], tags:["technique","alignment"] },

  { id:"sft", name:"Supervised Fine-Tuning", aka:"SFT", cat:"training", difficulty:"beginner",
    desc:"Training a model on labeled (input, output) examples with standard cross-entropy loss — the first stage of making a pre-trained LLM into a useful assistant.",
    details:"SFT is the standard fine-tuning approach: given input-output pairs, minimize cross-entropy loss on the output tokens. For chat models, this means training on high-quality conversation data. The quality and diversity of SFT data dramatically affects final model capability. Typically 10K-100K high-quality examples suffice for strong results.",
    keyPoints:["Standard cross-entropy training on examples","First stage of assistant training","Data quality is paramount","10K-100K examples typically sufficient"],
    related:["instruction-tuning","fine-tuning","cross-entropy","data-quality"], tags:["technique","training"] },

  { id:"lora", name:"LoRA", aka:"Low-Rank Adaptation", cat:"training", difficulty:"intermediate",
    desc:"A parameter-efficient fine-tuning method that freezes the original model and trains small low-rank decomposition matrices — dramatically reducing trainable parameters.",
    details:"LoRA (Hu et al., 2021) adds trainable rank decomposition matrices (A·B, where A∈R^{d×r}, B∈R^{r×d}, r<<d) to frozen weight matrices. Reduces trainable parameters by 10-100×. Applied to attention projections (Q, K, V, O). Merged at inference for zero overhead. Hyperparameters: rank r (4-64 typical), alpha (scaling), target modules. Multiple LoRA adapters can be swapped or combined.",
    keyPoints:["Low-rank decomposition of weight updates","10-100× parameter reduction","Zero inference overhead when merged","Rank, alpha, target module hyperparameters"],
    related:["qlora","peft","fine-tuning","adapter-layers"], tags:["technique","efficient"] },

  { id:"qlora", name:"QLoRA", cat:"training", difficulty:"intermediate",
    desc:"Combining quantized base models (4-bit NormalFloat) with LoRA adapters — enabling fine-tuning of 65B+ parameter models on a single consumer GPU.",
    details:"QLoRA (Dettmers et al., 2023) quantizes the base model to 4-bit NormalFloat (NF4) and trains LoRA adapters in bfloat16 on top. Innovations: NF4 quantization, double quantization, and paged optimizers. Enables fine-tuning LLaMA 65B on a single 48GB GPU with no quality degradation. Democratized LLM fine-tuning for researchers and developers.",
    keyPoints:["4-bit NormalFloat base model quantization","LoRA adapters in bfloat16","Fine-tune 65B models on single GPU","NF4 + double quantization"],
    related:["lora","quantization","peft","fine-tuning"], tags:["technique","accessible"] },

  { id:"peft", name:"Parameter-Efficient Fine-Tuning", aka:"PEFT", cat:"training", difficulty:"intermediate",
    desc:"A family of methods that fine-tune only a small subset of model parameters while keeping the majority frozen — including LoRA, adapters, prefix tuning, and prompt tuning.",
    details:"PEFT methods reduce memory and compute for fine-tuning. Types: additive (adapter layers, prefix tuning, prompt tuning), reparameterization (LoRA, IA3), selective (fine-tune subset of existing params). The PEFT library by Hugging Face unifies these methods. Choice depends on: target task, available compute, and whether inference efficiency matters.",
    keyPoints:["Freeze most parameters, train small additions","LoRA, adapters, prefix tuning, prompt tuning","Hugging Face PEFT library","Balance between efficiency and quality"],
    related:["lora","prefix-tuning","prompt-tuning","adapter-layers"], tags:["family","efficient"] },

  { id:"prefix-tuning", name:"Prefix Tuning", cat:"training", difficulty:"advanced",
    desc:"Prepending trainable continuous vectors (prefixes) to the key and value in each Transformer layer — a parameter-efficient alternative to fine-tuning.",
    details:"Prefix tuning (Li & Liang, 2021) learns continuous task-specific prefixes that are prepended to keys and values at every layer. Only prefix parameters are trained (~0.1% of total). Effective for generation tasks. P-Tuning extends this to encoder models. Prefix parameters act as virtual tokens that steer model behavior without modifying weights.",
    keyPoints:["Trainable continuous prefixes at each layer","~0.1% of total parameters","Virtual tokens steer behavior","Effective for generation tasks"],
    related:["peft","prompt-tuning","lora","fine-tuning"], tags:["technique","efficient"] },

  { id:"adapter-layers", name:"Adapter Layers", cat:"training", difficulty:"intermediate",
    desc:"Small bottleneck modules inserted between existing Transformer layers — trained while keeping the base model frozen, enabling modular task adaptation.",
    details:"Adapters (Houlsby et al., 2019) add small feed-forward networks (down-project → nonlinearity → up-project) inside Transformer blocks. Typically add 1-5% parameters. Multiple adapter sets can be trained for different tasks and swapped at inference. AdapterFusion combines multiple adapters. Influenced the development of LoRA and other PEFT methods.",
    keyPoints:["Bottleneck feed-forward modules","1-5% additional parameters","Modular — swap for different tasks","Influenced LoRA development"],
    related:["peft","lora","fine-tuning","modular-models"], tags:["technique","modular"] },

  { id:"continual-pretraining", name:"Continual Pre-training", cat:"training", difficulty:"intermediate",
    desc:"Extending a model's pre-training on domain-specific corpora (medical, legal, financial) to inject specialized knowledge before fine-tuning.",
    details:"Continual pre-training adapts a general LLM to a specific domain by continuing the pre-training objective (next-token prediction) on domain text. Examples: BioMedLM (biomedical), FinGPT (financial), LegalBERT (legal). Risks: catastrophic forgetting of general knowledge. Mitigation: replay of general data, learning rate warmup, and careful data mixing.",
    keyPoints:["Domain-specific knowledge injection","Risk of catastrophic forgetting","Mix domain + general data","Precedes task-specific fine-tuning"],
    related:["pretraining","domain-adaptation","catastrophic-forgetting","fine-tuning"], tags:["technique","domain"] },

  { id:"catastrophic-forgetting", name:"Catastrophic Forgetting", cat:"training", difficulty:"intermediate",
    desc:"The tendency of neural networks to abruptly lose previously learned knowledge when trained on new data — a key challenge in continual learning and fine-tuning.",
    details:"When fine-tuning an LLM, aggressive training on task-specific data can degrade general capabilities. Mitigation strategies: regularization (EWC, L2-SP), replay (mix old and new data), progressive methods (gradual unfreezing), parameter-efficient methods (LoRA freezes base model), and architecture-based (adapter modules). Balancing specialization and generality is a core tension.",
    keyPoints:["Loss of previous knowledge during new training","Mitigation: regularization, replay, PEFT","Tension between specialization and generality","Elastic Weight Consolidation (EWC)"],
    related:["fine-tuning","continual-pretraining","lora","continual-learning"], tags:["problem","training"] },

  { id:"data-curation", name:"Data Curation for LLMs", cat:"training", difficulty:"intermediate",
    desc:"The process of collecting, filtering, deduplicating, and quality-scoring training data — arguably the most impactful factor in LLM quality.",
    details:"Data curation encompasses: web crawl filtering (quality classifiers, toxicity filters), deduplication (MinHash, suffix arrays), domain mixing ratios, data ordering/curriculum, synthetic data generation, and human annotation. Key datasets: The Pile, C4, RedPajama, FineWeb, DCLM. Data quality often matters more than model architecture choices.",
    keyPoints:["Quality filtering and classification","Deduplication (MinHash, LSH)","Domain mixing ratios","Data quality > architecture choices"],
    related:["pretraining","deduplication","synthetic-data","data-quality"], tags:["practice","critical"] },

  { id:"synthetic-data", name:"Synthetic Data Generation", cat:"training", difficulty:"intermediate",
    desc:"Using LLMs to generate training data for other models — including instruction data, reasoning chains, test cases, and domain-specific examples.",
    details:"Self-Instruct (Wang et al., 2022) pioneered using GPT-3 to generate instruction data. Evol-Instruct (WizardLM) evolves instructions for complexity. Orca uses GPT-4 explanations as training data. Phi models trained primarily on synthetic textbook-quality data. Concerns: model collapse from recursive synthetic training, quality control, and diversity maintenance.",
    keyPoints:["LLMs generating training data for other models","Self-Instruct and Evol-Instruct methods","Phi models: synthetic textbook data","Risk of model collapse"],
    related:["data-curation","self-instruct","distillation","model-collapse"], tags:["technique","data"] },

  { id:"curriculum-learning", name:"Curriculum Learning", cat:"training", difficulty:"advanced",
    desc:"Organizing training data from easy to hard examples, inspired by human learning — improving convergence and final model quality.",
    details:"Curriculum learning (Bengio et al., 2009) presents training examples in a meaningful order. For LLMs: starting with cleaner/simpler text before harder examples. Variants: self-paced learning (model selects difficulty), competence-based curriculum, anti-curriculum (hard first). Applied to pre-training data ordering and fine-tuning data scheduling.",
    keyPoints:["Easy-to-hard training data ordering","Improves convergence and final quality","Self-paced learning variants","Applied to pre-training data scheduling"],
    related:["pretraining","data-curation","training-dynamics"], tags:["technique","optimization"] },

  { id:"knowledge-distillation", name:"Knowledge Distillation", cat:"training", difficulty:"intermediate",
    desc:"Training a smaller student model to mimic a larger teacher model's behavior — transferring knowledge through soft probability distributions or intermediate representations.",
    details:"Distillation (Hinton et al., 2015) trains a student using the teacher's soft probability distributions (which contain more information than hard labels). Temperature scaling controls softness. Types: output distillation, intermediate layer matching, attention transfer, and task-specific distillation. Examples: DistilBERT (60% size, 97% performance), TinyBERT.",
    keyPoints:["Teacher → student knowledge transfer","Soft probabilities contain richer signal","Temperature scaling parameter","DistilBERT achieves 97% of BERT quality"],
    related:["distilbert","model-compression","quantization","small-language-models"], tags:["technique","compression"] },

  { id:"mixed-precision", name:"Mixed Precision Training", cat:"training", difficulty:"intermediate",
    desc:"Using lower precision floating-point numbers (FP16, BF16) for most operations while maintaining FP32 for critical computations — halving memory and accelerating training.",
    details:"Mixed precision uses FP16/BF16 for forward/backward pass and FP32 master weights for updates. BF16 (Brain Floating Point) has the same exponent range as FP32, avoiding overflow issues. Loss scaling prevents gradient underflow in FP16. Supported by Nvidia Tensor Cores, providing 2-4× speedup. Standard practice for all modern LLM training.",
    keyPoints:["FP16/BF16 for computation, FP32 for updates","BF16 preferred (same range as FP32)","Loss scaling prevents underflow","2-4× speedup with Tensor Cores"],
    related:["quantization","training-efficiency","gpu-training"], tags:["technique","efficiency"] },

  // ═══ PROMPT ENGINEERING ═══
  { id:"prompt-engineering", name:"Prompt Engineering", cat:"prompting", difficulty:"beginner",
    desc:"The art and science of crafting inputs to language models that elicit desired outputs — encompassing instruction design, example selection, formatting, and reasoning strategies.",
    details:"Prompt engineering involves: clear instruction writing, role/persona assignment, output format specification, few-shot example selection, constraint communication, and reasoning elicitation. Key techniques: zero-shot, few-shot, chain-of-thought, system prompts, and structured output formatting. Effectiveness varies by model, task, and prompt structure.",
    keyPoints:["Instruction clarity and specificity","Role/persona assignment","Output format specification","Zero-shot, few-shot, CoT strategies"],
    related:["few-shot-learning","zero-shot-learning","chain-of-thought","system-prompt"], tags:["skill","core"] },

  { id:"few-shot-learning", name:"Few-Shot Learning", cat:"prompting", difficulty:"beginner",
    desc:"Providing a small number of input-output examples in the prompt to demonstrate the desired task behavior — typically 1-10 examples.",
    details:"Few-shot prompting leverages in-context learning. Key factors: example quality, diversity, ordering, format consistency, and label balance. More examples generally help but consume context window. Strategies: nearest-neighbor example selection, stratified sampling, and dynamic example retrieval. One-shot (1 example) and few-shot (2-10) are common variants.",
    keyPoints:["1-10 demonstration examples in prompt","Example quality and diversity matter","Ordering affects results","Dynamic example retrieval"],
    related:["in-context-learning","prompt-engineering","zero-shot-learning","dynamic-retrieval"], tags:["technique","prompting"] },

  { id:"zero-shot-learning", name:"Zero-Shot Learning", cat:"prompting", difficulty:"beginner",
    desc:"Performing a task with only instructions and no examples — relying on the model's pre-trained knowledge to understand and execute the task.",
    details:"Zero-shot prompting provides task instructions without examples. Works well for simple, well-defined tasks. Techniques: clear task descriptions, output format specification, role assignment, and constraint enumeration. Zero-shot classification via NLI: framing classes as hypotheses. Larger models generally have stronger zero-shot capabilities.",
    keyPoints:["Instructions only, no examples","Works for well-defined simple tasks","Zero-shot classification via NLI","Larger models perform better"],
    related:["few-shot-learning","prompt-engineering","in-context-learning","zero-shot-classification"], tags:["technique","prompting"] },

  { id:"chain-of-thought", name:"Chain-of-Thought Prompting", aka:"CoT", cat:"prompting", difficulty:"intermediate",
    desc:"Eliciting step-by-step reasoning from LLMs by demonstrating or requesting intermediate reasoning steps — dramatically improving performance on complex tasks.",
    details:"CoT (Wei et al., 2022) shows that prompting LLMs to think step-by-step improves accuracy on math, logic, and multi-step reasoning tasks. Variants: manual CoT (hand-written reasoning chains), zero-shot CoT ('Let's think step by step'), Auto-CoT (automatic chain generation), and tree-of-thought (exploring multiple reasoning paths). Most effective with larger models (>~100B params).",
    keyPoints:["Step-by-step reasoning in prompts","'Let's think step by step' (zero-shot CoT)","Most effective with larger models","Wei et al., 2022"],
    related:["reasoning-models","tree-of-thought","self-consistency","prompt-engineering"], tags:["technique","reasoning"] },

  { id:"tree-of-thought", name:"Tree of Thought", aka:"ToT", cat:"prompting", difficulty:"advanced",
    desc:"Extending chain-of-thought by exploring multiple reasoning paths as a tree, evaluating intermediate states, and backtracking from dead ends.",
    details:"ToT (Yao et al., 2023) generalizes CoT from a single chain to a tree of reasoning paths. At each step, the model generates multiple candidate next steps, evaluates them, and prunes unpromising branches. Uses BFS/DFS search strategies. Particularly effective for puzzles, planning, and creative problem-solving. More compute-intensive than standard CoT.",
    keyPoints:["Multiple reasoning paths (tree structure)","Evaluate and prune intermediate states","BFS/DFS search strategies","Effective for planning and puzzles"],
    related:["chain-of-thought","self-consistency","reasoning-models","beam-search"], tags:["technique","advanced"] },

  { id:"self-consistency", name:"Self-Consistency", cat:"prompting", difficulty:"intermediate",
    desc:"Sampling multiple chain-of-thought reasoning paths and selecting the most common final answer — improving reliability through majority voting.",
    details:"Self-consistency (Wang et al., 2022) generates multiple CoT reasoning chains (using temperature sampling) and takes the majority vote on final answers. Significantly improves accuracy on math and reasoning tasks. Works because correct reasoning paths tend to converge on the same answer while errors are diverse. Trade-off: increased compute for improved reliability.",
    keyPoints:["Multiple CoT samples + majority vote","Correct paths converge, errors diverge","Significantly improves reasoning accuracy","Increased compute cost"],
    related:["chain-of-thought","sampling-strategies","ensemble-methods"], tags:["technique","reliability"] },

  { id:"system-prompt", name:"System Prompts", cat:"prompting", difficulty:"beginner",
    desc:"Instructions provided at the start of a conversation that define the model's role, behavior, constraints, and output format — persistent context for the interaction.",
    details:"System prompts set the behavioral context: persona (role), capabilities, constraints, output format, tone, and guardrails. Best practices: be specific about what the model should/shouldn't do, define output format clearly, include examples of edge cases, specify error handling. System prompts vary in effectiveness across models and may be partially overridable by users.",
    keyPoints:["Define role, behavior, constraints","Persistent across the conversation","Vary in effectiveness across models","Include edge case handling"],
    related:["prompt-engineering","persona","guardrails","output-formatting"], tags:["technique","architecture"] },

  { id:"structured-output", name:"Structured Output Generation", cat:"prompting", difficulty:"intermediate",
    desc:"Constraining LLM outputs to follow specific formats like JSON, XML, or schemas — enabling reliable integration with downstream systems.",
    details:"Methods: JSON mode (API parameter), function calling schemas, grammar-constrained decoding (GBNF, Outlines), XML tag prompting, and Pydantic model schemas. OpenAI's structured outputs guarantee valid JSON matching a provided schema. Critical for: API responses, data extraction, function calling, and any programmatic consumption of LLM output.",
    keyPoints:["JSON mode and schema enforcement","Grammar-constrained decoding","Function calling with type schemas","Essential for programmatic integration"],
    related:["function-calling","json-mode","output-formatting","pydantic"], tags:["technique","integration"] },

  { id:"retrieval-augmented-prompting", name:"Retrieval-Augmented Prompting", cat:"prompting", difficulty:"intermediate",
    desc:"Dynamically retrieving relevant information and injecting it into the prompt context — the prompting dimension of RAG systems.",
    details:"The prompt side of RAG: retrieved passages are formatted and injected into the system or user prompt. Key decisions: passage ordering (most relevant first or last), formatting (numbered, quoted, with sources), instructions for using/citing context, handling conflicting information, and managing context window limits through chunking and truncation strategies.",
    keyPoints:["Injecting retrieved context into prompts","Passage ordering and formatting","Citation instructions","Context window management"],
    related:["rag-overview","prompt-engineering","context-window","chunking-strategies"], tags:["technique","rag"] },

  { id:"prompt-chaining", name:"Prompt Chaining", cat:"prompting", difficulty:"intermediate",
    desc:"Breaking complex tasks into a sequence of simpler LLM calls where each step's output feeds into the next — enabling multi-step workflows.",
    details:"Prompt chaining decomposes complex tasks: extract → classify → generate → validate. Each step uses specialized prompts. Benefits: better quality per step, easier debugging, ability to use different models per step. Frameworks: LangChain, LlamaIndex, Haystack. Trade-offs: increased latency, higher cost, error propagation between steps.",
    keyPoints:["Sequential LLM calls for complex tasks","Each step specialized with focused prompts","Easier debugging and quality control","LangChain, LlamaIndex frameworks"],
    related:["agentic-rag","langchain","orchestration","function-calling"], tags:["pattern","architecture"] },

  // ═══ RAG & RETRIEVAL ═══
  { id:"rag-overview", name:"Retrieval-Augmented Generation", aka:"RAG", cat:"rag", difficulty:"beginner",
    desc:"A paradigm combining information retrieval with language model generation — retrieving relevant documents and using them as context for generating grounded, factual responses.",
    details:"RAG (Lewis et al., 2020) addresses LLM limitations: knowledge cutoff, hallucination, and lack of domain knowledge. Pipeline: query → retrieve relevant docs → inject into prompt → generate response. Key components: embedding model, vector store, retrieval strategy, reranking, and generation with context. Has evolved from naive RAG to advanced/modular/agentic patterns.",
    keyPoints:["Retrieve relevant documents, then generate","Addresses hallucination and knowledge cutoff","Query → retrieve → inject → generate pipeline","Evolved from naive to advanced patterns"],
    related:["dense-retrieval","vector-search","chunking-strategies","reranking"], tags:["paradigm","core"] },

  { id:"naive-rag", name:"Naive RAG", cat:"rag", difficulty:"beginner",
    desc:"The simplest RAG implementation: embed query, retrieve top-k similar chunks, stuff them into the prompt, and generate — a starting baseline.",
    details:"Naive RAG: embed documents into chunks, store in vector DB, at query time embed the query, retrieve top-k by similarity, concatenate into prompt, generate answer. Limitations: poor chunking loses context, single-shot retrieval misses relevant info, no query understanding, no relevance filtering, and context window waste on irrelevant chunks. Starting point that needs refinement.",
    keyPoints:["Simple retrieve-and-generate pipeline","Single-shot embedding similarity","No query rewriting or reranking","Starting baseline — needs improvement"],
    related:["rag-overview","advanced-rag","chunking-strategies","embedding-models"], tags:["pattern","baseline"] },

  { id:"advanced-rag", name:"Advanced RAG Patterns", cat:"rag", difficulty:"intermediate",
    desc:"Sophisticated RAG techniques beyond naive retrieval — including query rewriting, hybrid search, reranking, contextual compression, and multi-step retrieval.",
    details:"Advanced RAG improves each pipeline stage: Pre-retrieval (query rewriting, HyDE, decomposition), Retrieval (hybrid search, multi-index, recursive retrieval), Post-retrieval (reranking, contextual compression, lost-in-middle mitigation), Generation (citation, faithfulness checking). Key patterns: parent-child chunking, sentence window retrieval, and auto-merging.",
    keyPoints:["Query rewriting and expansion","Hybrid search (dense + sparse)","Reranking retrieved results","Parent-child and sentence window patterns"],
    related:["rag-overview","hybrid-search","reranking","hyde"], tags:["pattern","advanced"] },

  { id:"chunking-strategies", name:"Chunking Strategies", cat:"rag", difficulty:"intermediate",
    desc:"Methods for splitting documents into appropriately-sized pieces for embedding and retrieval — balancing context preservation with retrieval granularity.",
    details:"Strategies: fixed-size with overlap, semantic chunking (split at topic boundaries), recursive character splitting, sentence-based, paragraph-based, section-based (by headers), and agentic chunking (LLM-determined boundaries). Key parameters: chunk size (256-2048 tokens typical), overlap (10-20%), and separators. Parent-child chunking stores both large context and small retrieval units.",
    keyPoints:["Fixed-size, semantic, recursive, section-based","Chunk size: 256-2048 tokens typical","Overlap: 10-20% for context preservation","Parent-child chunking pattern"],
    related:["rag-overview","document-parsing","embedding-models","semantic-chunking"], tags:["technique","critical"] },

  { id:"hybrid-search", name:"Hybrid Search", cat:"rag", difficulty:"intermediate",
    desc:"Combining dense vector retrieval (semantic) with sparse keyword retrieval (BM25) to get the benefits of both — typically using reciprocal rank fusion (RRF) for score combination.",
    details:"Neither dense nor sparse retrieval alone is optimal. Dense handles semantic similarity; sparse handles exact keyword matching. Combination methods: Reciprocal Rank Fusion (RRF), linear score combination, or learned combination. Implementations: Elasticsearch + vector plugin, Weaviate, Qdrant. Typically gives 5-15% improvement over either method alone.",
    keyPoints:["Dense (semantic) + sparse (keyword) retrieval","Reciprocal Rank Fusion (RRF)","5-15% improvement over single method","Most production RAG systems use hybrid"],
    related:["bm25","dense-retrieval","rrf","vector-search"], tags:["technique","retrieval"] },

  { id:"dense-retrieval", name:"Dense Retrieval", cat:"rag", difficulty:"intermediate",
    desc:"Retrieving documents by computing similarity between dense vector embeddings of queries and passages — enabling semantic matching beyond keyword overlap.",
    details:"Dense retrieval encodes queries and passages into dense vectors using embedding models, then retrieves by nearest-neighbor search. Models: DPR (Facebook), Contriever, E5, BGE, Cohere Embed. Advantages: semantic matching, cross-lingual capability. Challenges: domain shift, exact match weakness, compute cost. Training uses contrastive learning with hard negatives.",
    keyPoints:["Embedding-based semantic retrieval","Contrastive learning with hard negatives","Enables semantic matching","Challenges with exact match and domain shift"],
    related:["embedding-models","vector-search","hybrid-search","contrastive-learning"], tags:["technique","retrieval"] },

  { id:"reranking", name:"Reranking", cat:"rag", difficulty:"intermediate",
    desc:"A second-stage ranking model that re-scores initially retrieved documents for relevance, using a more powerful cross-encoder model — significantly improving retrieval quality.",
    details:"Rerankers process (query, document) pairs jointly through a cross-encoder, producing a relevance score. Much more accurate than bi-encoder retrieval but too slow for first-stage retrieval (can't be precomputed). Common rerankers: Cohere Rerank, BGE-Reranker, cross-encoder models, ColBERT, and LLM-based reranking. Typical: retrieve top-100, rerank to top-10.",
    keyPoints:["Cross-encoder for joint query-document scoring","More accurate than bi-encoder retrieval","Retrieve top-100, rerank to top-10","Cohere Rerank, BGE-Reranker"],
    related:["cross-encoder","dense-retrieval","rag-overview","colbert"], tags:["technique","quality"] },

  { id:"hyde", name:"HyDE", aka:"Hypothetical Document Embeddings", cat:"rag", difficulty:"advanced",
    desc:"Generating a hypothetical answer to the query using the LLM, then using that answer's embedding for retrieval — bridging the query-document semantic gap.",
    details:"HyDE (Gao et al., 2022): instead of embedding the short query, generate a hypothetical answer document, embed that, and use it for retrieval. The generated document is closer in embedding space to actual relevant documents than the query alone. Works well for complex questions where queries are semantically far from answer passages.",
    keyPoints:["Generate hypothetical answer, embed it","Bridges query-document semantic gap","Effective for complex questions","LLM generation + embedding retrieval"],
    related:["rag-overview","query-rewriting","dense-retrieval","advanced-rag"], tags:["technique","creative"] },

  { id:"query-rewriting", name:"Query Rewriting", cat:"rag", difficulty:"intermediate",
    desc:"Transforming user queries into more effective retrieval queries — expanding, reformulating, or decomposing queries for better document matching.",
    details:"Types: query expansion (adding related terms), query reformulation (rephrasing for retrieval), query decomposition (breaking complex queries into sub-queries), step-back prompting (abstracting to broader questions), and multi-query (generating multiple perspectives). LLMs can rewrite queries contextually, incorporating conversation history and user intent.",
    keyPoints:["Expansion, reformulation, decomposition","Step-back prompting for abstraction","Multi-query for different perspectives","Context-aware with conversation history"],
    related:["hyde","rag-overview","advanced-rag","intent-classification"], tags:["technique","retrieval"] },

  { id:"agentic-rag", name:"Agentic RAG", cat:"rag", difficulty:"advanced",
    desc:"RAG systems where an LLM agent decides when and how to retrieve, what queries to issue, and whether to iterate — combining retrieval with autonomous decision-making.",
    details:"Agentic RAG moves beyond fixed pipelines: the LLM agent decides whether retrieval is needed, formulates queries, evaluates results, issues follow-up queries, and determines when sufficient information is gathered. Implements routing (choose retrieval source), iterative retrieval (refine based on initial results), and self-reflection (evaluate answer quality). Used in complex knowledge tasks.",
    keyPoints:["LLM decides when/how to retrieve","Iterative query refinement","Self-evaluation of answer quality","Routing across multiple sources"],
    related:["rag-overview","ai-agents","tool-use","advanced-rag"], tags:["pattern","advanced"] },

  { id:"rag-evaluation", name:"RAG Evaluation", cat:"rag", difficulty:"intermediate",
    desc:"Metrics and frameworks for evaluating RAG system quality — including retrieval quality, generation faithfulness, answer relevance, and end-to-end performance.",
    details:"Frameworks: RAGAS (faithfulness, answer relevance, context relevance, context recall), DeepEval, TruLens. Key metrics: retrieval precision/recall, context relevance, faithfulness (no hallucination), answer correctness, answer relevance. LLM-as-judge for automated evaluation. Human evaluation remains gold standard. Component-level vs. end-to-end evaluation.",
    keyPoints:["RAGAS, DeepEval, TruLens frameworks","Faithfulness, relevance, recall metrics","LLM-as-judge evaluation","Component-level and end-to-end testing"],
    related:["ragas","faithfulness","hallucination-detection","evaluation-metrics"], tags:["evaluation","framework"] },

  { id:"colbert", name:"ColBERT", aka:"Contextualized Late Interaction", cat:"rag", difficulty:"advanced",
    desc:"A retrieval model using late interaction — independently encoding query and document tokens, then computing fine-grained token-level similarity at retrieval time.",
    details:"ColBERT (Khattab & Zaharia, 2020) encodes queries and documents independently into per-token embeddings, then computes relevance via MaxSim (maximum similarity between each query token and document tokens). Combines the efficiency of bi-encoders (precomputable document encodings) with the quality of cross-encoders (token-level matching). ColBERTv2 adds residual compression.",
    keyPoints:["Per-token embeddings with late interaction","MaxSim scoring function","Efficiency of bi-encoder + quality of cross-encoder","ColBERTv2 with residual compression"],
    related:["dense-retrieval","reranking","cross-encoder","plaid"], tags:["model","retrieval"] },

  // ═══ TEXT GENERATION ═══
  { id:"autoregressive", name:"Autoregressive Generation", cat:"generation", difficulty:"beginner",
    desc:"Generating text one token at a time, where each new token is conditioned on all previously generated tokens — the fundamental generation paradigm for GPT-style models.",
    details:"Autoregressive models factorize P(x) = ∏P(x_t|x_<t), generating tokens left-to-right. At each step, the model produces a probability distribution over the vocabulary, a token is selected (via sampling or argmax), and generation continues. All decoder-only LLMs (GPT, LLaMA, Claude) use this approach. Causal masking ensures each position can only attend to previous positions.",
    keyPoints:["Token-by-token left-to-right generation","P(x_t|x_<t) factorization","Causal masking in self-attention","Used by all decoder-only LLMs"],
    related:["sampling-strategies","temperature","top-k","top-p"], tags:["paradigm","generation"] },

  { id:"sampling-strategies", name:"Sampling Strategies", cat:"generation", difficulty:"intermediate",
    desc:"Methods for selecting tokens from the model's output probability distribution during generation — balancing diversity and quality.",
    details:"Key strategies: greedy decoding (always select highest probability), temperature sampling (sharpen/flatten distribution), top-k (sample from k most likely), top-p/nucleus (sample from smallest set summing to p probability), min-p (dynamic threshold), typical sampling, and epsilon sampling. Combining strategies (e.g., temperature + top-p) is common. Choice dramatically affects output quality.",
    keyPoints:["Greedy, temperature, top-k, top-p, min-p","Temperature controls randomness","Top-p (nucleus) adapts dynamically","Combination strategies common"],
    related:["temperature","top-k","top-p","beam-search"], tags:["technique","generation"] },

  { id:"temperature", name:"Temperature", cat:"generation", difficulty:"beginner",
    desc:"A parameter that controls the randomness of text generation by scaling the logits before softmax — lower temperature is more focused, higher is more creative.",
    details:"Temperature T scales logits: softmax(z/T). T=0 → greedy (deterministic), T=1 → standard sampling, T>1 → more random/creative, T<1 → more focused/deterministic. Lower temperature for factual tasks, higher for creative writing. Interacts with top-k and top-p parameters. In reasoning tasks, T=0 or very low T is typically preferred.",
    keyPoints:["Scales logits before softmax","T=0: deterministic, T>1: creative","Lower for factual, higher for creative","Interacts with top-k and top-p"],
    related:["sampling-strategies","top-k","top-p","autoregressive"], tags:["parameter","generation"] },

  { id:"top-k", name:"Top-k Sampling", cat:"generation", difficulty:"beginner",
    desc:"Restricting token selection to the k most probable tokens, then sampling from this reduced set — controlling diversity while avoiding very unlikely tokens.",
    details:"Top-k sampling (Fan et al., 2018) truncates the probability distribution to the k highest-probability tokens and renormalizes. k=1 is greedy, k=vocabulary_size is unrestricted sampling. Problem: fixed k doesn't adapt to distribution shape — for peaked distributions, k=50 might include unlikely tokens; for flat distributions, k=50 might be too restrictive.",
    keyPoints:["Sample from k most probable tokens","Fixed k doesn't adapt to distribution shape","k=1 is greedy, large k is unrestricted","Often combined with temperature"],
    related:["top-p","temperature","sampling-strategies","autoregressive"], tags:["parameter","generation"] },

  { id:"top-p", name:"Top-p (Nucleus) Sampling", cat:"generation", difficulty:"beginner",
    desc:"Dynamically selecting the smallest set of tokens whose cumulative probability exceeds p, then sampling from this set — adapting to the distribution shape.",
    details:"Nucleus sampling (Holtzman et al., 2019) selects tokens until cumulative probability reaches p (e.g., p=0.9). Adapts automatically: for confident predictions, few tokens are considered; for uncertain predictions, more tokens. Generally preferred over top-k for this adaptive property. Common values: p=0.9-0.95. Often combined with temperature.",
    keyPoints:["Dynamic vocabulary size based on probability mass","Adapts to distribution shape","p=0.9-0.95 typical values","Generally preferred over fixed top-k"],
    related:["top-k","temperature","sampling-strategies","autoregressive"], tags:["parameter","generation"] },

  { id:"beam-search", name:"Beam Search", cat:"generation", difficulty:"intermediate",
    desc:"Maintaining b candidate sequences (beams) at each generation step, expanding each and keeping the top-b by cumulative probability — finding higher-probability sequences than greedy.",
    details:"Beam search explores multiple generation paths simultaneously. At each step, expand all beams by all vocabulary tokens, score, and keep top-b. Length normalization prevents preference for shorter sequences. Used in machine translation and summarization. Less common in LLM chat (sampling preferred for diversity). Beam width b=4-8 typical.",
    keyPoints:["Maintain b candidate sequences","Length normalization for fairness","Common in translation, not in chat","Beam width b=4-8 typical"],
    related:["greedy-decoding","sampling-strategies","machine-translation"], tags:["algorithm","generation"] },

  { id:"repetition-penalty", name:"Repetition Penalty", cat:"generation", difficulty:"beginner",
    desc:"Techniques to prevent language models from generating repetitive text — including frequency penalties, presence penalties, and n-gram blocking.",
    details:"Repetition mitigation: frequency penalty (reduce probability proportional to occurrence count), presence penalty (reduce if token appeared at all), n-gram blocking (prohibit repeating n-grams), and repetition penalty scaling. OpenAI API exposes frequency_penalty and presence_penalty. Critical for long-form generation where models tend to loop.",
    keyPoints:["Frequency and presence penalties","N-gram blocking","Critical for long-form generation","OpenAI API: frequency_penalty, presence_penalty"],
    related:["sampling-strategies","temperature","text-generation","degeneration"], tags:["technique","quality"] },

  { id:"controlled-generation", name:"Controlled Generation", cat:"generation", difficulty:"advanced",
    desc:"Techniques for steering text generation to satisfy specific attributes — sentiment, topic, style, safety, or structural constraints — while maintaining fluency.",
    details:"Methods: conditional training (CTRL), post-hoc steering (PPLM, DExperts), classifier-free guidance, prompt-based control, constrained decoding (Outlines, GBNF), and reward model guidance. Grammar-constrained decoding forces outputs to match formal grammars (JSON, XML). Constitutional AI uses principles to guide generation. Balance between control strength and output naturalness.",
    keyPoints:["Attribute-conditioned generation","Constrained decoding (grammar-based)","Classifier-free guidance","Constitutional AI for safety steering"],
    related:["structured-output","constitutional-ai","guardrails","cfg"], tags:["technique","steering"] },

  { id:"speculative-decoding", name:"Speculative Decoding", cat:"generation", difficulty:"advanced",
    desc:"Using a small draft model to generate candidate tokens quickly, then verifying them in parallel with the large model — accelerating inference by 2-3× without quality loss.",
    details:"Speculative decoding (Leviathan et al., 2022) uses a fast draft model to generate k candidate tokens, then the large target model verifies all k tokens in a single forward pass (which is almost as fast as generating 1 token). Accepted tokens are kept; rejection triggers correction. Guarantees identical output distribution to the target model. 2-3× speedup typical.",
    keyPoints:["Small draft model generates candidates","Large model verifies in parallel","Identical output distribution guaranteed","2-3× inference speedup"],
    related:["inference-optimization","kv-cache","distillation","generation-speed"], tags:["technique","efficiency"] },

  // ═══ NLU & CLASSIFICATION ═══
  { id:"text-classification", name:"Text Classification", cat:"nlu", difficulty:"beginner",
    desc:"Assigning predefined categories to text — including sentiment, topic, intent, spam detection, and content moderation.",
    details:"Text classification spans: binary (spam/not), multi-class (topic categories), multi-label (multiple tags), and hierarchical classification. Methods evolved from BoW+SVM → CNN/RNN → fine-tuned BERT → LLM zero-shot/few-shot. Modern approach: fine-tune a small model for production, use LLM for prototyping and edge cases. Evaluation: accuracy, F1, precision, recall.",
    keyPoints:["Binary, multi-class, multi-label variants","BoW+SVM → BERT → LLM evolution","Fine-tune small models for production","F1, precision, recall evaluation"],
    related:["sentiment-analysis","intent-classification","zero-shot-classification","fine-tuning"], tags:["task","core"] },

  { id:"intent-classification", name:"Intent Classification", cat:"nlu", difficulty:"beginner",
    desc:"Identifying the user's purpose or goal from their natural language input — a core component of chatbots, virtual assistants, and task-oriented dialogue systems.",
    details:"Intent classification maps user utterances to predefined intent categories (e.g., 'check_balance', 'transfer_money', 'get_support'). Methods: rule-based (regex/keywords), ML (SVM, random forest), deep learning (CNN, BERT), and LLM-based (zero-shot). In banking: account inquiry, transaction, loan, complaint. Closely related to entity extraction for slot filling.",
    keyPoints:["Maps utterances to predefined intents","Core NLU component for chatbots","Combined with entity extraction (slot filling)","Domain-specific intent taxonomies"],
    related:["slot-filling","nlu-pipeline","semantic-router","text-classification"], tags:["task","dialogue"] },

  { id:"zero-shot-classification", name:"Zero-Shot Classification", cat:"nlu", difficulty:"intermediate",
    desc:"Classifying text into categories not seen during training — using NLI-based approaches or LLM prompting to classify with arbitrary label sets.",
    details:"NLI-based: frame each label as a hypothesis and use an NLI model (BART-large-mnli) to score entailment. LLM-based: describe categories in the prompt and ask the model to classify. Benefits: no training data needed, flexible label sets. Limitations: lower accuracy than supervised methods, sensitive to label wording. Useful for prototyping and when labeled data is scarce.",
    keyPoints:["No training data for new classes","NLI-based (entailment scoring)","LLM-based (prompt classification)","Flexible but less accurate than supervised"],
    related:["textual-entailment","text-classification","few-shot-learning"], tags:["technique","flexible"] },

  { id:"nlu-pipeline", name:"NLU Pipeline", cat:"nlu", difficulty:"beginner",
    desc:"A processing pipeline combining intent classification, entity extraction, and context management to understand natural language user inputs in dialogue systems.",
    details:"Traditional NLU pipeline: ASR (if speech) → text normalization → intent classification → entity extraction → slot filling → context resolution → dialogue state update. Modern approaches: end-to-end neural models, LLM-based joint intent/entity extraction. Frameworks: Rasa, Dialogflow, LUIS, Amazon Lex. Joint models outperform pipeline approaches.",
    keyPoints:["Intent + entity extraction pipeline","Rasa, Dialogflow, LUIS frameworks","Joint models outperform pipelines","Context resolution for multi-turn"],
    related:["intent-classification","slot-filling","ner","dialogue-management"], tags:["pipeline","dialogue"] },

  { id:"semantic-router", name:"Semantic Router", cat:"nlu", difficulty:"intermediate",
    desc:"Using embedding similarity to route user queries to appropriate handlers — comparing query embeddings to pre-embedded canonical phrases per intent route.",
    details:"Semantic routing maps user queries to intents/handlers by comparing query embeddings to pre-embedded representative utterances using KNN or cosine similarity. Advantages over classifier-based routing: no training required, easily extended with new routes, works with any embedding model. Can be implemented with Redis vector search, FAISS, or purpose-built libraries (semantic-router).",
    keyPoints:["Embedding similarity for intent routing","Pre-embedded canonical phrases per route","KNN-based comparison","No training required, easily extensible"],
    related:["intent-classification","embedding-models","cosine-similarity","vector-search"], tags:["technique","routing"] },

  // ═══ INFORMATION EXTRACTION ═══
  { id:"ner", name:"Named Entity Recognition", aka:"NER", cat:"extraction", difficulty:"beginner",
    desc:"Identifying and classifying named entities in text — persons, organizations, locations, dates, monetary values, and domain-specific entities.",
    details:"NER identifies entity spans and classifies them. Standard types: PER, ORG, LOC, DATE, MONEY. BIO/IOB tagging scheme marks Begin/Inside/Outside. Methods: rule-based (regex, gazetteers), CRF, BiLSTM-CRF, fine-tuned BERT, and LLM-based extraction. Domain-specific NER (medical, financial, legal) requires specialized training data. Evaluation: entity-level F1.",
    keyPoints:["Identify and classify named entities","BIO/IOB tagging scheme","BiLSTM-CRF → BERT evolution","Domain-specific NER requires specialized data"],
    related:["pos-tagging","crf","entity-linking","bio-tagging"], tags:["task","core"] },

  { id:"relation-extraction", name:"Relation Extraction", cat:"extraction", difficulty:"intermediate",
    desc:"Identifying semantic relationships between entities in text (e.g., 'works_for', 'born_in', 'CEO_of') — building structured knowledge from unstructured text.",
    details:"Relation extraction connects entities with typed relationships. Approaches: pattern-based (Hearst patterns), supervised (BERT with entity markers), distant supervision (align KB triples with text), open information extraction (OpenIE — no predefined relation types), and LLM-based extraction. Challenging due to: implicit relations, cross-sentence relations, and relation ambiguity.",
    keyPoints:["Extract typed relationships between entities","Supervised, distant supervision, open IE approaches","BERT with entity markers","Cross-sentence relations challenging"],
    related:["ner","knowledge-graphs","openie","distant-supervision"], tags:["task","knowledge"] },

  { id:"entity-linking", name:"Entity Linking", aka:"Entity Disambiguation", cat:"extraction", difficulty:"intermediate",
    desc:"Mapping entity mentions in text to their corresponding entries in a knowledge base (Wikipedia, Wikidata) — resolving which specific entity is meant.",
    details:"Entity linking pipeline: mention detection → candidate generation (string matching, alias tables) → candidate ranking (context compatibility scoring). Handles: name variations (NYC = New York City), ambiguity (Michael Jordan — basketball player or professor?), and nil detection (entity not in KB). Tools: DBpedia Spotlight, TagMe, BLINK, and modern neural linkers.",
    keyPoints:["Map mentions to knowledge base entries","Candidate generation and ranking","Handles name variations and ambiguity","Nil detection for unknown entities"],
    related:["ner","knowledge-graphs","coreference","wikification"], tags:["task","knowledge"] },

  { id:"event-extraction", name:"Event Extraction", cat:"extraction", difficulty:"advanced",
    desc:"Identifying events in text along with their participants, attributes, and temporal/causal relationships — structured extraction of 'what happened, to whom, when, where'.",
    details:"Event extraction identifies event triggers (words indicating events), event types (attack, acquisition, election), and event arguments (who, what, when, where). Sub-tasks: event detection, argument extraction, event coreference, and temporal ordering. Datasets: ACE, TAC-KBP, MAVEN. Applications: news monitoring, intelligence analysis, and financial event tracking.",
    keyPoints:["Event triggers, types, and arguments","Who, what, when, where extraction","ACE and TAC-KBP datasets","Applications in news and finance"],
    related:["ner","relation-extraction","temporal-extraction","srl"], tags:["task","structured"] },

  { id:"openie", name:"Open Information Extraction", aka:"OpenIE", cat:"extraction", difficulty:"intermediate",
    desc:"Extracting relation tuples (subject, relation, object) from text without predefined relation schemas — discovering arbitrary relationships at scale.",
    details:"OpenIE extracts (arg1, relation, arg2) tuples without a fixed schema. Systems: TextRunner, ReVerb, OLLIE, Stanford OpenIE, OpenIE6. Advantages: no training data needed per relation type, discovers unexpected relationships. Limitations: noisy output, relation normalization challenges, and difficulty handling complex sentences. Used for knowledge base construction and exploration.",
    keyPoints:["Schema-free relation extraction","(Subject, relation, object) tuples","No predefined relation types","Noisy but discovers novel relationships"],
    related:["relation-extraction","knowledge-graphs","ie"], tags:["technique","scalable"] },

  { id:"keyphrase-extraction", name:"Keyphrase Extraction", cat:"extraction", difficulty:"beginner",
    desc:"Identifying the most important phrases that capture the main topics and themes of a document — using statistical, graph-based, or neural methods.",
    details:"Methods: statistical (TF-IDF, YAKE), graph-based (TextRank, SingleRank), neural (KeyBERT using BERT embeddings + cosine similarity), and LLM-based extraction. KeyBERT embeds document and candidate phrases, selecting those most similar to the document embedding. Applications: summarization, indexing, tag suggestion, and content recommendation.",
    keyPoints:["TF-IDF, TextRank, KeyBERT methods","KeyBERT uses embedding similarity","Applications in indexing and tagging","Statistical, graph, and neural approaches"],
    related:["keyword-extraction","topic-modeling","tfidf","textrank"], tags:["task","extraction"] },

  // ═══ SENTIMENT & OPINION ═══
  { id:"sentiment-analysis", name:"Sentiment Analysis", cat:"sentiment", difficulty:"beginner",
    desc:"Determining the emotional tone or opinion expressed in text — positive, negative, or neutral — at document, sentence, or aspect level.",
    details:"Levels: document-level (overall sentiment), sentence-level, aspect-level (sentiment toward specific features). Methods: lexicon-based (VADER, SentiWordNet), ML (SVM + features), deep learning (BiLSTM, CNN), fine-tuned BERT, and LLM-based. Domain adaptation is critical — financial sentiment differs from product review sentiment. Special models: FinBERT for financial text.",
    keyPoints:["Document, sentence, aspect levels","Lexicon, ML, DL, LLM approaches","Domain-specific models (FinBERT)","VADER for rule-based analysis"],
    related:["aspect-sentiment","vader","finbert","opinion-mining"], tags:["task","core"] },

  { id:"aspect-sentiment", name:"Aspect-Based Sentiment Analysis", aka:"ABSA", cat:"sentiment", difficulty:"intermediate",
    desc:"Identifying specific aspects or features mentioned in text and determining the sentiment expressed toward each — more granular than document-level sentiment.",
    details:"ABSA extracts (aspect, sentiment) pairs: 'The food was great [food: positive] but service was slow [service: negative]'. Sub-tasks: aspect term extraction, aspect category detection, sentiment classification per aspect, and opinion term extraction. Datasets: SemEval restaurant/laptop reviews. Modern approaches: fine-tuned BERT with span extraction, instruction-tuned LLMs.",
    keyPoints:["(Aspect, sentiment) pair extraction","Per-feature sentiment analysis","SemEval benchmark datasets","Fine-tuned BERT or LLM approaches"],
    related:["sentiment-analysis","opinion-mining","ner","review-mining"], tags:["task","granular"] },

  { id:"emotion-detection", name:"Emotion Detection", cat:"sentiment", difficulty:"intermediate",
    desc:"Classifying text by specific emotions (joy, anger, sadness, fear, surprise, disgust) rather than simple positive/negative polarity.",
    details:"Goes beyond sentiment to specific emotions. Models: Ekman's six basic emotions, Plutchik's wheel (8 primary emotions), GoEmotions (27 emotions, Google). Methods: fine-tuned BERT classifiers, multi-label classification (text can express multiple emotions), and LLM-based detection. Applications: customer feedback analysis, mental health monitoring, and social media analysis.",
    keyPoints:["Beyond polarity to specific emotions","Ekman, Plutchik, GoEmotions models","Multi-label (multiple emotions possible)","Applications in customer and mental health"],
    related:["sentiment-analysis","text-classification","empathetic-dialogue"], tags:["task","affect"] },

  { id:"stance-detection", name:"Stance Detection", cat:"sentiment", difficulty:"intermediate",
    desc:"Determining a text's position (favor, against, neutral) toward a specific target — related to but distinct from sentiment analysis.",
    details:"Stance detection classifies attitude toward a specified target (person, policy, product). Unlike sentiment (which is about overall tone), stance is target-dependent: the same text can be positive sentiment but against a target. Used in: political analysis, fact-checking, and debate monitoring. Datasets: SemEval stance detection, VAST. Challenges: implicit stance and sarcasm.",
    keyPoints:["Target-specific position (favor/against/neutral)","Differs from sentiment (target-dependent)","Political and fact-checking applications","Handles implicit stance and sarcasm"],
    related:["sentiment-analysis","opinion-mining","misinformation"], tags:["task","analysis"] },

  { id:"sarcasm-detection", name:"Sarcasm & Irony Detection", cat:"sentiment", difficulty:"advanced",
    desc:"Detecting when text's literal meaning opposes its intended meaning — a challenging NLP task requiring pragmatic understanding.",
    details:"Sarcasm reverses apparent sentiment: 'Oh great, another meeting' (negative disguised as positive). Cues: contrast between clauses, hyperbole, specific patterns, and context. Methods: feature engineering (punctuation, capitalization, contrast), deep learning (attention over context), and LLM-based detection. Multimodal sarcasm (text + image/audio) is an active research area.",
    keyPoints:["Literal vs. intended meaning mismatch","Requires pragmatic understanding","Context and contrast as cues","Multimodal sarcasm detection"],
    related:["sentiment-analysis","pragmatics","emotion-detection"], tags:["task","challenging"] },

  // ═══ MACHINE TRANSLATION ═══
  { id:"machine-translation", name:"Machine Translation", aka:"MT", cat:"translation", difficulty:"beginner",
    desc:"Automatically translating text from one language to another — the task that drove many advances in sequence-to-sequence models and attention mechanisms.",
    details:"MT evolution: rule-based (1950s-1990s) → statistical (2000s, phrase-based) → neural (2016+, seq2seq with attention) → Transformer-based (2017+). Current state-of-art: large multilingual models (NLLB, Google Translate, DeepL). Challenges: low-resource languages, domain-specific terminology, preserving style/nuance, and handling ambiguity. BLEU, COMET, chrF as evaluation metrics.",
    keyPoints:["Rule-based → statistical → neural → Transformer","Seq2seq with attention breakthrough","BLEU, COMET evaluation metrics","Low-resource languages remain challenging"],
